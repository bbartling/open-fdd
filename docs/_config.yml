title: "Open-FDD"
description: "PyPI engine only: YAML rules on pandas (open_fdd.engine). Full AFDD platform docs: bbartling.github.io/open-fdd-afdd-stack"
baseurl: "/open-fdd"
# Jekyll emits e.g. modeling/llm_workflow.html. GitHub Pages serves extensionless /open-fdd/modeling/llm_workflow
# but /open-fdd/modeling/llm_workflow/ often 404s (no page/index.html). Prefer extensionless or .html in README links.
remote_theme: just-the-docs/just-the-docs
color_scheme: "light"

# Sidebar branding (same asset as README)
logo: "https://raw.githubusercontent.com/bbartling/open-fdd/master/image.png"

plugins:
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-seo-tag

aux_links:
  "GitHub": "https://github.com/bbartling/open-fdd"
  "PyPI": "https://pypi.org/project/open-fdd/"
  "AFDD stack (docs)": "https://bbartling.github.io/open-fdd-afdd-stack/"
  "AFDD stack (repo)": "https://github.com/bbartling/open-fdd-afdd-stack"

footer_content: "MIT · <a href=\"https://github.com/bbartling/open-fdd\">open-fdd</a> · <a href=\"https://bbartling.github.io/open-fdd-afdd-stack/\">AFDD stack docs</a>"

heading_anchors: true

search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: true

title: "Open-FDD"
description: "Open-FDD: PyPI engine + SQL/semantic stack; field ingest is site VOLTTRON (ZMQ), not BACnet/Modbus in this app."
baseurl: "/open-fdd"
remote_theme: just-the-docs/just-the-docs
color_scheme: "light"

# Match engine docs branding (shared project visual)
logo: "https://raw.githubusercontent.com/bbartling/open-fdd/master/image.png"

plugins:
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-seo-tag

aux_links:
  "GitHub (monorepo)": "https://github.com/bbartling/open-fdd"
  "PyPI (open-fdd)": "https://pypi.org/project/open-fdd/"

footer_content: "MIT · <a href=\"https://github.com/bbartling/open-fdd\">open-fdd</a> · Engine + AFDD stack docs"

heading_anchors: true

search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: true

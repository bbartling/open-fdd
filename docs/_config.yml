title: "Open-FDD"
description: "Open-FDD operator edge (Docker web app) plus PyPI library open-fdd (engine, playground, reports)."
# Required together for GitHub Pages project sites (CSS/theme assets resolve under /open-fdd/).
url: "https://bbartling.github.io"
baseurl: "/open-fdd"
# remote_theme works with the github-pages gem (GitHub's Pages builder + our workflow).
remote_theme: just-the-docs/just-the-docs@v0.10.2
color_scheme: light
permalink: pretty
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Match engine docs branding (shared project visual)
logo: "https://raw.githubusercontent.com/bbartling/open-fdd/master/image.png"

plugins:
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-seo-tag
  - jekyll-redirect-from

aux_links:
  "GitHub": "https://github.com/bbartling/open-fdd"
  "PyPI (open-fdd)": "https://pypi.org/project/open-fdd/"

footer_content: "MIT · <a href=\"https://github.com/bbartling/open-fdd\">open-fdd</a>"

heading_anchors: true

# Internal maintainer notes — not published to GitHub Pages or PDF bundle.
exclude:
  - development/

search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: true

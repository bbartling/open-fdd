title: "Open-FDD"
description: "Open-FDD: YAML-defined fault detection rules on pandas (PyPI package open-fdd)."
# Required together for GitHub Pages project sites (CSS/theme assets resolve under /open-fdd/).
url: "https://bbartling.github.io"
baseurl: "/open-fdd"
# Gem-based theme (reliable in CI; no GitHub API fetch for jekyll-remote-theme).
theme: just-the-docs
color_scheme: light
permalink: pretty
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Match engine docs branding (shared project visual)
logo: "https://raw.githubusercontent.com/bbartling/open-fdd/master/image.png"

plugins:
  - jekyll-include-cache
  - jekyll-seo-tag

aux_links:
  "GitHub": "https://github.com/bbartling/open-fdd"
  "PyPI (open-fdd)": "https://pypi.org/project/open-fdd/"

footer_content: "MIT · <a href=\"https://github.com/bbartling/open-fdd\">open-fdd</a>"

heading_anchors: true

search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: true

# Open-FDD — optional Postgres/Timescale for Open-FDD fault schema + historian-friendly SQL.
# Field BACnet and UI live on VOLTTRON / VOLTTRON Central — not in this compose file.
#
# Run from monorepo root:
#   docker compose -f afdd_stack/stack/docker-compose.yml up -d
#
# Apply Open-FDD DDL: ./afdd_stack/sql/*.sql are mounted into docker-entrypoint-initdb.d on first DB init only.
# For existing volumes, run migrations manually: docker compose exec -T db psql -U postgres -d openfdd -f - < afdd_stack/stack/sql/002_....sql
#
# Point a VOLTTRON SQL historian at this instance (localhost:5432) using the same DB or a dedicated schema
# per VOLTTRON docs: https://volttron.readthedocs.io/en/stable/volttron-api/services/SQLHistorian/README.html

x-log-opts: &log-opts
  max-size: "${OFDD_LOG_MAX_SIZE:-100m}"
  max-file: "${OFDD_LOG_MAX_FILES:-3}"

services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: openfdd_timescale
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d openfdd"]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: openfdd
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - openfdd_db:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    logging:
      driver: json-file
      options: *log-opts

  grafana:
    profiles:
      - grafana
    image: grafana/grafana:latest
    container_name: openfdd_grafana
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      GF_SERVER_HTTP_ADDR: "0.0.0.0"
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s:%(http_port)s/"
      GF_DASHBOARDS_DEFAULT_HOME: "Open-FDD"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    logging:
      driver: json-file
      options: *log-opts

  mosquitto:
    profiles:
      - mqtt
    image: eclipse-mosquitto:2
    container_name: openfdd_mosquitto
    ports:
      - "1883:1883"
    restart: unless-stopped
    logging:
      driver: json-file
      options: *log-opts

volumes:
  openfdd_db:
  grafana_data:

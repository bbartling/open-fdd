# Open-FDD lab: Volttron Central + SQLHistorian only (no driver, BACnet, actuator, VCP).
# Copied into OFDD_VOLTTRON_DOCKER_DIR by: ./scripts/bootstrap.sh --volttron-docker-lab-push
config:
  vip-address: tcp://0.0.0.0:22916
  bind-web-address: https://0.0.0.0:8443
  instance-name: openfdd-central
  message-bus: zmq

agents:
  platform.historian:
    source: $VOLTTRON_ROOT/services/core/SQLHistorian
    config: $CONFIG/historian.config
    tag: historian

  volttron.central:
    source: $VOLTTRON_ROOT/services/core/VolttronCentral
    config: $CONFIG/vc.config
    tag: vc

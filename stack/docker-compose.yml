# Open-FDD platform stack: TimescaleDB, diy-bacnet-server, bacnet-scraper, API.
# Optional (profiles): Grafana (--with-grafana), Mosquitto MQTT (--with-mqtt-bridge) for future BACnet2MQTT / remote collection.
# Run: docker compose -f stack/docker-compose.yml up -d
# Or: ./scripts/bootstrap.sh
#
# Only one service runs BACnet scrape: bacnet-scraper (openfdd_bacnet_scraper).
# weather-scraper and fdd-loop use the same image but different commands; logs: docker logs -f openfdd_bacnet_scraper
#
# Prerequisite: diy-bacnet-server as sibling of open-fdd (or override build context).
# Rules YAML and config are mounted from repo — edit on host, containers see changes.
#
# Edge limits: log rotation and data retention set at bootstrap or via stack/.env
# (OFDD_LOG_MAX_SIZE, OFDD_LOG_MAX_FILES, OFDD_RETENTION_DAYS).

x-log-opts: &log-opts
  max-size: "${OFDD_LOG_MAX_SIZE:-100m}"
  max-file: "${OFDD_LOG_MAX_FILES:-3}"

services:
  # BACnet/IP gateway — always-on server, JSON-RPC on 8080.
  # Optional BACnet2MQTT: set env in stack/.env or bootstrap with --with-mqtt-bridge (broker + bridge wiring).
  bacnet-server:
    build:
      context: ../../diy-bacnet-server
      dockerfile: Dockerfile
    image: diy-bacnet-server:latest
    container_name: openfdd_bacnet_server
    network_mode: host
    environment:
      BACNET2MQTT_ENABLED: "${BACNET2MQTT_ENABLED:-}"
      MQTT_BROKER_URL: "${MQTT_BROKER_URL:-}"
      HA_DISCOVERY_ENABLED: "${HA_DISCOVERY_ENABLED:-}"
      # Default topic prefix from diy-bacnet-server (MQTT discovery); not an Open-FDD ↔ Home Assistant product tie-in.
      HA_DISCOVERY_TOPIC: "${HA_DISCOVERY_TOPIC:-homeassistant}"
      MQTT_BASE_TOPIC: "${MQTT_BASE_TOPIC:-bacnet2mqtt}"
      MQTT_POLL_INTERVAL_SEC: "${MQTT_POLL_INTERVAL_SEC:-30}"
      MQTT_USER: "${MQTT_USER:-}"
      MQTT_PASSWORD: "${MQTT_PASSWORD:-}"
    logging:
      driver: json-file
      options: *log-opts
    command: >
      python3 -u -m bacpypes_server.main
      --name OpenFDDGateway
      --instance 3456788
      --public
    restart: unless-stopped
    # BACnet/IP: UDP 47808. API: http://localhost:8080/docs

  # BACnet scraper — reads points via RPC, writes to TimescaleDB.
  # Single gateway: OFDD_BACNET_SERVER_URL + OFDD_BACNET_SITE_ID (site tag for central DB).
  # Multi-gateway (central aggregator): set OFDD_BACNET_GATEWAYS to JSON array of {url, site_id} (KG drives object list).
  # Central-only (no local BACnet): omit bacnet-server and bacnet-scraper; remote gateways push via OFDD_DB_DSN + OFDD_BACNET_SITE_ID.
  # When OFDD_API_KEY is set, the scraper calls GET /config (CRUD API) so scrape interval comes from the data model / Config UI; otherwise it uses OFDD_BACNET_SCRAPE_INTERVAL_MIN env.
  bacnet-scraper:
    build:
      context: ..
      dockerfile: stack/Dockerfile.bacnet_scraper
    container_name: openfdd_bacnet_scraper
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OFDD_BACNET_SERVER_URL: http://host.docker.internal:8080
      OFDD_DB_DSN: postgresql://postgres:postgres@db:5432/openfdd
      OFDD_BACNET_SCRAPE_ENABLED: "true"
      # 1 = every minute (for tests); override via stack/.env or Config UI (scraper reads GET /config when OFDD_API_KEY set)
      OFDD_BACNET_SCRAPE_INTERVAL_MIN: "${OFDD_BACNET_SCRAPE_INTERVAL_MIN:-5}"
      OFDD_BACNET_SITE_ID: "default"
      # Optional JSON array of {url, site_id} for central multi-gateway (see compose comments above).
      OFDD_BACNET_GATEWAYS: "${OFDD_BACNET_GATEWAYS:-}"
      # Use service name 'api' so DNS resolves to current API container after restarts.
      OFDD_API_URL: http://api:8000
      OFDD_API_KEY: ${OFDD_API_KEY:-}
    volumes:
      - ../config:/app/config:ro
    depends_on:
      db:
        condition: service_healthy
      bacnet-server:
        condition: service_started
    restart: unless-stopped
    logging:
      driver: json-file
      options: *log-opts

  # Open-Meteo weather scraper — fetch once per interval (e.g. daily), write to TimescaleDB
  weather-scraper:
    build:
      context: ..
      dockerfile: stack/Dockerfile.weather_scraper
    container_name: openfdd_weather_scraper
    command: ["python", "-u", "-m", "open_fdd.platform.drivers.run_weather_fetch", "--loop"]
    environment:
      # Use service name 'api' so DNS resolves to current API container after restarts.
      OFDD_API_URL: http://api:8000
      OFDD_DB_DSN: postgresql://postgres:postgres@db:5432/openfdd
      OFDD_OPEN_METEO_ENABLED: "true"
      OFDD_OPEN_METEO_INTERVAL_HOURS: "24"
      OFDD_OPEN_METEO_LATITUDE: "41.88"
      OFDD_OPEN_METEO_LONGITUDE: "-87.63"
      OFDD_OPEN_METEO_TIMEZONE: "America/Chicago"
      OFDD_OPEN_METEO_DAYS_BACK: "3"
      OFDD_OPEN_METEO_SITE_ID: "default"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options: *log-opts

  db:
    image: timescale/timescaledb:latest-pg16
    container_name: openfdd_timescale
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d openfdd"]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: openfdd
    # Phase 2: bind to loopback only — not reachable from the LAN/internet; use docker exec or a temp publish for remote admin.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - openfdd_db:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    logging:
      driver: json-file
      options: *log-opts

  grafana:
    profiles:
      - grafana
    image: grafana/grafana:latest
    container_name: openfdd_grafana
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      GF_SERVER_HTTP_ADDR: "0.0.0.0"
      # Override in stack/.env for non-dev (defaults keep local/profile parity).
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s:%(http_port)s/"
      GF_DASHBOARDS_DEFAULT_HOME: "Open-FDD"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    logging:
      driver: json-file
      options: *log-opts

  # FDD rule loop — every N hours, loads rules from YAML, pulls last N days, runs all rules, writes fault_results
  # YAML edits on host picked up on next run (no restart)
  fdd-loop:
    build:
      context: ..
      dockerfile: stack/Dockerfile.fdd_loop
    container_name: openfdd_fdd_loop
    command: ["python", "-u", "-m", "open_fdd.platform.drivers.run_rule_loop", "--loop"]
    environment:
      OFDD_DB_DSN: postgresql://postgres:postgres@db:5432/openfdd
      OFDD_RULE_INTERVAL_HOURS: "3"
      OFDD_LOOKBACK_DAYS: "3"
      OFDD_RULES_DIR: "stack/rules"
      OFDD_BRICK_TTL_PATH: "config/data_model.ttl"
    volumes:
      - ../open_fdd:/app/open_fdd:ro
      - ../stack/rules:/app/stack/rules:ro
      # config rw so loop can delete .run_fdd_now after trigger (else trigger fires every 60s)
      - ../config:/app/config
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options: *log-opts

  # Host/container resource stats — memory, load, docker stats → host_metrics, container_metrics
  host-stats:
    build:
      context: ..
      dockerfile: stack/Dockerfile.hoststats
    container_name: openfdd_host_stats
    environment:
      OFDD_DB_DSN: postgresql://postgres:postgres@db:5432/openfdd
      OFDD_HOST_STATS_INTERVAL_SEC: "60"
    volumes:
      - /proc:/host/proc:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options: *log-opts

  # CRUD API — sites, points, equipment, timeseries (data model)
  # config volume must be rw so data_model.ttl is written to the host (same path as mount).
  api:
    build:
      context: ..
      dockerfile: stack/Dockerfile.api
    container_name: openfdd_api
    working_dir: /app
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OFDD_DB_DSN: postgresql://postgres:postgres@db:5432/openfdd
      # From inside the API container, bacnet-server (network_mode: host) is on the host:
      OFDD_BACNET_SERVER_URL: http://host.docker.internal:8080
      # Absolute path so writes always go to the mounted volume (../config → /app/config)
      OFDD_BRICK_TTL_PATH: /app/config/data_model.ttl
      # Optional Bearer auth; bootstrap generates and writes to stack/.env unless --no-auth
      OFDD_API_KEY: ${OFDD_API_KEY:-}
      # Phase-1 UI auth (single bootstrap-managed app user)
      OFDD_APP_USER: ${OFDD_APP_USER:-}
      OFDD_APP_USER_HASH: ${OFDD_APP_USER_HASH:-}
      OFDD_JWT_SECRET: ${OFDD_JWT_SECRET:-}
      OFDD_ACCESS_TOKEN_MINUTES: ${OFDD_ACCESS_TOKEN_MINUTES:-60}
      OFDD_REFRESH_TOKEN_DAYS: ${OFDD_REFRESH_TOKEN_DAYS:-7}
      # Set true when TLS terminates at Caddy/nginx so refresh cookies use Secure (reads X-Forwarded-Proto).
      OFDD_TRUST_FORWARDED_PROTO: ${OFDD_TRUST_FORWARDED_PROTO:-false}
      # External LLMs use Open-FDD endpoints directly (see docs/model-context endpoints).
      # When set, API trusts X-Caddy-Auth header (Caddy sets it after Basic auth so browser only logs in once)
      OFDD_CADDY_INTERNAL_SECRET: ${OFDD_CADDY_INTERNAL_SECRET:-openfdd-internal}
      # Enable POST/DELETE /rules/test-inject for hot-reload automation (e.g. 4_hot_reload_test.py). Set in stack/.env.
      OFDD_ALLOW_TEST_RULES: ${OFDD_ALLOW_TEST_RULES:-}
    volumes:
      - ../stack/rules:/app/stack/rules
      - ../config:/app/config
      # Optional: stream container logs from System resources UI (same daemon host-stats uses)
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options: *log-opts

  # Optional MCP RAG service (profile mcp-rag) derived from canonical docs/text.
  mcp-rag:
    profiles:
      - mcp-rag
    build:
      context: ..
      dockerfile: stack/Dockerfile.mcp_rag
    container_name: openfdd_mcp_rag
    ports:
      - "8090:8090"
    environment:
      OFDD_MCP_RAG_INDEX_PATH: /app/stack/mcp-rag/index/rag_index.json
      OFDD_MCP_OFDD_API_URL: http://api:8000
      OFDD_MCP_OFDD_API_KEY: ${OFDD_API_KEY:-}
      # Read-only retrieval by default; set true only when action tools are intended.
      OFDD_MCP_ENABLE_ACTION_TOOLS: "${OFDD_MCP_ENABLE_ACTION_TOOLS:-false}"
    volumes:
      - ../stack/mcp-rag/index:/app/stack/mcp-rag/index
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    logging:
      driver: json-file
      options: *log-opts

  # React dashboard — production build served as static assets (no Vite dev/HMR in stack mode)
  frontend:
    image: node:22-alpine
    container_name: openfdd_frontend
    working_dir: /app
    # Named volumes mount as empty dirs: test emptiness so npm ci/build are not skipped on first start.
    command:
      - sh
      - -c
      - |
          set -eu
          if [ -z "$$(ls -A node_modules 2>/dev/null)" ]; then npm ci; fi
          # Always rebuild: dist lives on the bind-mounted host ../frontend; an existing dist
          # would skip npm run build forever, so UI changes (and VITE_* env) never shipped.
          npm run build
          npx --yes serve -s dist -l 5173
    ports:
      - "5173:5173"
    environment:
      VITE_OFDD_API_KEY: ${OFDD_API_KEY:-}
      # Deploy-friendly default behind reverse proxy (Caddy routes /api and /auth).
      VITE_API_BASE: ${VITE_API_BASE:-/api}
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:5173/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    logging:
      driver: json-file
      options: *log-opts

  # Optional: Caddy reverse proxy with basic auth (see stack/caddy/ and docs/security.md)
  caddy:
    image: caddy:2
    container_name: openfdd_caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # OPENFDD_CADDYFILE set by bootstrap --caddy-self-signed → ./caddy/Caddyfile.selfsigned
      - ${OPENFDD_CADDYFILE:-./caddy/Caddyfile}:/etc/caddy/Caddyfile:ro
      - ./caddy/certs:/etc/caddy/certs:ro
    depends_on:
      api:
        condition: service_started
      frontend:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options: *log-opts

  # MQTT broker (profile mqtt). Optional: ./scripts/bootstrap.sh --with-mqtt-bridge — for future BACnet2MQTT / remote collection (not required for core Open-FDD).
  mosquitto:
    profiles:
      - mqtt
    image: eclipse-mosquitto:2
    container_name: openfdd_mosquitto
    ports:
      - "1883:1883"
    restart: unless-stopped
    logging:
      driver: json-file
      options: *log-opts

volumes:
  openfdd_db:
  grafana_data:
  frontend_node_modules:

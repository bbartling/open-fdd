[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "open-fdd"
version = "2.3.1"
description = "Open-FDD: YAML-defined fault detection rules on pandas DataFrames (PyPI)."
readme = "README.md"
license = { text = "MIT" }
authors = [
    { name = "Ben Bartling", email = "ben.bartling@gmail.com" }
]
requires-python = ">=3.10"
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Scientific/Engineering",
]
keywords = ["hvac", "fdd", "fault-detection", "building-automation", "pandas"]

dependencies = [
    "pandas",
    "numpy",
    "pyyaml",
    "pydantic>=2.4,<3",
    "requests>=2.31.0",
]

[project.optional-dependencies]
test = [
    "pytest>=7.0",
]
desktop = [
    "PySide6>=6.8",
    "pyarrow>=15.0.0",
    "scikit-learn>=1.0",
    "rdflib>=7.0.0",
    "fastapi>=0.115.0",
    "python-multipart>=0.0.20",
    "httpx>=0.27.0",
    "uvicorn>=0.30.0",
]
dev = [
    "pytest>=7.0",
    "black[jupyter]>=25.11.0",
    "pre-commit",
]

[project.scripts]
open-fdd-desktop = "open_fdd.desktop:main"
open-fdd-desktop-bridge = "open_fdd.gateway.server:run_desktop_bridge"
open-fdd-gateway = "open_fdd.gateway.server:run_gateway"
open-fdd-mcp-rag = "open_fdd.mcp_rag:run_mcp_rag"
open-fdd-headless-bacnet = "open_fdd.platform.drivers.headless_bacnet:main"

[project.urls]
Homepage = "https://github.com/bbartling/open-fdd"
Documentation = "https://bbartling.github.io/open-fdd/"
Repository = "https://github.com/bbartling/open-fdd"

[tool.setuptools.packages.find]
include = ["open_fdd*"]

[tool.black]
line-length = 88
target-version = ["py310", "py311", "py312", "py313", "py314"]

[tool.pytest.ini_options]
testpaths = ["open_fdd/tests"]

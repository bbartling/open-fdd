[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "open-fdd"
version = "2.3.0"
description = "Open-FDD rules engine (PyPI) plus optional AFDD stack (Docker/API/BACnet) in afdd_stack/."
readme = "README.md"
license = { text = "MIT" }
authors = [
    { name = "Ben Bartling", email = "ben.bartling@gmail.com" }
]
requires-python = ">=3.9"
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Scientific/Engineering",
]
keywords = ["hvac", "fdd", "fault-detection", "building-automation", "pandas", "brick"]

dependencies = [
    "pandas",
    "numpy",
    "pyyaml",
    "pydantic>=2.4,<3",
]

[project.optional-dependencies]
test = [
    "pytest>=7.0",
]
# AFDD platform (FastAPI, Timescale, BACnet drivers, Brick/RDF). Not included in the PyPI wheel.
stack = [
    "rdflib>=7.5.0,<8",
    "pyparsing>=2.1.0,<3.2",
    "pydantic-settings>=2.2,<3",
    "psycopg2-binary>=2.9.9",
    "fastapi>=0.115,<1",
    "python-multipart>=0.0.9",
    "uvicorn[standard]>=0.30",
    "httpx>=0.27",
    "requests>=2.31",
    "PyJWT>=2.8,<3",
    "argon2-cffi>=23.1",
    "docker>=7.0,<8",
]
dev = [
    "pytest>=7.0",
    "rdflib>=7.5.0,<8",
    "pyparsing>=2.1.0,<3.2",
    "pydantic-settings>=2.2,<3",
    "psycopg2-binary>=2.9.9",
    "fastapi>=0.115,<1",
    "python-multipart>=0.0.9",
    "uvicorn[standard]>=0.30",
    "httpx>=0.27",
    "requests>=2.31",
    "PyJWT>=2.8,<3",
    "argon2-cffi>=23.1",
    "docker>=7.0,<8",
    "black[jupyter]>=24.0",
    "pre-commit",
    "aiohttp",
    "selenium>=4.0",
    "webdriver-manager>=4.0",
    "openai>=1.0",
]

[project.urls]
Homepage = "https://github.com/bbartling/open-fdd"
Documentation = "https://bbartling.github.io/open-fdd/"
Repository = "https://github.com/bbartling/open-fdd"

[tool.setuptools.packages.find]
include = ["open_fdd*"]

[tool.black]
line-length = 88
target-version = ["py314"]
extend-exclude = "afdd_stack/openfdd_stack/platform/data_model_ttl\\.py|afdd_stack/tools/graph_and_crud_test\\.py"

[tool.pytest.ini_options]
testpaths = ["open_fdd/tests", "afdd_stack/openfdd_stack/tests"]
pythonpath = [".", "afdd_stack"]
filterwarnings = [
    "ignore::DeprecationWarning:rdflib",
    "ignore::DeprecationWarning:pyparsing",
]

services:
  openfdd-bridge:
    # WARNING: `docker compose up --build` runs npm + release Rust in Docker and can OOM
    # small hosts (SSH drop). For local dev use: ./scripts/openfdd_local_up.sh
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openfdd-bridge
    environment:
      SERVICE_MODE: bridge
      PORT: "8080"
      OPENFDD_BIND_HOST: "0.0.0.0"
      FRONTEND_DIR: /app/frontend
      OPENFDD_WORKSPACE: /app/workspace
      OPENFDD_BACNET_POLL_INTERVAL_SECONDS: ${OPENFDD_BACNET_POLL_INTERVAL_SECONDS:-60}
      OPENFDD_BACNET_SCAN_INTERVAL_SECONDS: ${OPENFDD_BACNET_SCAN_INTERVAL_SECONDS:-3600}
      OPENFDD_BACNET_DEVICE_NAME: ${OPENFDD_BACNET_DEVICE_NAME:-OpenFDD}
      OPENFDD_BACNET_DEVICE_INSTANCE: ${OPENFDD_BACNET_DEVICE_INSTANCE:-599999}
      OPENFDD_BACNET_BIND: ${OPENFDD_BACNET_BIND:-}
      OPENFDD_BACNET_IFACE: ${OPENFDD_BACNET_IFACE:-}
      OPENFDD_MODBUS_HOST: ${OPENFDD_MODBUS_HOST:-}
      OPENFDD_MODBUS_PORT: ${OPENFDD_MODBUS_PORT:-1502}
      OPENFDD_MODBUS_UNIT_ID: ${OPENFDD_MODBUS_UNIT_ID:-1}
    ports:
      - "${OPENFDD_BIND_HOST:-127.0.0.1}:8080:8080"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    env_file:
      - path: ./workspace/data.env.local
        required: false
      - ./workspace/auth.env.local
    volumes:
      - ./workspace:/app/workspace
    restart: unless-stopped

  openfdd-commission:
    profiles: ["full-edge"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openfdd-commission
    environment:
      SERVICE_MODE: commission
      PORT: "9091"
      FRONTEND_DIR: /app/frontend
      OPENFDD_WORKSPACE: /app/workspace
      OPENFDD_BACNET_POLL_INTERVAL_SECONDS: ${OPENFDD_BACNET_POLL_INTERVAL_SECONDS:-60}
      OPENFDD_BACNET_SCAN_INTERVAL_SECONDS: ${OPENFDD_BACNET_SCAN_INTERVAL_SECONDS:-3600}
      OPENFDD_BACNET_DEVICE_NAME: ${OPENFDD_BACNET_DEVICE_NAME:-OpenFDD}
      OPENFDD_BACNET_DEVICE_INSTANCE: ${OPENFDD_BACNET_DEVICE_INSTANCE:-599999}
      OPENFDD_BACNET_BIND: ${OPENFDD_BACNET_BIND:-}
      OPENFDD_BACNET_IFACE: ${OPENFDD_BACNET_IFACE:-}
      OPENFDD_MODBUS_HOST: ${OPENFDD_MODBUS_HOST:-}
      OPENFDD_MODBUS_PORT: ${OPENFDD_MODBUS_PORT:-1502}
      OPENFDD_MODBUS_UNIT_ID: ${OPENFDD_MODBUS_UNIT_ID:-1}
    expose:
      - "9091"
    env_file:
      - path: ./workspace/data.env.local
        required: false
      - ./workspace/auth.env.local
    volumes:
      - ./workspace:/app/workspace
    restart: unless-stopped

  openfdd-haystack-gateway:
    profiles: ["full-edge"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openfdd-haystack-gateway
    environment:
      SERVICE_MODE: haystack-gateway
      PORT: "9092"
      FRONTEND_DIR: /app/frontend
      OPENFDD_WORKSPACE: /app/workspace
      OPENFDD_BACNET_POLL_INTERVAL_SECONDS: ${OPENFDD_BACNET_POLL_INTERVAL_SECONDS:-60}
      OPENFDD_BACNET_SCAN_INTERVAL_SECONDS: ${OPENFDD_BACNET_SCAN_INTERVAL_SECONDS:-3600}
      OPENFDD_BACNET_DEVICE_NAME: ${OPENFDD_BACNET_DEVICE_NAME:-OpenFDD}
      OPENFDD_BACNET_DEVICE_INSTANCE: ${OPENFDD_BACNET_DEVICE_INSTANCE:-599999}
      OPENFDD_BACNET_BIND: ${OPENFDD_BACNET_BIND:-}
      OPENFDD_BACNET_IFACE: ${OPENFDD_BACNET_IFACE:-}
      OPENFDD_MODBUS_HOST: ${OPENFDD_MODBUS_HOST:-}
      OPENFDD_MODBUS_PORT: ${OPENFDD_MODBUS_PORT:-1502}
      OPENFDD_MODBUS_UNIT_ID: ${OPENFDD_MODBUS_UNIT_ID:-1}
    expose:
      - "9092"
    env_file:
      - path: ./workspace/data.env.local
        required: false
      - ./workspace/auth.env.local
    volumes:
      - ./workspace:/app/workspace
    restart: unless-stopped

  # Optional MCP sidecar: see mcp/README.md and README "Optional MCP sidecar".
  # docker compose -f docker/compose.edge.rust.yml --profile mcp-sidecar pull openfdd-mcp

  open-fdd-rust-backend:
    profiles: ["rust-prod"]
    build:
      context: .
      dockerfile: Dockerfile.rust
    network_mode: host
    volumes:
      - ./workspace:/app/workspace
    restart: unless-stopped

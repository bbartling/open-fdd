[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "openfdd-agent-shell"
version = "0.2.0"
description = "TOML manifest loader, workspace memory, cron scheduler, and Codex chat shell for Open-FDD skills."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "tomli>=2.0.0; python_version < '3.11'",
    "croniter>=2.0.0",
]

[project.optional-dependencies]
dev = ["pytest>=7.0"]

[project.scripts]
openfdd-agent-shell = "openfdd_agent_shell.cli:main"
openfdd-workspace-cron = "openfdd_agent_shell.cron_cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]

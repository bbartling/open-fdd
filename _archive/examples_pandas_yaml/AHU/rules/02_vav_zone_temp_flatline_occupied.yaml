name: vav_zone_temp_flatline_occupied_8_to_5
version: 1
type: expression
description: VAV zone temperature sensor flatline during occupied office hours, Monday-Friday 8:00-17:00.
equipment_type:
  - Variable_Air_Volume_Box
  - Variable_Air_Volume_Box_With_Reheat
  - VAV
inputs:
  Zone_Air_Temperature_Sensor:
    brick: Zone_Air_Temperature_Sensor
params:
  occupied_start_hour: 8
  occupied_end_hour: 17
  roll_samples: 12
  flatline_tolerance_f: 0.05
rolling_window: 12
expression: |
  (
    (Zone_Air_Temperature_Sensor.index.dayofweek < 5)
    & (Zone_Air_Temperature_Sensor.index.hour >= occupied_start_hour)
    & (Zone_Air_Temperature_Sensor.index.hour < occupied_end_hour)
    & (
      Zone_Air_Temperature_Sensor.rolling(window=roll_samples).count() >= roll_samples
    )
    & (
      (
        Zone_Air_Temperature_Sensor.rolling(window=roll_samples).max()
        - Zone_Air_Temperature_Sensor.rolling(window=roll_samples).min()
      ) <= flatline_tolerance_f
    )
  )
flag: vav_zone_temp_flatline_occ_fault
severity: warning

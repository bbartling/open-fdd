  title: Context-aware sensor rate of change
  description: "Implausible sustained rate-of-change for mapped sensors. Thresholds\
    \ depend on quantity, location, and operating state (steady vs startup/shutdown\
    \ transient). Engineering screening defaults \u2014 tune per site. Alias: SV-SLEW.\
    \ Distinct from SV-SPIKE (one-sample jump), SV-RANGE, SV-FLATLINE, and PID-HUNT-1."
  summary: Flags implausible sustained sensor rates of change using location- and
    state-aware thresholds.

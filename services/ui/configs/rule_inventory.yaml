    \ valves, fan speeds, heat/cool cmds) with span \u226520%, TV \u2265500 %\xB7\
    pts, \u22652.5 equivalent cycles, \u22654 reversals \u2014 suspected loop hunting\
    \ (not proof of bad PID alone)."

# Deploy and run fake BACnet devices (AHU + VAV) for Open FDD test bench.
#
# - Optional: update Pi OS packages (apt update/upgrade). Skip with --skip-tags update.
# - Pushes fault_schedule.py + the correct script per host (SCP/copy).
# - Ensures a venv at deploy_path, installs bacpypes3 and ifaddr (or uses existing).
# - Installs a systemd unit and restarts the service; verifies it is running.
#
# Usage (from repo root or from this directory):
#   ansible-playbook -i scripts/fake_bacnet_devices/inventory.yml scripts/fake_bacnet_devices/playbook.yml
#   ansible-playbook -i inventory.yml playbook.yml --skip-tags update   # deploy only, no apt upgrade
#   ansible-playbook -i inventory.yml playbook.yml --limit ahu_fake   # AHU only
---
# Optional: run apt update/upgrade. Skip with --skip-tags update (recommended on Armbian to avoid raspi-firmware conflicts).
- name: Update Pi OS packages
  hosts: ahu_fake,vav_fake
  become: true
  tags:
    - update
  tasks:
    - name: apt update and upgrade
      ansible.builtin.apt:
        update_cache: true
        upgrade: safe
        cache_valid_time: 3600
      register: apt_upgrade
      ignore_errors: true   # don't block deploy if one Pi has apt/dpkg conflicts (e.g. Armbian vs raspi-firmware)
    - name: Show upgrade result
      ansible.builtin.debug:
        msg: "{{ apt_upgrade.stdout_lines | default(apt_upgrade.msg) }}"
      when: apt_upgrade is changed
    - name: Warn if apt upgrade failed
      ansible.builtin.debug:
        msg: "apt upgrade failed on {{ inventory_hostname }} (e.g. Armbian conflict). Deploy will continue. Fix with --skip-tags update or resolve dpkg on the Pi."
      when: apt_upgrade is failed

- name: Deploy and run fake AHU BACnet device
  hosts: ahu_fake
  become: true
  vars:
    device_script: fake_ahu_faults.py
    device_name: BensFakeAhu
    device_instance: "3456789"
  tasks:
    - name: Ensure deploy directory exists
      ansible.builtin.file:
        path: "{{ deploy_path }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    - name: Copy fault_schedule.py (required by script)
      ansible.builtin.copy:
        src: fault_schedule.py
        dest: "{{ deploy_path }}/fault_schedule.py"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0644"

    - name: Copy fake AHU script
      ansible.builtin.copy:
        src: fake_ahu_faults.py
        dest: "{{ deploy_path }}/fake_ahu_faults.py"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    - name: Ensure virtualenv and install dependencies
      ansible.builtin.pip:
        name:
          - bacpypes3
          - ifaddr
        virtualenv: "{{ deploy_path }}/venv"
        virtualenv_command: python3 -m venv
        state: present
      register: pip_install
      changed_when: pip_install.changed

    - name: Install systemd unit for fake AHU
      ansible.builtin.template:
        src: fake_bacnet.service.j2
        dest: /etc/systemd/system/openfdd-fake-ahu.service
        mode: "0644"

    - name: Restart and enable fake AHU service (stops existing process so new code runs)
      ansible.builtin.systemd:
        name: openfdd-fake-ahu
        state: restarted
        enabled: true
        daemon_reload: true

    - name: Verify fake AHU service is running
      ansible.builtin.command: systemctl is-active openfdd-fake-ahu
      register: ahu_status
      changed_when: false
    - name: Fail if fake AHU service not active
      ansible.builtin.fail:
        msg: "openfdd-fake-ahu is not active on {{ inventory_hostname }} ({{ ahu_status.stdout }})"
      when: ahu_status.rc != 0
    - name: Report fake AHU OK
      ansible.builtin.debug:
        msg: "openfdd-fake-ahu is {{ ahu_status.stdout }} on {{ inventory_hostname }}"

- name: Deploy and run fake VAV BACnet device
  hosts: vav_fake
  become: true
  vars:
    device_script: fake_vav_faults.py
    device_name: Zone1VAV
    device_instance: "3456790"
  tasks:
    - name: Ensure deploy directory exists
      ansible.builtin.file:
        path: "{{ deploy_path }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    - name: Copy fault_schedule.py (required by script)
      ansible.builtin.copy:
        src: fault_schedule.py
        dest: "{{ deploy_path }}/fault_schedule.py"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0644"

    - name: Copy fake VAV script
      ansible.builtin.copy:
        src: fake_vav_faults.py
        dest: "{{ deploy_path }}/fake_vav_faults.py"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    - name: Ensure virtualenv and install dependencies
      ansible.builtin.pip:
        name:
          - bacpypes3
          - ifaddr
        virtualenv: "{{ deploy_path }}/venv"
        virtualenv_command: python3 -m venv
        state: present
      register: pip_install
      changed_when: pip_install.changed

    - name: Install systemd unit for fake VAV
      ansible.builtin.template:
        src: fake_bacnet.service.j2

# Optional: use when running the playbook from this directory.
# Example: cd scripts/fake_bacnet_devices && ansible-playbook -i inventory.yml playbook.yml
[defaults]
# Avoid prompt on first connect to test bench Pis (optional; only for trusted lab network)
host_key_checking = False
# Use inventory in this directory by default when run from here
inventory = inventory.yml
# Reduce parallelism so logs are readable when debugging
forks = 2

[ssh_connection]
# Slightly longer timeout for slow or high-latency links
ssh_args = -o ConnectTimeout=15

# One-off: fix broken dpkg state on both Pis (e.g. after raspi-firmware vs Armbian conflict).
# Uses same inventory (ben/ben). Run from repo root:
#   ansible-playbook -i scripts/fake_bacnet_devices/inventory.yml scripts/fake_bacnet_devices/fix_dpkg.yml
---
- name: Fix dpkg and apt on both Pis
  hosts: ahu_fake,vav_fake
  become: true
  tasks:
    - name: dpkg --configure -a
      ansible.builtin.command: dpkg --configure -a
      register: dpkg_configure
      ignore_errors: true
    - name: apt-get install -f -y
      ansible.builtin.command: apt-get install -f -y
      register: apt_fix
      ignore_errors: true
    - name: Report result
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: dpkg {{ 'ok' if dpkg_configure.rc == 0 else 'had errors' }}, apt -f {{ 'ok' if apt_fix is not failed else 'had errors' }}"

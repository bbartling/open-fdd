name: ahu_internal_temp_sensor_bounds
version: 1
type: expression
description: AHU internal temperature sensors outside broad plausible engineering bounds.
equipment_type:
  - Air_Handling_Unit
  - AHU
  - VAV_AHU
inputs:
  Supply_Air_Temperature_Sensor:
    brick: Supply_Air_Temperature_Sensor
  Mixed_Air_Temperature_Sensor:
    brick: Mixed_Air_Temperature_Sensor
  Return_Air_Temperature_Sensor:
    brick: Return_Air_Temperature_Sensor
params:
  min_temp_f: 35.0
  max_temp_f: 120.0
rolling_window: 3
expression: |
  (
    (Supply_Air_Temperature_Sensor < min_temp_f)
    | (Supply_Air_Temperature_Sensor > max_temp_f)
    | (Mixed_Air_Temperature_Sensor < min_temp_f)
    | (Mixed_Air_Temperature_Sensor > max_temp_f)
    | (Return_Air_Temperature_Sensor < min_temp_f)
    | (Return_Air_Temperature_Sensor > max_temp_f)
  )
flag: ahu_internal_temp_sensor_bounds_fault
severity: warning

# Production-style stack: Rust edge + JWT auth + Caddy TLS reverse proxy.
#
# Build from source (pen-test / lab):
#   cp .env.example .env
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Validate:
#   ./scripts/openfdd_prod_validate.sh
#
# NEVER: docker compose down -v
# NEVER: delete workspace/

name: openfdd-prod

services:
  openfdd-bridge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openfdd-bridge
    environment:
      SERVICE_MODE: bridge
      PORT: "8080"
      FRONTEND_DIR: /app/frontend
      OPENFDD_WORKSPACE: /app/workspace
      OFDD_AUTH_REQUIRED: "true"
      OPENFDD_BACNET_MODE: ${OPENFDD_BACNET_MODE:-simulated}
      OPENFDD_MODBUS_MODE: ${OPENFDD_MODBUS_MODE:-simulated}
    env_file:
      - ./workspace/auth.env.local
    volumes:
      - ./workspace:/app/workspace
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  openfdd-commission:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openfdd-commission
    environment:
      SERVICE_MODE: commission
      PORT: "9091"
      OPENFDD_WORKSPACE: /app/workspace
      OPENFDD_BACNET_MODE: ${OPENFDD_BACNET_MODE:-simulated}
      OPENFDD_MODBUS_MODE: ${OPENFDD_MODBUS_MODE:-simulated}
    env_file:
      - ./workspace/auth.env.local
    volumes:
      - ./workspace:/app/workspace
    restart: unless-stopped

  openfdd-haystack-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openfdd-haystack-gateway
    environment:
      SERVICE_MODE: haystack-gateway
      PORT: "9092"
      OPENFDD_WORKSPACE: /app/workspace
    env_file:
      - ./workspace/auth.env.local
    volumes:
      - ./workspace:/app/workspace
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: openfdd-caddy
    depends_on:
      openfdd-bridge:
        condition: service_healthy
    ports:
      - "${OPENFDD_HTTPS_PORT:-443}:443"
      - "${OPENFDD_HTTP_PORT:-80}:80"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:

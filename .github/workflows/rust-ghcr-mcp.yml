name: Publish Open-FDD MCP to GHCR

on:
  push:
    tags:
      - "v*.*.*"
      - "open-fdd-v*"
    branches:
      - master
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag (default VERSION file)"
        required: false
        default: ""

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/bbartling/openfdd-mcp

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: rustfmt
      - run: cargo fmt --all --check
      - run: cargo build --release -p openfdd-mcp
      - run: docker build -f Dockerfile.mcp -t openfdd-mcp:ci .

  publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        run: |
          chmod +x scripts/resolve_ghcr_publish_tag.sh
          # shellcheck source=scripts/resolve_ghcr_publish_tag.sh
          source scripts/resolve_ghcr_publish_tag.sh
          tag="$(resolve_ghcr_publish_tag "${GITHUB_REF_NAME}" "${{ inputs.image_tag }}")"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - id: tags
        run: |
          tags="${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}"
          tags="${tags},${{ env.IMAGE }}:${{ github.sha }}"
          if [[ "${{ github.ref }}" == "refs/heads/master" ]]; then
            tags="${tags},${{ env.IMAGE }}:latest"
          fi
          echo "tags=$tags" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.mcp
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

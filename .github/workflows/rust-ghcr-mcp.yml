# Transitional MCP-only image — MCP binary is also bundled in openfdd-edge-rust.
# Nightly on master; semver/beta/stable via rust-release.yml.
name: Publish Open-FDD MCP to GHCR

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  MCP_IMAGE: ghcr.io/bbartling/openfdd-mcp

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: rustfmt
      - run: cargo fmt --all --check
      - run: cargo build --release -p openfdd-mcp
      - run: docker build -f Dockerfile.mcp -t openfdd-mcp:ci .

  publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.MCP_IMAGE }}
          tags: |
            type=raw,value=nightly
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=Open-FDD MCP
            org.opencontainers.image.source=https://github.com/bbartling/open-fdd
            org.opencontainers.image.description=MCP stdio sidecar — prefer openfdd-edge-rust with entrypoint openfdd-mcp
            org.opencontainers.image.version=nightly

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.mcp
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            OPENFDD_IMAGE_TAG=nightly
            OPENFDD_BUILD_GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

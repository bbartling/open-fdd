name: Desktop UI

on:
  pull_request:
    branches: [main, master, develop]
  push:
    branches: [main, master, develop]

jobs:
  desktop-ui-test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/desktop-ui/package-lock.json

      - name: Install frontend deps
        working-directory: apps/desktop-ui
        run: npm install

      - name: Run frontend unit tests (Vitest)
        working-directory: apps/desktop-ui
        run: npm run test

      - name: Build desktop UI
        working-directory: apps/desktop-ui
        run: npm run build

name: Rust Edge CI

on:
  push:
  pull_request:

jobs:
  rust:
    name: Rust format and tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: rustfmt

      - name: Format
        run: cargo fmt --all --check

      - name: Check
        run: cargo check --workspace --all-targets

      - name: Test
        run: cargo test --workspace --all-targets

      - name: Anti-hardcoding audit
        run: bash -n scripts/audit_no_private_bench_hardcoding.sh && ./scripts/audit_no_private_bench_hardcoding.sh

  frontend:
    name: TypeScript dashboard build and tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dashboard dependencies
        working-directory: workspace/dashboard
        run: npm ci

      - name: Vitest
        working-directory: workspace/dashboard
        run: npm test

      - name: Production build
        working-directory: workspace/dashboard
        env:
          VITE_OUT_DIR: ../../frontend
        run: npm run build

      - name: Built UI guards
        run: |
          test -f frontend/index.html
          grep -q "Drivers" workspace/dashboard/src/pages/DriversPage.tsx
          grep -q "SupervisoryOverridePanel" workspace/dashboard/src/components/SupervisoryOverridePanel.tsx
          ! grep -R "Rule Lab" workspace/dashboard/src frontend/index.html || true

      - name: BACnet NIC helper guards
        run: |
          test -x scripts/openfdd_bacnet_nic_setup.sh
          bash -n scripts/openfdd_bacnet_nic_setup.sh
          test -f .env.example
          grep -q "OPENFDD_BACNET_MODE=live" .env.example
          grep -q "OPENFDD_VALIDATION_PROFILE" .env.example
          test -x scripts/audit_no_private_bench_hardcoding.sh
          ./scripts/audit_no_private_bench_hardcoding.sh
          test -f docker-compose.bacnet-live.yml
          test -f VERSION
          grep -q "3.2.4" VERSION

  docker:
    name: Docker image build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker build
        run: docker build -t open-fdd-rust-edge:ci .

  compose-smoke:
    name: Docker Compose API smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare workspace for non-root container user
        run: |
          mkdir -p workspace/overrides workspace/bacnet/overrides workspace/data/drivers workspace/logs workspace/reports/generated
          cat > workspace/data.env.local <<'EOF'
          OPENFDD_BACNET_MODE=live
          OPENFDD_MODBUS_MODE=live
          EOF
          cat > workspace/auth.env.local <<'EOF'
          OFDD_AUTH_REQUIRED=true
          OFDD_AUTH_SECRET=ci-test-secret-openfdd-edge-do-not-use-in-production
          OFDD_OPERATOR_USER=operator
          OFDD_OPERATOR_PASSWORD=ci-operator-pass
          OFDD_INTEGRATOR_USER=integrator
          OFDD_INTEGRATOR_PASSWORD=ci-integrator-pass
          OFDD_AGENT_USER=agent
          OFDD_AGENT_PASSWORD=ci-agent-pass
          EOF
          chmod 600 workspace/auth.env.local
          sudo chown -R 10001:10001 workspace/overrides workspace/bacnet workspace/data workspace/logs workspace/reports

      - name: Compose build
        run: docker compose build --no-cache

      - name: Compose up
        run: docker compose up -d

      - name: Wait for bridge
        run: |
          for i in $(seq 1 40); do
            if curl -fsS http://127.0.0.1:8080/api/health >/tmp/health.json; then
              cat /tmp/health.json
              exit 0
            fi
            sleep 2
          done
          docker compose logs
          exit 1

      - name: UI served is TypeScript driver-tree build
        run: |
          curl -fsS http://127.0.0.1:8080/ | grep -q 'id="root"'
          curl -fsS http://127.0.0.1:8080/ | grep -q '/assets/index-'

      - name: BACnet override scanner smoke
        run: |
          AGENT_PW="$(grep '^OFDD_AGENT_PASSWORD=' workspace/auth.env.local | cut -d= -f2- | tr -d '\r')"
          TOKEN="$(curl -fsS -X POST http://127.0.0.1:8080/api/auth/login \
            -H 'Content-Type: application/json' \
            -d "$(jq -nc --arg p "$AGENT_PW" '{username:"agent",password:$p}')" | jq -r '.token // .access_token')"

          test -n "$TOKEN"
          test "$TOKEN" != "null"

          curl -fsS http://127.0.0.1:8080/api/bacnet/driver/tree \
            -H "Authorization: Bearer $TOKEN" | jq -e '((.drivers // []) | length >= 1) or ((.devices // []) | length >= 1)'

          curl -fsS http://127.0.0.1:8080/api/bacnet/commission/status \
            -H "Authorization: Bearer $TOKEN" | jq -e '.config.mode == "live"'

          curl -fsS -X POST http://127.0.0.1:8080/api/bacnet/overrides/scan-once \
            -H "Authorization: Bearer $TOKEN" \
            -H 'Content-Type: application/json' \
            -d '{}' | jq -e '.ok == true and (.summary.total // 0) >= 0'

          curl -fsS http://127.0.0.1:8080/api/bacnet/overrides/status \
            -H "Authorization: Bearer $TOKEN" | jq -e '.ok == true'

          curl -fsS http://127.0.0.1:8080/api/bacnet/overrides/export \
            -H "Authorization: Bearer $TOKEN" | grep "scanned_at"

          curl -fsS -D - -o /dev/null http://127.0.0.1:8080/api/bacnet/overrides/export \
            -H "Authorization: Bearer $TOKEN" | grep -i 'Content-Disposition: attachment; filename="bacnet_overrides_export.csv"'

          curl -fsS http://127.0.0.1:8080/api/bacnet/overrides/summary \
            -H "Authorization: Bearer $TOKEN" | jq -e '.ok == true and (.operator_priority // 0) >= 1'

          curl -fsS http://127.0.0.1:8080/api/bacnet/overrides/export/p8 \
            -H "Authorization: Bearer $TOKEN" | grep "override_kind"

          curl -fsS http://127.0.0.1:8080/api/bacnet/overrides/export/non-p8 \
            -H "Authorization: Bearer $TOKEN" | grep "override_kind"

      - name: Modbus live-mode smoke
        run: |
          AGENT_PW="$(grep '^OFDD_AGENT_PASSWORD=' workspace/auth.env.local | cut -d= -f2- | tr -d '\r')"
          TOKEN="$(curl -fsS -X POST http://127.0.0.1:8080/api/auth/login \
            -H 'Content-Type: application/json' \
            -d "$(jq -nc --arg p "$AGENT_PW" '{username:"agent",password:$p}')" | jq -r '.token // .access_token')"

          curl -fsS http://127.0.0.1:8080/api/modbus/points \
            -H "Authorization: Bearer $TOKEN" | jq -e 'type == "array"'

          curl -fsS http://127.0.0.1:8080/api/modbus/commission/status \
            -H "Authorization: Bearer $TOKEN" | jq -e '.ok == true and .config.mode == "live"'

          curl -fsS -X POST http://127.0.0.1:8080/api/modbus/scan \
            -H "Authorization: Bearer $TOKEN" \
            -H 'Content-Type: application/json' \
            -d '{}' | jq -e '.ok == false'

          curl -fsS -X POST http://127.0.0.1:8080/api/modbus/read \
            -H "Authorization: Bearer $TOKEN" \
            -H 'Content-Type: application/json' \
            -d '{"register":40001,"function":"holding_register"}' | jq -e '.ok == false'

      - name: FDD Wires and DataFusion SQL
        run: |
          INTEGRATOR_PW="$(grep '^OFDD_INTEGRATOR_PASSWORD=' workspace/auth.env.local | cut -d= -f2- | tr -d '\r')"
          AGENT_PW="$(grep '^OFDD_AGENT_PASSWORD=' workspace/auth.env.local | cut -d= -f2- | tr -d '\r')"
          INT="$(curl -fsS -X POST http://127.0.0.1:8080/api/auth/login \
            -H 'Content-Type: application/json' \
            -d "$(jq -nc --arg p "$INTEGRATOR_PW" '{username:"integrator",password:$p}')" | jq -r '.token // .access_token')"
          AGENT="$(curl -fsS -X POST http://127.0.0.1:8080/api/auth/login \
            -H 'Content-Type: application/json' \
            -d "$(jq -nc --arg p "$AGENT_PW" '{username:"agent",password:$p}')" | jq -r '.token // .access_token')"

          curl -fsS http://127.0.0.1:8080/api/fdd-wires/graphs?site_id=site:unknown \
            -H "Authorization: Bearer $INT" | jq -e '.ok == true'

          curl -fsS -X POST http://127.0.0.1:8080/api/fdd-wires/propose-assignments \
            -H "Authorization: Bearer $AGENT" -H 'Content-Type: application/json' \
            -d '{"site_id":"site:unknown","equipment_type":"ahu"}' | jq -e '.review_status == "needs_review"'

          curl -fsS -X POST http://127.0.0.1:8080/api/fdd-rules/oa_temp_out_of_range/test-sql \
            -H "Authorization: Bearer $INT" -H 'Content-Type: application/json' \
            -d '{"sql":"SELECT timestamp, equipment_id, oa_t FROM telemetry_pivot LIMIT 1","confirmation_seconds":300}' \
            | jq -e '.ok == false or (.engine | type == "string")'

          curl -sS -X POST http://127.0.0.1:8080/api/fdd-rules/oa_temp_out_of_range/activate \
            -H "Authorization: Bearer $AGENT" -H 'Content-Type: application/json' -d '{}' \
            | jq -e '.ok == false'

          curl -fsS http://127.0.0.1:8080/api/fdd-schema/fdd-inputs \
            -H "Authorization: Bearer $INT" | jq -e '(.fdd_inputs // []) | length >= 1'

          curl -fsS http://127.0.0.1:8080/api/rules \
            -H "Authorization: Bearer $INT" | jq -e '.ok == true'

      - name: No-hardcoding audit
        run: ./scripts/audit_no_private_bench_hardcoding.sh

      - name: CSV files created in workspace
        run: |
          test -f workspace/bacnet/overrides/registry.json
          test -f workspace/bacnet/overrides/overrides_export.csv
          test -f workspace/overrides/bacnet_overrides.csv
          test -f workspace/overrides/bacnet_priority8_overrides.csv
          test -f workspace/overrides/bacnet_non_priority8_overrides.csv
          test -f workspace/overrides/last_scan.json

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Compose down
        if: always()
        run: docker compose down

# open-fdd: engine tests (open_fdd/tests). PyPI release is the open_fdd package only.

name: CI

on:
  pull_request:
    branches: [main, master, develop]
  push:
    branches: [main, master, develop]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install package (dev deps for tests)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # pdf/open-fdd-docs.txt is gitignored; generate it so /model-context/docs matches release builds.
      - name: Build combined docs text (LLM context)
        run: python scripts/build_docs_pdf.py --no-pdf

      - name: Run tests (pytest)
        run: python -m pytest
        env:
          OFDD_API_KEY: ""
          OFDD_CADDY_INTERNAL_SECRET: ""

      - name: Build open-fdd sdist/wheel (engine only; dry run)
        run: |
          python -m pip install build==1.2.2 twine==6.1.0
          python -m build
          twine check dist/*

      - name: Build openfdd-engine package (dry run)
        working-directory: packages/openfdd-engine
        run: |
          python -m pip install build==1.2.2 twine==6.1.0
          python -m build
          twine check dist/*

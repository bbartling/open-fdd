# Matches scripts/bootstrap.sh --test: frontend (lint + typecheck), backend (pytest), Caddy validate.
# E2E Selenium tests are not run here (require Chrome + running stack); run locally with scripts/e2e_frontend_selenium.py.

name: CI

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master
      - develop

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Backend (pytest)
        run: pytest open_fdd/tests/ -v --tb=short
        env:
          OFDD_API_KEY: ""
          OFDD_CADDY_INTERNAL_SECRET: ""

      - name: Set up Node (frontend)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend && npm ci

      - name: Frontend (lint + typecheck)
        run: |
          cd frontend && npm run lint && npx tsc -b --noEmit

      - name: Caddy (validate Caddyfile)
        run: |
          docker run --rm -v ${{ github.workspace }}/stack/caddy/Caddyfile:/etc/caddy/Caddyfile:ro caddy:2 caddy validate --config /etc/caddy/Caddyfile

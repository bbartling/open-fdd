# open-fdd: engine tests (open_fdd/tests). PyPI release is the open_fdd package only.

name: CI

on:
  pull_request:
    branches: [main, master, develop]
  push:
    branches: [main, master, develop]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install package (dev deps for tests)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build combined docs text (LLM context)
        run: python scripts/build_docs_pdf.py --no-pdf

      - name: Run engine tests (pytest)
        run: python -m pytest open_fdd/tests/engine

      - name: Build open-fdd sdist/wheel (engine only; dry run)
        run: |
          python -m pip install build==1.2.2 twine==6.1.0
          python -m build
          twine check dist/*

      - name: Verify wheel imports engine with extras
        run: |
          python -m venv /tmp/ofdd-wheel-smoke
          /tmp/ofdd-wheel-smoke/bin/pip install "dist/*.whl[engine]"
          /tmp/ofdd-wheel-smoke/bin/python -c "from open_fdd.engine import RuleRunner; import open_fdd; assert open_fdd.__version__"

      - name: Build openfdd-engine package (dry run)
        working-directory: packages/openfdd-engine
        run: |
          python -m pip install build==1.2.2 twine==6.1.0
          python -m build
          twine check dist/*

  agent-shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install engine and agent shell
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install -e packages/openfdd-agent-shell[dev]
      - name: Test agent shell
        working-directory: packages/openfdd-agent-shell
        run: python -m pytest -q

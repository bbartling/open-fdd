name: Rust Edge CI

on:
  push:
  pull_request:

jobs:
  rust:
    name: Rust format and tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0
          components: rustfmt

      - name: Format
        run: cargo fmt --all --check

      - name: Check
        run: cargo check --workspace --all-targets

      - name: Test
        run: cargo test --workspace --all-targets

  frontend:
    name: Frontend syntax and legacy UI guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Frontend syntax
        run: node --check frontend/app.js

      - name: New driver-tree UI is default
        run: |
          grep -q "REAL DEAL BACNET CSV BUILD" frontend/app.js
          ! grep -R "Rule Lab" frontend/app.js frontend/index.html
          ! grep -R "/api/haystack/model" frontend/app.js frontend/index.html
          ! grep -R "Open-FDD-style tabs" frontend/app.js frontend/index.html

  docker:
    name: Docker image build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker build
        run: docker build -t open-fdd-rust-edge:ci .

  compose-smoke:
    name: Docker Compose API smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compose build
        run: docker compose build --no-cache

      - name: Compose up
        run: docker compose up -d

      - name: Wait for bridge
        run: |
          for i in $(seq 1 40); do
            if curl -fsS http://127.0.0.1:8080/api/health >/tmp/health.json; then
              cat /tmp/health.json
              exit 0
            fi
            sleep 2
          done
          docker compose logs
          exit 1

      - name: UI served is new driver-tree build
        run: |
          curl -fsS http://127.0.0.1:8080/app.js | grep "REAL DEAL BACNET CSV BUILD"
          ! curl -fsS http://127.0.0.1:8080/app.js | grep "Rule Lab"
          ! curl -fsS http://127.0.0.1:8080/app.js | grep "/api/haystack/model"

      - name: BACnet override scanner smoke
        run: |
          TOKEN="$(curl -fsS -X POST http://127.0.0.1:8080/api/auth/login \
            -H 'Content-Type: application/json' \
            -d '{"sub":"ci","role":"agent"}' | jq -r .access_token)"

          test -n "$TOKEN"
          test "$TOKEN" != "null"

          curl -fsS http://127.0.0.1:8080/api/bacnet/driver/tree \
            -H "Authorization: Bearer $TOKEN" | jq -e '.drivers | length >= 4'

          curl -fsS -X POST http://127.0.0.1:8080/api/bacnet/overrides/scan-once \
            -H "Authorization: Bearer $TOKEN" \
            -H 'Content-Type: application/json' \
            -d '{}' | jq -e '.ok == true and .summary.total >= 1'

          curl -fsS http://127.0.0.1:8080/api/bacnet/overrides/status \
            -H "Authorization: Bearer $TOKEN" | jq -e '.ok == true and .summary.priority8 >= 1'

          curl -fsS http://127.0.0.1:8080/api/bacnet/overrides/export \
            -H "Authorization: Bearer $TOKEN" | grep "timestamp,scan_id"

          curl -fsS http://127.0.0.1:8080/api/bacnet/overrides/export/p8 \
            -H "Authorization: Bearer $TOKEN" | grep "priority_kind"

          curl -fsS http://127.0.0.1:8080/api/bacnet/overrides/export/non-p8 \
            -H "Authorization: Bearer $TOKEN" | grep "priority_kind"

      - name: CSV files created in workspace
        run: |
          test -f workspace/overrides/bacnet_overrides.csv
          test -f workspace/overrides/bacnet_priority8_overrides.csv
          test -f workspace/overrides/bacnet_non_priority8_overrides.csv
          test -f workspace/overrides/last_scan.json

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Compose down
        if: always()
        run: docker compose down

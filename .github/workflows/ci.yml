# open-fdd: engine tests (open_fdd/tests). PyPI release is the open_fdd package only.

name: CI

on:
  pull_request:
    branches: [main, master, develop, dev, dev/**]
  push:
    branches: [main, master, develop, dev, dev/**]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install package (dev deps for tests)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build combined docs text bundle
        run: python scripts/build_docs_pdf.py --no-pdf

      - name: Run engine tests (pytest)
        run: python -m pytest open_fdd/tests/engine

      - name: Build open-fdd sdist/wheel (engine only; dry run)
        run: |
          python -m pip install build==1.2.2 twine==6.1.0
          python -m build
          twine check dist/*

      - name: Verify wheel imports engine with extras
        run: |
          python -m venv /tmp/ofdd-wheel-smoke
          wheel="$(ls -1t dist/*.whl | head -n 1)"
          test -n "$wheel"
          /tmp/ofdd-wheel-smoke/bin/pip install "${wheel}[engine]"
          /tmp/ofdd-wheel-smoke/bin/python -c "from open_fdd.engine import RuleRunner; import open_fdd; assert open_fdd.__version__"

      - name: Build openfdd-engine package (dry run)
        working-directory: packages/openfdd-engine
        run: |
          python -m pip install build==1.2.2 twine==6.1.0
          python -m build
          twine check dist/*

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: docs

      - name: Build Jekyll site (Just the Docs)
        working-directory: docs
        run: bundle install && bundle exec jekyll build -d "${{ github.workspace }}/_site"
        env:
          JEKYLL_ENV: production

      - name: Verify Just the Docs theme assets
        run: |
          set -euo pipefail
          site="${{ github.workspace }}/_site"
          index="$site/index.html"
          css_dir="$site/assets/css"
          test -f "$index"
          test -d "$css_dir"
          find "$css_dir" -maxdepth 1 -name '*.css' -size +8k -print -quit | grep -q .
          grep -qE 'site-nav|side-bar' "$index"

      - name: Check internal links (HTMLProofer)
        run: |
          gem install html-proofer -v '~> 5.0' --no-document
          "$(ruby -e 'puts Gem.bindir')/htmlproofer" "${{ github.workspace }}/_site" \
            --assume-extension .html \
            --swap-urls '^/open-fdd/:/' \
            --ignore-files "/404\\.html\$/" \
            --disable-external \
            --allow-hash-href \
            --ignore-empty-alt \
            --ignore-missing-alt

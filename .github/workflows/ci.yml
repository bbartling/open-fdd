# open-fdd: engine tests (open_fdd/tests). PyPI release is the open_fdd package only.

name: CI

on:
  pull_request:
    branches: [main, master, develop]
  push:
    branches: [main, master, develop]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: core
            python-version: "3.10"
            install-extras: '.[dev]'
            numpy-spec: ""
          - profile: core
            python-version: "3.11"
            install-extras: '.[dev]'
            numpy-spec: ""
          - profile: core
            python-version: "3.12"
            install-extras: '.[dev]'
            numpy-spec: ""
          - profile: core
            python-version: "3.13"
            install-extras: '.[dev]'
            numpy-spec: ""
          - profile: core
            python-version: "3.14"
            install-extras: '.[dev]'
            numpy-spec: ""
          - profile: desktop-numpy1
            python-version: "3.10"
            install-extras: '.[dev,desktop]'
            numpy-spec: "numpy>=1,<2"
          - profile: desktop-numpy1
            python-version: "3.11"
            install-extras: '.[dev,desktop]'
            numpy-spec: "numpy>=1,<2"
          - profile: desktop-numpy1
            python-version: "3.12"
            install-extras: '.[dev,desktop]'
            numpy-spec: "numpy>=1,<2"
          - profile: desktop-numpy1
            python-version: "3.13"
            install-extras: '.[dev,desktop]'
            numpy-spec: "numpy>=1,<2"
          - profile: desktop-numpy1
            python-version: "3.14"
            install-extras: '.[dev,desktop]'
            numpy-spec: "numpy>=1,<2"
          - profile: desktop-numpy2
            python-version: "3.10"
            install-extras: '.[dev,desktop]'
            numpy-spec: "numpy>=2,<3"
          - profile: desktop-numpy2
            python-version: "3.11"
            install-extras: '.[dev,desktop]'
            numpy-spec: "numpy>=2,<3"
          - profile: desktop-numpy2
            python-version: "3.12"
            install-extras: '.[dev,desktop]'
            numpy-spec: "numpy>=2,<3"
          - profile: desktop-numpy2
            python-version: "3.13"
            install-extras: '.[dev,desktop]'
            numpy-spec: "numpy>=2,<3"
          - profile: desktop-numpy2
            python-version: "3.14"
            install-extras: '.[dev,desktop]'
            numpy-spec: "numpy>=2,<3"

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install package (dev deps for tests)
        run: |
          python -m pip install --upgrade pip
          pip install -e "${{ matrix.install-extras }}"
          if [ -n "${{ matrix.numpy-spec }}" ]; then pip install "${{ matrix.numpy-spec }}"; fi

      # pdf/open-fdd-docs.txt is gitignored; generate it so /model-context/docs matches release builds.
      - name: Build combined docs text (LLM context)
        run: python scripts/build_docs_pdf.py --no-pdf

      - name: Run tests (pytest)
        run: python -m pytest
        env:
          OFDD_API_KEY: ""
          OFDD_CADDY_INTERNAL_SECRET: ""

      - name: Build open-fdd sdist/wheel (engine only; dry run)
        run: |
          python -m pip install build==1.2.2 twine==6.1.0
          python -m build
          twine check dist/*

      - name: Build openfdd-engine package (dry run)
        working-directory: packages/openfdd-engine
        run: |
          python -m pip install build==1.2.2 twine==6.1.0
          python -m build
          twine check dist/*

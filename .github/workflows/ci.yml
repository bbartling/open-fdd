# Backend unit tests only. Full-stack checks (lint, Caddy, etc.) run in open-fdd-afdd-stack CI — see that repo.

name: CI

on:
  pull_request:
    branches: [main, master, develop]
  push:
    branches: [main, master, develop]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      # pdf/open-fdd-docs.txt is gitignored; generate it so /model-context/docs matches release builds.
      - name: Build combined docs text (LLM context)
        run: python scripts/build_docs_pdf.py --no-pdf

      - name: Backend (pytest)
        run: python -m pytest

      - name: Build open-fdd sdist/wheel (dry run)
        run: |
          python -m pip install build==1.2.2 twine==6.1.0
          python -m build
          twine check dist/*

      - name: Build openfdd-engine package (dry run)
        working-directory: packages/openfdd-engine
        run: |
          python -m pip install build==1.2.2 twine==6.1.0
          python -m build
          twine check dist/*

# open-fdd: engine tests (open_fdd/tests). PyPI release is the open_fdd package only.

name: CI

on:
  pull_request:
    branches: [main, master, develop, dev, dev/**]
  push:
    branches: [main, master, develop, dev, dev/**]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install package (dev deps for tests)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build combined docs text bundle
        run: python scripts/build_docs_pdf.py --no-pdf

      - name: Run engine tests (pytest)
        run: python -m pytest open_fdd/tests/engine

      - name: Build open-fdd sdist/wheel (engine only; dry run)
        run: |
          python -m pip install build==1.2.2 twine==6.1.0
          python -m build
          twine check dist/*

      - name: Verify wheel imports engine with extras
        run: |
          python -m venv /tmp/ofdd-wheel-smoke
          wheel="$(ls -1t dist/*.whl | head -n 1)"
          test -n "$wheel"
          /tmp/ofdd-wheel-smoke/bin/pip install "$wheel"
          /tmp/ofdd-wheel-smoke/bin/python -c "from open_fdd.engine import RuleRunner; from open_fdd.playground import compile_evaluate; import open_fdd; assert open_fdd.__version__"

  agent-shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install engine and agent shell
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install -e "packages/openfdd-agent-shell[dev]"
      - name: Test agent shell
        working-directory: packages/openfdd-agent-shell
        run: python -m pytest -q

  operator-bridge-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: workspace/dashboard/package-lock.json
      - name: Install security audit tools
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit bandit
      - name: pip-audit bridge requirements
        run: pip-audit -r workspace/api/requirements.txt
      - name: bandit bridge (high severity)
        run: bandit -r workspace/api/openfdd_bridge -lll -q
      - name: npm audit dashboard (high+)
        working-directory: workspace/dashboard
        run: |
          npm ci
          npm audit --audit-level=high

  operator-bridge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install bridge dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install -r workspace/api/requirements.txt
          pip install -r bacnet_toolshed/requirements.txt
          pip install httpx
      - name: Test operator bridge
        env:
          OPENFDD_REPO_ROOT: ${{ github.workspace }}
          OFDD_DESKTOP_DATA_DIR: ${{ github.workspace }}/workspace/data
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/workspace/api
        run: python -m pytest tests/workspace_bridge -q

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: docs

      # Jekyll build only (no HTMLProofer — false failures with pretty permalinks + relative hrefs).
      - name: Build Jekyll site (Just the Docs)
        working-directory: docs
        run: bundle install && bundle exec jekyll build -d "${{ github.workspace }}/_site"
        env:
          JEKYLL_ENV: production
          JEKYLL_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

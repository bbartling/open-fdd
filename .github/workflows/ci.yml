name: Rust Edge CI

on:
  push:
  pull_request:

jobs:
  rust:
    name: Rust format and tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0
          components: rustfmt

      - name: Format
        run: cargo fmt --all --check

      - name: Check
        run: cargo check --workspace --all-targets

      - name: Test
        run: cargo test --workspace --all-targets

  frontend:
    name: Frontend syntax and legacy UI guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Frontend syntax
        run: |
          node --check frontend/app.js
          node --check frontend/fdd-wires.js

      - name: FDD Wires UI guards
        run: |
          grep -q "FDD Wires" frontend/app.js
          grep -q "Rule Assignment Workspace" frontend/fdd-wires.js
          grep -q "Raw DataFusion SQL" frontend/fdd-wires.js
          ! grep -Ri "grafana\|rubix\|nubeio\|nubedev\|niagara" frontend/app.js frontend/fdd-wires.js frontend/index.html

      - name: New driver-tree UI is default
        run: |
          grep -q "REAL DEAL BACNET CSV BUILD" frontend/app.js
          ! grep -R "Rule Lab" frontend/app.js frontend/index.html
          ! grep -R "/api/haystack/model" frontend/app.js frontend/index.html
          ! grep -R "Open-FDD-style tabs" frontend/app.js frontend/index.html

      - name: BACnet NIC helper guards
        run: |
          test -x scripts/openfdd_bacnet_nic_setup.sh
          bash -n scripts/openfdd_bacnet_nic_setup.sh
          test -f .env.example
          grep -q "OPENFDD_BACNET_IFACE=enp3s0" .env.example
          grep -q "OPENFDD_BACNET_BIND=192.168.204.55/24:47808" .env.example
          test -f docker-compose.bacnet-live.yml
          test -f VERSION
          grep -q "3.2.0" VERSION

  docker:
    name: Docker image build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker build
        run: docker build -t open-fdd-rust-edge:ci .

  compose-smoke:
    name: Docker Compose API smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare workspace for non-root container user
        run: |
          mkdir -p workspace/overrides workspace/data/drivers workspace/logs
          cat > workspace/auth.env.local <<'EOF'
          OFDD_AUTH_REQUIRED=true
          OFDD_AUTH_SECRET=ci-test-secret-openfdd-edge-do-not-use-in-production
          OFDD_OPERATOR_USER=operator
          OFDD_OPERATOR_PASSWORD=ci-operator-pass
          OFDD_INTEGRATOR_USER=integrator
          OFDD_INTEGRATOR_PASSWORD=ci-integrator-pass
          OFDD_AGENT_USER=agent
          OFDD_AGENT_PASSWORD=ci-agent-pass
          EOF
          chmod 600 workspace/auth.env.local
          sudo chown -R 10001:10001 workspace/overrides workspace/data workspace/logs

      - name: Compose build
        run: docker compose build --no-cache

      - name: Compose up
        run: docker compose up -d

      - name: Wait for bridge
        run: |
          for i in $(seq 1 40); do
            if curl -fsS http://127.0.0.1:8080/api/health >/tmp/health.json; then
              cat /tmp/health.json
              exit 0
            fi
            sleep 2
          done
          docker compose logs
          exit 1

      - name: UI served is new driver-tree build
        run: |
          curl -fsS http://127.0.0.1:8080/app.js | grep "REAL DEAL BACNET CSV BUILD"
          ! curl -fsS http://127.0.0.1:8080/app.js | grep "Rule Lab"
          ! curl -fsS http://127.0.0.1:8080/app.js | grep "/api/haystack/model"

      - name: BACnet override scanner smoke
        run: |
          AGENT_PW="$(grep '^OFDD_AGENT_PASSWORD=' workspace/auth.env.local | cut -d= -f2- | tr -d '\r')"
          TOKEN="$(curl -fsS -X POST http://127.0.0.1:8080/api/auth/login \
            -H 'Content-Type: application/json' \
            -d "$(jq -nc --arg p "$AGENT_PW" '{username:"agent",password:$p}')" | jq -r '.token // .access_token')"

          test -n "$TOKEN"
          test "$TOKEN" != "null"

          curl -fsS http://127.0.0.1:8080/api/bacnet/driver/tree \
            -H "Authorization: Bearer $TOKEN" | jq -e '(.drivers | length >= 1) and (.bacnet_config.iface == "enp3s0" and .bacnet_config.bind == "192.168.204.55/24:47808")'

          curl -fsS http://127.0.0.1:8080/api/bacnet/commission/status \
            -H "Authorization: Bearer $TOKEN" | jq -e '.config.iface == "enp3s0" and .config.bind == "192.168.204.55/24:47808"'

          curl -fsS -X POST http://127.0.0.1:8080/api/bacnet/overrides/scan-once \
            -H "Authorization: Bearer $TOKEN" \
            -H 'Content-Type: application/json' \
            -d '{}' | jq -e '.ok == true and .summary.total >= 1'

          curl -fsS http://127.0.0.1:8080/api/bacnet/overrides/status \
            -H "Authorization: Bearer $TOKEN" | jq -e '.ok == true and .summary.priority8 >= 1'

          curl -fsS http://127.0.0.1:8080/api/bacnet/overrides/export \
            -H "Authorization: Bearer $TOKEN" | grep "timestamp,scan_id"

          curl -fsS http://127.0.0.1:8080/api/bacnet/overrides/export/p8 \
            -H "Authorization: Bearer $TOKEN" | grep "priority_kind"

          curl -fsS http://127.0.0.1:8080/api/bacnet/overrides/export/non-p8 \
            -H "Authorization: Bearer $TOKEN" | grep "priority_kind"

      - name: Modbus simulated driver smoke
        run: |
          AGENT_PW="$(grep '^OFDD_AGENT_PASSWORD=' workspace/auth.env.local | cut -d= -f2- | tr -d '\r')"
          TOKEN="$(curl -fsS -X POST http://127.0.0.1:8080/api/auth/login \
            -H 'Content-Type: application/json' \
            -d "$(jq -nc --arg p "$AGENT_PW" '{username:"agent",password:$p}')" | jq -r '.token // .access_token')"

          curl -fsS http://127.0.0.1:8080/api/modbus/points \
            -H "Authorization: Bearer $TOKEN" | jq -e 'length >= 1'

          curl -fsS http://127.0.0.1:8080/api/modbus/commission/status \
            -H "Authorization: Bearer $TOKEN" | jq -e '.ok == true and .config.mode == "simulated"'

          curl -fsS -X POST http://127.0.0.1:8080/api/modbus/scan \
            -H "Authorization: Bearer $TOKEN" \
            -H 'Content-Type: application/json' \
            -d '{}' | jq -e '.ok == true and (.points | length) >= 1'

          curl -fsS -X POST http://127.0.0.1:8080/api/modbus/read \
            -H "Authorization: Bearer $TOKEN" \
            -H 'Content-Type: application/json' \
            -d '{"register":40001,"function":"holding_register"}' | grep -q simulated

      - name: FDD Wires and DataFusion SQL smoke
        run: |
          INTEGRATOR_PW="$(grep '^OFDD_INTEGRATOR_PASSWORD=' workspace/auth.env.local | cut -d= -f2- | tr -d '\r')"
          AGENT_PW="$(grep '^OFDD_AGENT_PASSWORD=' workspace/auth.env.local | cut -d= -f2- | tr -d '\r')"
          INT="$(curl -fsS -X POST http://127.0.0.1:8080/api/auth/login \
            -H 'Content-Type: application/json' \
            -d "$(jq -nc --arg p "$INTEGRATOR_PW" '{username:"integrator",password:$p}')" | jq -r '.token // .access_token')"
          AGENT="$(curl -fsS -X POST http://127.0.0.1:8080/api/auth/login \
            -H 'Content-Type: application/json' \
            -d "$(jq -nc --arg p "$AGENT_PW" '{username:"agent",password:$p}')" | jq -r '.token // .access_token')"

          curl -fsS http://127.0.0.1:8080/api/fdd-wires/graphs?site_id=site:demo \
            -H "Authorization: Bearer $INT" | jq -e '.ok == true'

          curl -fsS http://127.0.0.1:8080/api/fdd-wires/graphs/graph:bench-5007-fdd?site_id=site:demo \
            -H "Authorization: Bearer $INT" | jq -e '.graph.nodes | length >= 4'

          curl -fsS -X POST http://127.0.0.1:8080/api/fdd-wires/propose-assignments \
            -H "Authorization: Bearer $AGENT" -H 'Content-Type: application/json' \
            -d '{"site_id":"site:demo","equipment_type":"ahu"}' | jq -e '.review_status == "needs_review"'

          curl -fsS -X POST http://127.0.0.1:8080/api/fdd-rules/oa_temp_out_of_range/test-sql \
            -H "Authorization: Bearer $INT" -H 'Content-Type: application/json' \
            -d '{"sql":"SELECT timestamp, equipment_id, oa_t, CASE WHEN oa_t > 110.0 THEN true ELSE false END AS fault_raw FROM telemetry_pivot WHERE equipment_id = '\''AHU-1'\''","confirmation_seconds":300}' \
            | jq -e '.ok == true and (.engine | type == "string") and (.engine | contains("DataFusion"))'

          curl -fsS -X POST http://127.0.0.1:8080/api/fdd-rules/oa_temp_out_of_range/activate \
            -H "Authorization: Bearer $AGENT" -H 'Content-Type: application/json' -d '{}' \
            | jq -e '.ok == false'

          curl -fsS http://127.0.0.1:8080/fdd-wires.js | grep -q "FDD Wires"

      - name: CSV files created in workspace
        run: |
          test -f workspace/overrides/bacnet_overrides.csv
          test -f workspace/overrides/bacnet_priority8_overrides.csv
          test -f workspace/overrides/bacnet_non_priority8_overrides.csv
          test -f workspace/overrides/last_scan.json

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Compose down
        if: always()
        run: docker compose down

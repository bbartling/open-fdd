name: Publish openfdd-engine

on:
  workflow_dispatch:
  push:
    tags:
      - "openfdd-engine-v*"

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          # Build runner version; wheel is py3-none-any (not tied to this Python).
          python-version: "3.14"

      - name: Build package
        working-directory: packages/openfdd-engine
        run: |
          python -m pip install --upgrade pip
          python -m pip install build==1.2.2 twine==6.1.0
          python -m build
          twine check dist/*

      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/openfdd-engine-v')
        working-directory: packages/openfdd-engine
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_OPENFDD_ENGINE_TOKEN }}
        run: |
          twine upload dist/*


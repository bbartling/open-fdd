# Optional package under packages/openfdd-engine/ (import name: openfdd_engine).
# Publishes to PyPI project **openfdd-engine** when you push tag **openfdd-engine-v***.
# Configure Trusted Publishing on PyPI for this workflow file before first upload.

name: Publish openfdd-engine

on:
  workflow_dispatch:
  push:
    tags:
      - "openfdd-engine-v*"

permissions:
  contents: read
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Build package
        working-directory: packages/openfdd-engine
        run: |
          python -m pip install --upgrade pip
          python -m pip install build==1.2.2 twine==6.1.0
          python -m build
          twine check dist/*

      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/openfdd-engine-v')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/openfdd-engine/dist/

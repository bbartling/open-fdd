# Optional in-repo package under packages/openfdd-engine/ (Python name: openfdd_engine).
#
# Canonical public distribution for the 2.x rules engine is **open-fdd** on PyPI
# (`pip install open-fdd` → `open_fdd.engine.RuleRunner`). There is no separate
# PyPI project required for engine-only use.
#
# This workflow does **not** upload to PyPI. It only verifies the optional package
# still builds. (Auto-publish on tags caused failures when no PyPI project existed.)
#
# If you later create a **openfdd-engine** project on PyPI + trusted publisher, add
# a `push.tags` trigger and a gh-action-pypi-publish step (see git history / docs).

name: Build openfdd-engine package

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Build package
        working-directory: packages/openfdd-engine
        run: |
          python -m pip install --upgrade pip
          python -m pip install build==1.2.2 twine==6.1.0
          python -m build
          twine check dist/*

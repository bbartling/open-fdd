name: Stack Security Guards

on:
  pull_request:
  push:
    branches: [ master, main ]

jobs:
  deny-old-python-shape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure old Python project shape is gone
        run: |
          test ! -f pyproject.toml
          test ! -f requirements.txt
          test ! -d open_fdd
          test ! -d bacnet_toolshed

      - name: Ensure safety docs exist
        run: |
          test -f AGENTS.md
          grep -q "Never" AGENTS.md

      - name: Keep container stack focused
        run: |
          test -f Cargo.toml
          test -f docker/compose.standalone.yml
          test -f docker/compose.csv.yml
          test -f services/central/Dockerfile
          test -f workspace/dashboard/Dockerfile
          test -f Dockerfile.mcp
          test -f .env.example
          test -d edge
          test -d services/central
          test -d workspace/dashboard
          test ! -f Dockerfile
          test ! -f docker/compose.edge.rust.yml

      - name: No obsolete UI route regressions
        run: |
          ! grep -R "Rule Lab" workspace/dashboard/src || true

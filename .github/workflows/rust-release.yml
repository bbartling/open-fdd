# Promote a coordinated stack + MCP release: CI → GHCR → git tag → GitHub Release.
# Nightly builds on master use ghcr-openfdd-stack.yml and rust-ghcr-mcp.yml.
name: Rust Release (GHCR + GitHub Release)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "SemVer (e.g. 3.3.0-beta.1 for beta, 3.3.0 for stable)"
        required: true
        default: "3.3.0-beta.1"
      channel:
        description: "Release channel"
        required: true
        default: beta
        type: choice
        options:
          - beta
          - stable

permissions:
  contents: write
  packages: write

env:
  MCP_IMAGE: ghcr.io/bbartling/openfdd-mcp
  CENTRAL_IMAGE: ghcr.io/bbartling/openfdd-central
  UI_IMAGE: ghcr.io/bbartling/openfdd-ui
  FIELDBUS_IMAGE: ghcr.io/bbartling/openfdd-fieldbus
  MQTT_IMAGE: ghcr.io/bbartling/openfdd-mqtt

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      channel: ${{ steps.ver.outputs.channel }}
    steps:
      - uses: actions/checkout@v4
      - id: ver
        run: |
          v="${{ inputs.version }}"
          v="${v#v}"
          channel="${{ inputs.channel }}"
          if ! [[ "$v" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.+-]+)?$ ]]; then
            echo "Invalid SemVer: $v" >&2
            exit 1
          fi
          file_ver="$(tr -d '[:space:]' < VERSION)"
          if [[ "$file_ver" != "$v" ]]; then
            echo "VERSION file ($file_ver) does not match input ($v)" >&2
            exit 1
          fi
          if [[ "$channel" == "beta" && "$v" != *"-beta"* ]]; then
            echo "Beta channel requires a -beta.N suffix (e.g. 3.3.0-beta.1)" >&2
            exit 1
          fi
          if [[ "$channel" == "stable" && "$v" == *"-"* ]]; then
            echo "Stable channel requires a plain semver (e.g. 3.3.0)" >&2
            exit 1
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "channel=$channel" >> "$GITHUB_OUTPUT"

  test:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: workspace/dashboard/package-lock.json
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace --all-targets
      - run: |
          cd workspace/dashboard
          npm ci
          npm run test
          VITE_OUT_DIR=dist npm run build
          test -f dist/index.html
      - run: |
          export OPENFDD_SITE_ID=local
          export OPENFDD_EDGE_ID=fieldbus-1
          export OPENFDD_MQTT_HOST=127.0.0.1
          mkdir -p deploy/mqtt/kits/local__fieldbus-1
          export OPENFDD_EDGE_KIT_DIR="$PWD/deploy/mqtt/kits/local__fieldbus-1"
          for f in docker/compose.standalone.yml docker/compose.central.yml docker/compose.edge.yml docker/compose.csv.yml; do
            docker compose -f "$f" config >/dev/null
          done
          bash scripts/release/smoke_standalone_mqtts.sh

  publish-stack:
    needs: [validate, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish stack images
        env:
          VER: ${{ needs.validate.outputs.version }}
          CHANNEL: ${{ needs.validate.outputs.channel }}
          SHA: ${{ github.sha }}
        run: |
          SHORT="$(echo "$SHA" | cut -c1-7)"
          channel_tag="beta"
          [[ "$CHANNEL" == "stable" ]] && channel_tag="latest"

          build_one() {
            local name="$1" file="$2" context="$3"
            local img="ghcr.io/bbartling/${name}"
            docker buildx build --push \
              --platform linux/amd64 \
              -f "$file" \
              -t "${img}:${VER}" \
              -t "${img}:v${VER}" \
              -t "${img}:${channel_tag}" \
              -t "${img}:sha-${SHORT}" \
              "$context"
            docker buildx imagetools inspect "${img}:${VER}"
          }

          build_one openfdd-central services/central/Dockerfile .
          build_one openfdd-ui workspace/dashboard/Dockerfile .
          build_one openfdd-fieldbus services/fieldbus/Dockerfile .
          build_one openfdd-mqtt services/mqtt/Dockerfile services/mqtt

  publish-mcp:
    needs: [validate, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.MCP_IMAGE }}
          tags: |
            type=raw,value=${{ needs.validate.outputs.version }}
            type=raw,value=v${{ needs.validate.outputs.version }}
            type=raw,value=beta,enable=${{ needs.validate.outputs.channel == 'beta' }}
            type=raw,value=latest,enable=${{ needs.validate.outputs.channel == 'stable' }}
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=Open-FDD MCP
            org.opencontainers.image.source=https://github.com/bbartling/open-fdd
            org.opencontainers.image.version=${{ needs.validate.outputs.version }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.mcp
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify published tags
        env:
          VER: ${{ needs.validate.outputs.version }}
          CHANNEL: ${{ needs.validate.outputs.channel }}
        run: |
          for tag in "${VER}" "v${VER}"; do
            docker buildx imagetools inspect "${{ env.MCP_IMAGE }}:${tag}"
          done
          if [[ "$CHANNEL" == "beta" ]]; then
            docker buildx imagetools inspect "${{ env.MCP_IMAGE }}:beta"
          else
            docker buildx imagetools inspect "${{ env.MCP_IMAGE }}:latest"
          fi

  release:
    needs: [validate, publish-stack, publish-mcp]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          TAG="v${{ needs.validate.outputs.version }}"
          if git ls-remote --exit-code origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists on origin — skipping create/push (republish)"
          else
            git tag -a "${TAG}" -m "Open-FDD ${TAG} — container stack (${{ needs.validate.outputs.channel }})"
            git push origin "${TAG}"
          fi

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.validate.outputs.version }}
          name: Open-FDD v${{ needs.validate.outputs.version }} — stack (${{ needs.validate.outputs.channel }})
          prerelease: ${{ needs.validate.outputs.channel == 'beta' }}
          make_latest: ${{ needs.validate.outputs.channel == 'stable' }}
          body: |
            ## Open-FDD container stack v${{ needs.validate.outputs.version }} (${{ needs.validate.outputs.channel }})

            **Images:**
            ```bash
            ghcr.io/bbartling/openfdd-central:${{ needs.validate.outputs.version }}
            ghcr.io/bbartling/openfdd-ui:${{ needs.validate.outputs.version }}
            ghcr.io/bbartling/openfdd-fieldbus:${{ needs.validate.outputs.version }}
            ghcr.io/bbartling/openfdd-mqtt:${{ needs.validate.outputs.version }}
            ghcr.io/bbartling/openfdd-mcp:${{ needs.validate.outputs.version }}
            ```

            ### Deploy (standalone recipe)
            ```bash
            export OPENFDD_IMAGE_TAG=${{ needs.validate.outputs.version }}
            ./scripts/openfdd_stack_up.sh standalone
            ```

            See [Build recipes](https://bbartling.github.io/open-fdd/operations/build-recipes.html) for csv / central / edge recipes.

  prune-ghcr:
    needs: [validate, publish-stack, publish-mcp]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Prune stale GHCR versions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          chmod +x scripts/ghcr_prune_packages.sh
          ./scripts/ghcr_prune_packages.sh \
            --all-images \
            --keep-releases 3 \
            --delete-untagged-older-than-days 7 \
            --delete-sha-older-than-days 7 \
            --protect-tag "${{ needs.validate.outputs.version }}" \
            --protect-tag "v${{ needs.validate.outputs.version }}" \
            --protect-tag nightly \
            --protect-tag beta \
            --protect-tag latest \
            --protected-tags-file scripts/ghcr-retention-protected-tags.txt \
            --confirm-delete

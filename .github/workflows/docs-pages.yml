# Build and deploy Open-FDD docs to GitHub Pages (Just the Docs / Jekyll).
# Pages source must be "GitHub Actions" (not legacy /docs branch Jekyll).

name: Docs (GitHub Pages)

on:
  push:
    branches: [master, main]
    paths:
      - "docs/**"
      - ".github/workflows/docs-pages.yml"
  pull_request:
    branches: [master, main]
    paths:
      - "docs/**"
      - ".github/workflows/docs-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: docs

      - name: Lock Ruby dependencies
        run: bundle lock
        working-directory: docs

      - name: Jekyll build
        run: bundle exec jekyll build --trace --strict_front_matter
        working-directory: docs
        env:
          JEKYLL_ENV: production

      - name: Verify site output
        run: test -f _site/index.html && test -d _site/quick-start
        working-directory: docs

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment

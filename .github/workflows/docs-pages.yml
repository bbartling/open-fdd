# Rust edge docs live as markdown in docs/ (no Jekyll Gemfile).
# Skip Pages build until a static site generator is wired for the Rust line.

name: Docs (GitHub Pages)

on:
  push:
    branches: [master, main]
    paths:
      - "docs/**"
      - ".github/workflows/docs-pages.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  skip-rust-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Rust docs are in-repo markdown
        run: |
          echo "Open-FDD 3.2 Rust docs: https://github.com/bbartling/open-fdd/tree/master/docs"
          echo "Skipping legacy Jekyll Pages build (no docs/Gemfile on Rust line)."

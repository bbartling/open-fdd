# Build Jekyll site from docs/ and deploy to GitHub Pages (project site: /open-fdd).

name: Docs (GitHub Pages)

on:
  push:
    branches: [master, main]
    paths:
      - "docs/**"
      - ".github/workflows/docs-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: "pages-open-fdd"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: docs

      - name: Build Jekyll site
        working-directory: docs
        run: bundle install && bundle exec jekyll build -d "${{ github.workspace }}/_site"
        env:
          JEKYLL_ENV: production

      - name: Verify Just the Docs theme assets
        run: |
          set -euo pipefail
          site="${{ github.workspace }}/_site"
          index="$site/index.html"
          css_dir="$site/assets/css"

          if [ ! -f "$index" ]; then
            echo "::error::Missing $index"
            find "$site" -maxdepth 2 -type f | head -40
            exit 1
          fi

          if [ ! -d "$css_dir" ]; then
            echo "::error::Missing $css_dir (theme may not have compiled)"
            find "$site" -maxdepth 3 -type d
            exit 1
          fi

          echo "CSS files:"
          ls -la "$css_dir"

          if ! find "$css_dir" -maxdepth 1 -name '*.css' -size +8k -print -quit | grep -q .; then
            echo "::error::No substantial theme CSS in $css_dir"
            exit 1
          fi

          if ! grep -qE 'site-nav|side-bar' "$index"; then
            echo "::error::index.html missing Just the Docs layout markers"
            head -60 "$index"
            exit 1
          fi

      - name: Check internal links (HTMLProofer)
        run: |
          gem install html-proofer -v '~> 5.0' --no-document
          # gem wrappers are not always on PATH; Gem.bindir is reliable.
          # baseurl is /open-fdd — map hrefs to _site paths (see html-proofer README "baseurl").
          "$(ruby -e 'puts Gem.bindir')/htmlproofer" "${{ github.workspace }}/_site" \
            --assume-extension .html \
            --swap-urls '^/open-fdd/:/' \
            --ignore-files "/404\\.html\$/" \
            --disable-external \
            --allow-hash-href \
            --ignore-empty-alt \
            --ignore-missing-alt

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

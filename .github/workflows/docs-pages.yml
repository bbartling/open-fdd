# Build Jekyll site from docs/ and deploy to GitHub Pages (project site: /open-fdd).

name: Docs (GitHub Pages)

on:
  push:
    branches: [master, main]
    paths:
      - "docs/**"
      - ".github/workflows/docs-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: "pages-open-fdd"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: docs

      - name: Build Jekyll site
        working-directory: docs
        run: bundle install && bundle exec jekyll build -d "${{ github.workspace }}/_site"
        env:
          JEKYLL_ENV: production

      - name: Check internal links (HTMLProofer)
        run: |
          gem install html-proofer -v '~> 5.0' --no-document
          # gem wrappers are not always on PATH; Gem.bindir is reliable.
          # baseurl is /open-fdd — map hrefs to _site paths (see html-proofer README "baseurl").
          "$(ruby -e 'puts Gem.bindir')/htmlproofer" "${{ github.workspace }}/_site" \
            --swap-urls '^/open-fdd/:/' \
            --ignore-files "/404\\.html\$/" \
            --disable-external \
            --allow-hash-href \
            --ignore-empty-alt \
            --ignore-missing-alt

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

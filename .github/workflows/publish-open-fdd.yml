# Single PyPI distribution: open-fdd (open_fdd.engine + open_fdd.playground + schema/reports).
# Tag open-fdd-vX.Y.Z to publish. Do not use the retired openfdd-engine workflow.

name: Publish open-fdd

on:
  workflow_dispatch:
  push:
    tags:
      - "open-fdd-v*"

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Verify release tag matches pyproject.toml version
        if: startsWith(github.ref, 'refs/tags/open-fdd-v')
        run: |
          TAG_VER="${GITHUB_REF_NAME#open-fdd-v}"
          PKG_VER=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          if [ "$TAG_VER" != "$PKG_VER" ]; then
            echo "::error title=Version mismatch::Git tag is open-fdd-v${TAG_VER} but pyproject.toml has version ${PKG_VER}. Commit the version bump, then recreate the tag on that commit."
            exit 1
          fi
          echo "OK: tag ${TAG_VER} matches pyproject.toml"

      - name: Build package
        run: |
          python -m pip install --upgrade pip
          python -m pip install build==1.2.2 twine==6.1.0
          python -m build
          twine check dist/*

      - name: Verify wheel (engine + playground)
        run: |
          python -m venv /tmp/ofdd-wheel-smoke
          wheel="$(ls -1t dist/*.whl | head -n 1)"
          test -n "$wheel"
          /tmp/ofdd-wheel-smoke/bin/pip install "$wheel"
          /tmp/ofdd-wheel-smoke/bin/python -c "
          from open_fdd.engine import RuleRunner
          import open_fdd
          assert open_fdd.__version__
          from open_fdd.playground import compile_evaluate, sweep_rule, cfg_threshold
          from open_fdd.playground.cookbook import window_rows_1h
          assert cfg_threshold({}, 'bounds_low') == 65.0
          code = '''from open_fdd.playground.cookbook import cfg_threshold, temp_unit_symbol
          def evaluate(row, cfg, prev_row=None, rows=None):
              v = row.get(\"temp_rolling_avg\") or row.get(\"temp\")
              if v is None: return False
              return v > cfg_threshold(cfg, \"bounds_high\")
          '''
          rows = [{\"row\": 0, \"ts_ms\": 1, \"ts\": \"t\", \"temp\": 90, \"temp_rolling_avg\": 90}]
          flags, _ = sweep_rule(code, {\"bounds_high\": 80}, rows, capture_print=False)
          assert flags[0]
          "
          env -u PYTHONPATH OFDD_WHEEL_SMOKE=1 /tmp/ofdd-wheel-smoke/bin/python scripts/validate_acme_rules_pypi.py

      - name: Pytest playground (source tree)
        run: |
          python -m pip install pytest
          python -m pip install -e .
          python -m pytest open_fdd/tests/playground -q

      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/open-fdd-v')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

name: Publish open-fdd

on:
  workflow_dispatch:
  push:
    tags:
      - "open-fdd-v*"

permissions:
  contents: read
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Build package
        run: |
          python -m pip install --upgrade pip
          python -m pip install build==1.2.2 twine==6.1.0
          python -m build
          twine check dist/*

      # PyPI Trusted Publishing (OIDC) — no TWINE_PASSWORD secret required.
      # Configure each PyPI project: Publishing → add GitHub trusted publisher for this workflow file.
      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/open-fdd-v')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

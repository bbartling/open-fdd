# Build a single PDF from docs/ via scripts/build_docs_pdf.py; upload as workflow artifact.

name: Docs PDF

on:
  push:
    branches: [master]
    paths:
      - "docs/**"
      - "scripts/build_docs_pdf.py"
      - ".github/workflows/docs-pdf.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install pandoc and WeasyPrint system libs
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pandoc \
            libcairo2 libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf-2.0-0 \
            libffi-dev shared-mime-info

      - name: Install Python deps
        run: pip install pyyaml weasyprint

      - name: Build PDF
        run: |
          python scripts/build_docs_pdf.py \
            -o pdf/open-fdd-engine-docs.pdf \
            --keep-md \
            --pdf-engine=weasyprint

      - uses: actions/upload-artifact@v4
        with:
          name: open-fdd-engine-documentation-pdf
          path: pdf/open-fdd-engine-docs.pdf

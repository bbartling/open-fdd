# Legacy Python-era PDF bundle — disabled on Rust 3.2 line (no build_docs_pdf.py).

name: Docs PDF

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  skip-rust-docs:
    runs-on: ubuntu-latest
    steps:
      - name: PDF bundle not built on Rust line
        run: |
          echo "Rust docs are markdown under docs/ — PDF export is legacy Python-era."
          echo "Use workflow_dispatch only if build_docs_pdf.py is restored."

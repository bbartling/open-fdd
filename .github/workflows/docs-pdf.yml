# Regenerate pdf/open-fdd-docs.pdf (+ .txt) when docs or the builder change; commit to master.

name: Docs PDF

on:
  push:
    branches: [master]
    paths:
      - "docs/**"
      - "scripts/build_docs_pdf.py"
      - ".github/workflows/docs-pdf.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-pdf-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pandoc and WeasyPrint system libs
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pandoc \
            libcairo2 libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf-2.0-0 \
            libffi-dev shared-mime-info

      - name: Install Python deps
        run: pip install pyyaml weasyprint

      - name: Build PDF and LLM text bundle
        run: python scripts/build_docs_pdf.py --pdf-engine=weasyprint

      - name: Commit updated bundle if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(docs): regenerate PDF and text bundle"
          file_pattern: pdf/open-fdd-docs.pdf pdf/open-fdd-docs.txt
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com

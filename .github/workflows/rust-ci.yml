# Canonical PR/push gate for the Open-FDD container stack.
# FDD engine path-scoped gate: fdd-engine-ci.yml
# Nightly stack publish: ghcr-openfdd-stack.yml
# MCP publish: rust-ghcr-mcp.yml
name: Rust Stack CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    name: Rust format, clippy, and tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Edge lib and MCP tests
        run: cargo test --workspace --all-targets -p open_fdd_edge_prototype -p openfdd-mcp

      - name: Central / fieldbus / MQTT contract tests
        run: |
          cargo test -p openfdd_contracts -p openfdd_mqtt -p openfdd-central -p openfdd-fieldbus
          cargo test -p openfdd-central --test csv_fdd_integration

      - name: Architecture / MQTT cutover gates
        run: bash scripts/gates/run_all_gates.sh --quick

      - name: Cookbook + README docs integrity (59-rule floor, cookbook link)
        run: python3 scripts/cookbook_parity_check.py --docs-only

      - name: Anti-hardcoding audit
        run: bash -n scripts/audit_no_private_bench_hardcoding.sh && ./scripts/audit_no_private_bench_hardcoding.sh

      - name: Secret scan
        run: |
          ! git ls-files | xargs grep -l 'OFDD_AUTH_SECRET=.' 2>/dev/null | grep -v '.example' | grep -v 'site_lib'
          test -f .gitignore
          grep -q 'auth.env.local' .gitignore || grep -q '/workspace' .gitignore

  frontend:
    name: TypeScript dashboard build and tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dashboard dependencies
        working-directory: workspace/dashboard
        run: npm ci

      - name: Vitest
        working-directory: workspace/dashboard
        run: npm test

      - name: Production build (UI image dist)
        working-directory: workspace/dashboard
        env:
          VITE_OUT_DIR: dist
        run: |
          npm run build
          test -f dist/index.html

      - name: Built UI guards
        run: |
          grep -q "Drivers" workspace/dashboard/src/pages/DriversPage.tsx
          grep -q "SupervisoryOverridePanel" workspace/dashboard/src/components/SupervisoryOverridePanel.tsx
          ! grep -R "Rule Lab" workspace/dashboard/src || true

      - name: BACnet NIC helper guards
        run: |
          test -x scripts/openfdd_bacnet_nic_setup.sh
          bash -n scripts/openfdd_bacnet_nic_setup.sh
          test -f .env.example
          grep -q "OPENFDD_BACNET_MODE=live" .env.example
          grep -q "OPENFDD_VALIDATION_PROFILE" .env.example
          test -x scripts/audit_no_private_bench_hardcoding.sh
          ./scripts/audit_no_private_bench_hardcoding.sh
          test -f VERSION
          grep -qE '^3\.[0-9]+\.[0-9]+(-beta\.[0-9]+)?$' VERSION

  docker:
    name: Stack compose config and Dockerfiles
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Compose config (all recipes)
        env:
          OPENFDD_SITE_ID: local
          OPENFDD_EDGE_ID: fieldbus-1
          OPENFDD_MQTT_HOST: 127.0.0.1
        run: |
          mkdir -p deploy/mqtt/kits/local__fieldbus-1
          export OPENFDD_EDGE_KIT_DIR="$PWD/deploy/mqtt/kits/local__fieldbus-1"
          for f in docker/compose.standalone.yml docker/compose.central.yml docker/compose.edge.yml docker/compose.csv.yml; do
            test -f "$f"
            docker compose -f "$f" config >/dev/null
            echo "OK config: $f"
          done

      - name: File smoke (stack recipes)
        run: bash scripts/release/smoke_standalone_mqtts.sh

      - name: Stack script syntax
        run: |
          bash -n scripts/openfdd_stack_lib.sh
          bash -n scripts/openfdd_stack_pull.sh
          bash -n scripts/openfdd_stack_up.sh
          bash -n scripts/release/smoke_standalone_mqtts.sh

  lifecycle-scripts:
    name: Stack script syntax
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - run: |
          bash -n scripts/openfdd_stack_lib.sh
          bash -n scripts/openfdd_stack_pull.sh
          bash -n scripts/openfdd_stack_up.sh
          bash -n scripts/openfdd_csv_import_sidecar.sh
          bash -n scripts/openfdd_csv_export_sidecar.sh

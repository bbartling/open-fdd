name: AppSec

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  rust-audit:
    name: Rust dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: cargo audit
        run: cargo audit

  secret-scan:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  filesystem-scan:
    name: Trivy filesystem
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy
      - name: trivy fs
        run: trivy fs --exit-code 1 --severity HIGH,CRITICAL .

  dashboard-audit:
    name: npm audit (dashboard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
        working-directory: workspace/dashboard
      - run: npm audit --audit-level=high
        working-directory: workspace/dashboard

  dockerfile-lint:
    name: Hadolint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Hadolint central
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: services/central/Dockerfile
          failure-threshold: error
          ignore: DL3008
      - name: Hadolint UI
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: workspace/dashboard/Dockerfile
          failure-threshold: error
          ignore: DL3008
      - name: Hadolint fieldbus
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: services/fieldbus/Dockerfile
          failure-threshold: error
          ignore: DL3008
      - name: Hadolint MCP
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile.mcp
          failure-threshold: error
          ignore: DL3008

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "python"

  - package-ecosystem: "npm"
    directory: "/apps/desktop-ui"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "desktop-ui"

  - package-ecosystem: "cargo"
    directory: "/apps/desktop-ui/src-tauri"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "tauri"

# Haystack-style logical key (slug) — pair with manifest_haystack.yaml
name: demo_high_sat_haystack
description: Workshop — supply air over threshold (Haystack-style input name)
type: expression
flag: demo_high_sat_flag

inputs:
  discharge_air_temp_sensor:
    brick: discharge_air_temp_sensor

params:
  hi: 100.0

expression: |
  discharge_air_temp_sensor > hi

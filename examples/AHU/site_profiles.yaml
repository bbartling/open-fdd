# Declarative workshop sites for local testing / assistant-driven bootstrap.
# Paths under ``csv.path`` are relative to this file's directory (not hard-coded in Python).
version: 1
copy_rules_from: rules

sites:
  - display_name: AHU7 workshop demo
    csv:
      path: AHU7.csv
      source: csv
    equipment:
      name: AHU-7
      type: Air_Handling_Unit
    brick_mappings:
      - external_id: "SAT (°F)"
        brick_type: Supply_Air_Temperature_Sensor
      - external_id: "MAT (°F)"
        brick_type: Mixed_Air_Temperature_Sensor
      - external_id: "OAT (°F)"
        brick_type: Outside_Air_Temperature_Sensor
      - external_id: "RAT (°F)"
        brick_type: Return_Air_Temperature_Sensor
      - external_id: "SA Static Press (inH₂O)"
        brick_type: Supply_Air_Static_Pressure_Sensor
      - external_id: "SF Spd Cmd (%)"
        brick_type: Supply_Fan_Speed_Command
      - external_id: "SF Sts"
        brick_type: Supply_Fan_Status

  - display_name: RTU 11
    csv:
      path: RTU11.csv
      source: csv
    equipment:
      name: RTU-11
      type: Air_Handling_Unit
    brick_mappings:
      - external_id: "RTU_11_DA_T(°F)"
        brick_type: Supply_Air_Temperature_Sensor
      - external_id: "RTU_11_MA_T(°F)"
        brick_type: Mixed_Air_Temperature_Sensor
      - external_id: "RTU_11_OA_T(°F)"
        brick_type: Outside_Air_Temperature_Sensor
      - external_id: "RTU_11_RA_T(°F)"
        brick_type: Return_Air_Temperature_Sensor

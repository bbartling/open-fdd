name: ahu_duct_static_pressure_not_maintained
version: 1
type: expression
description: AHU supply fan is running but duct static pressure is below active setpoint by more than the deadband.
equipment_type:
  - Air_Handling_Unit
  - AHU
  - VAV_AHU
inputs:
  Supply_Fan_Status:
    brick: Supply_Fan_Status
  Supply_Air_Static_Pressure_Sensor:
    brick: Supply_Air_Static_Pressure_Sensor
  Supply_Air_Static_Pressure_Setpoint:
    brick: Supply_Air_Static_Pressure_Setpoint
params:
  fan_on_threshold: 0.5
  pressure_deadband_in_h2o: 0.15
rolling_window: 3
expression: |
  (
    (Supply_Fan_Status > fan_on_threshold)
    & (
      Supply_Air_Static_Pressure_Sensor
      < (Supply_Air_Static_Pressure_Setpoint - pressure_deadband_in_h2o)
    )
  )
flag: ahu_duct_static_pressure_not_maintained_fault
severity: critical

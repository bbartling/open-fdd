# Single-site pack: RTU11.csv with AHU air-stream temps only + two generic rules
# (sensor_bounds, sensor_flatline). Use with bootstrap_ahu_examples.py --profiles … --reset.
version: 1
copy_rules_from: rules_rtu11_temp_only

sites:
  - display_name: RTU 11
    csv:
      path: RTU11.csv
      source: csv
    equipment:
      name: RTU-11
      type: Air_Handling_Unit
    brick_mappings:
      - external_id: "RTU_11_DA_T(°F)"
        brick_type: Supply_Air_Temperature_Sensor
      - external_id: "RTU_11_MA_T(°F)"
        brick_type: Mixed_Air_Temperature_Sensor
      - external_id: "RTU_11_OA_T(°F)"
        brick_type: Outside_Air_Temperature_Sensor
      - external_id: "RTU_11_RA_T(°F)"
        brick_type: Return_Air_Temperature_Sensor

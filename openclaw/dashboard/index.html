<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Open-FDD Operator Dashboard</title>
  <meta http-equiv="refresh" content="120">
  <link rel="icon" href="favicon.ico" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121933;
      --panel2: #0f1730;
      --muted: #9db0d1;
      --text: #e8eefc;
      --accent: #6aa9ff;
      --line2: #ff88c2;
      --line3: #ffd166;
      --line4: #7ef0c1;
      --line5: #c7a6ff;
      --border: #233055;
      --good: #7ef0c1;
      --warn: #ffd166;
      --bad: #ff8a9e;
      --shadow: 0 18px 48px rgba(0,0,0,.28);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Segoe UI, Arial, sans-serif;
      background: linear-gradient(180deg, #0b1020 0%, #0d1430 100%);
      color: var(--text);
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .app { width: 100vw; max-width: none; margin: 0; padding: 20px; }
    .header { margin-bottom: 18px; }
    .title { margin: 0; font-size: 30px; font-weight: 800; }
    .subtitle { margin: 8px 0 0; color: var(--muted); }
    .toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    .btn {
      background: rgba(255,255,255,.04);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 8px 12px;
      cursor: pointer;
      font-weight: 600;
    }
    .btn:hover { background: rgba(255,255,255,.08); }
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.04);
      color: var(--muted);
      font-size: 13px;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--good); box-shadow: 0 0 14px rgba(126,240,193,.8); }
    .grid {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 16px;
    }
    .card {
      background: linear-gradient(180deg, var(--panel) 0%, var(--panel2) 100%);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
      min-height: 120px;
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,.06);
      user-select: none;
      background: rgba(255,255,255,.02);
    }
    .card-title { margin: 0; font-size: 16px; font-weight: 700; }
    .card-body { padding: 16px; }
    .span-12 { grid-column: span 12; }
    .span-8 { grid-column: span 8; }
    .span-6 { grid-column: span 6; }
    .span-4 { grid-column: span 4; }
    .metric-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 16px;
    }
    .metric {
      padding: 14px;
      border-radius: 14px;
      background: rgba(255,255,255,.035);
      border: 1px solid rgba(255,255,255,.06);
    }
    .metric-value { font-size: 26px; font-weight: 800; color: var(--text); }
    .metric-label { margin-top: 6px; color: var(--muted); font-size: 12px; }
    .focus-list, .plain-list { margin: 12px 0 0; padding-left: 18px; color: var(--muted); }
    .focus-list li, .plain-list li { margin: 8px 0; }
    .timeline-item { padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,.06); }
    .timeline-item:last-child { border-bottom: 0; }
    .timeline-time { color: var(--line3); font-size: 12px; margin-bottom: 6px; }
    .timeline-title { font-weight: 700; margin-bottom: 6px; }
    .timeline-details { color: var(--muted); font-size: 14px; }
    .logbox {
      background: rgba(0,0,0,.18);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 14px;
      padding: 12px;
      max-height: 280px;
      overflow: auto;
      font-family: Consolas, monospace;
      font-size: 12px;
      color: #d7e5ff;
      white-space: pre-wrap;
    }
    .commit { margin: 10px 0; }
    .commit-sha { color: var(--line4); font-family: Consolas, monospace; }
    .muted { color: var(--muted); }
    .chart-shell { padding: 10px 0 0; }
    .chart {
      width: 100%;
      height: 280px;
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
      border: 1px solid rgba(255,255,255,.06);
      padding: 8px;
    }
    .legend { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 12px; color: var(--muted); font-size: 12px; }
    .legend-item { display: inline-flex; align-items: center; gap: 6px; }
    .swatch { width: 10px; height: 10px; border-radius: 50%; }
    .gh-block { margin: 10px 0 0; }
    .error {
      padding: 18px;
      border: 1px solid #5f2432;
      background: rgba(95,36,50,.35);
      color: #ffd6df;
      border-radius: 14px;
    }
    .footer { margin-top: 18px; color: var(--muted); font-size: 12px; }
    .sweep-summary {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.45;
    }
    .sweep-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.08);
      font-size: 12px;
      margin-bottom: 12px;
    }
    .sweep-pill.ok { color: var(--good); }
    .sweep-pill.warning { color: var(--warn); }
    .sweep-pill.fail { color: var(--bad); }
    .endpoint-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .endpoint-table th, .endpoint-table td {
      text-align: left;
      padding: 10px 8px;
      border-bottom: 1px solid rgba(255,255,255,.06);
      vertical-align: top;
    }
    .endpoint-table th { color: var(--muted); font-weight: 600; }
    .endpoint-status.ok { color: var(--good); font-weight: 700; }
    .endpoint-status.warning { color: var(--warn); font-weight: 700; }
    .endpoint-status.fail { color: var(--bad); font-weight: 700; }
    .endpoint-status.info { color: var(--accent); font-weight: 700; }
    @media (max-width: 1100px) {
      .span-8, .span-6, .span-4 { grid-column: span 12; }
      .metric-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useRef, useState } = React;

    const COLORS = {
      accent: '#6aa9ff',
      line2: '#ff88c2',
      line3: '#ffd166',
      line4: '#7ef0c1',
      line5: '#c7a6ff',
      muted: '#9db0d1'
    };

    const CARD_LAYOUT = [
      { id: 'summary', span: 'span-12', title: 'Dashboard Summary' },
      { id: 'integrity', span: 'span-12', title: '20-Minute Intelligent Operator Sweep' },
      { id: 'chart', span: 'span-8', title: '7-Day Activity' },
      { id: 'github', span: 'span-4', title: 'Tracked GitHub Work' },
      { id: 'timeline', span: 'span-6', title: 'Progress Timeline' },
      { id: 'commits', span: 'span-6', title: 'Recent Pushed Commits' },
      { id: 'logs', span: 'span-6', title: 'Recent Logs' },
      { id: 'findings', span: 'span-6', title: 'Key Findings' },
      { id: 'next', span: 'span-6', title: 'Next Steps' }
    ];

    function Chart({ timeseries }) {
      const canvasRef = useRef(null);
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas || !timeseries) return;
        const ctx = canvas.getContext('2d');
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * window.devicePixelRatio;
        canvas.height = 280 * window.devicePixelRatio;
        ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        const width = rect.width;
        const height = 280;
        const pad = { l: 42, r: 16, t: 20, b: 34 };
        const labels = timeseries.labels || [];
        const series = [
          { key: 'api_calls_total', color: COLORS.accent },
          { key: 'openfdd_local_api_calls', color: COLORS.line2 },
          { key: 'raw_bacnet_rpc_requests', color: COLORS.line3 },
          { key: 'context_notes_pushed', color: COLORS.line4 },
          { key: 'context_window_relapse', color: COLORS.line5 }
        ];
        const values = series.flatMap(s => timeseries[s.key] || []);
        const max = Math.max(1, ...values);
        ctx.clearRect(0, 0, width, height);
        ctx.strokeStyle = 'rgba(255,255,255,.10)';
        ctx.lineWidth = 1;
        for (let i = 0; i < 5; i++) {
          const y = pad.t + ((height - pad.t - pad.b) * i / 4);
          ctx.beginPath();
          ctx.moveTo(pad.l, y);
          ctx.lineTo(width - pad.r, y);
          ctx.stroke();
        }
        ctx.fillStyle = COLORS.muted;
        ctx.font = '12px Segoe UI';
        labels.forEach((label, i) => {
          const x = pad.l + ((width - pad.l - pad.r) * i / Math.max(1, labels.length - 1));
          ctx.fillText(label, x - 12, height - 10);
        });
        series.forEach(seriesDef => {
          const arr = timeseries[seriesDef.key] || [];
          ctx.strokeStyle = seriesDef.color;
          ctx.lineWidth = 2.4;
          ctx.beginPath();
          arr.forEach((v, i) => {
            const x = pad.l + ((width - pad.l - pad.r) * i / Math.max(1, labels.length - 1));
            const y = height - pad.b - ((height - pad.t - pad.b) * (v / max));
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
          });
          ctx.stroke();
          arr.forEach((v, i) => {
            const x = pad.l + ((width - pad.l - pad.r) * i / Math.max(1, labels.length - 1));
            const y = height - pad.b - ((height - pad.t - pad.b) * (v / max));
            ctx.fillStyle = seriesDef.color;
            ctx.beginPath();
            ctx.arc(x, y, 3.5, 0, Math.PI * 2);
            ctx.fill();
          });
        });
      }, [timeseries]);
      return (
        <div className="chart-shell">
          <canvas ref={canvasRef} className="chart" />
          <div className="legend">
            <div className="legend-item"><span className="swatch" style={{background: COLORS.accent}}></span>API calls</div>
            <div className="legend-item"><span className="swatch" style={{background: COLORS.line2}}></span>Open-FDD local</div>
            <div className="legend-item"><span className="swatch" style={{background: COLORS.line3}}></span>Raw BACnet</div>
            <div className="legend-item"><span className="swatch" style={{background: COLORS.line4}}></span>Context notes</div>
            <div className="legend-item"><span className="swatch" style={{background: COLORS.line5}}></span>Context relapse</div>
          </div>
        </div>
      );
    }

    function Card({ card, children }) {
      return (
        <section className={`card ${card.span}`}>
          <div className="card-header">
            <h2 className="card-title">{card.title}</h2>
          </div>
          <div className="card-body">{children}</div>
        </section>
      );
    }

    function App() {
      const [data, setData] = useState(null);
      const [error, setError] = useState('');

      useEffect(() => {
        const bust = Date.now();
        fetch('./local-progress.json?_=' + bust)
          .then(r => {
            if (!r.ok) throw new Error('No local override');
            return r.json();
          })
          .catch(() => fetch('./progress.json?_=' + bust).then(r => {
            if (!r.ok) throw new Error('Failed to load dashboard data');
            return r.json();
          }))
          .then(setData)
          .catch(err => setError(err.message));
      }, []);

      const metrics = useMemo(() => {
        const ts = data?.timeseries || {};
        const latest = arr => (arr && arr.length ? arr[arr.length - 1] : 0);
        return {
          api: latest(ts.api_calls_total),
          ofdd: latest(ts.openfdd_local_api_calls),
          bacnet: latest(ts.raw_bacnet_rpc_requests)
        };
      }, [data]);

      const renderers = {
        summary: () => (
          <>
            <div className="status-pill"><span className="dot"></span>Status: {data?.summary?.status || 'unknown'}</div>
            <p className="subtitle">Generated: {data?.generated_at || 'unknown'} • Window: {data?.window || 'n/a'}</p>
            <ul className="focus-list">{(data?.summary?.focus || []).map((item, i) => <li key={i}>{item}</li>)}</ul>
            <div className="metric-row">
              <div className="metric"><div className="metric-value">{metrics.api}</div><div className="metric-label">API calls today</div></div>
              <div className="metric"><div className="metric-value">{metrics.ofdd}</div><div className="metric-label">Open-FDD local</div></div>
              <div className="metric"><div className="metric-value">{metrics.bacnet}</div><div className="metric-label">Raw BACnet RPC</div></div>
            </div>
          </>
        ),
        integrity: () => {
          const sweep = data?.integrity_sweep || {};
          const schedule = sweep.schedule_monitor || {};
          const pillClass = sweep.overall_status === 'ok' ? 'ok' : (sweep.overall_status === 'fail' ? 'fail' : 'warning');
          const statusClass = (status) => {
            const s = String(status || '').toLowerCase();
            if (s === 'pass' || s === 'ok' || s === '200') return 'ok';
            if (s === 'fail') return 'fail';
            if (s === 'info' || s === 'planned') return 'info';
            return 'warning';
          };
          return (
            <>
              <div className={`sweep-pill ${pillClass}`}>Last run: {sweep.last_run || 'unknown'} • {sweep.overall_status || 'unknown'} • Mode: {sweep.environment_mode || 'unknown'}</div>
              <p className="sweep-summary">{sweep.summary || 'No integrity sweep summary loaded.'}</p>
              <ul className="plain-list">
                <li><strong>Mode basis:</strong> {sweep.mode_basis || 'not set'}</li>
                <li><strong>Operator alert level:</strong> {sweep.operator_alert_level || 'unknown'}</li>
                <li><strong>Overnight interaction:</strong> {sweep.overnight_interaction?.policy || 'not set'}</li>
                <li><strong>Current sweep state:</strong> {sweep.overnight_interaction?.current_state || 'not set'}</li>
                <li><strong>Season/time basis:</strong> {sweep.seasonal_context?.local_time_basis || 'not set'}</li>
                <li><strong>Weather basis:</strong> {sweep.seasonal_context?.weather_basis || 'not set'}</li>
                <li><strong>HVAC sanity summary:</strong> {sweep.seasonal_context?.hvac_sanity_summary || 'not set'}</li>
              </ul>
              <h3>Schedule-aware fake fault monitor</h3>
              <ul className="plain-list">
                <li><strong>Last check:</strong> {schedule.last_check || 'not set'}</li>
                <li><strong>UTC minute:</strong> {schedule.utc_minute ?? 'not set'}</li>
                <li><strong>Expected mode:</strong> {schedule.expected_mode || 'not set'}</li>
                <li><strong>Interpretation:</strong> {schedule.summary || 'not set'}</li>
                <li><strong>Rule:</strong> {schedule.interpretation_rule || 'not set'}</li>
              </ul>
              <table className="endpoint-table">
                <thead>
                  <tr><th>Point</th><th>Device/Object</th><th>Observed</th><th>Expected</th><th>Status</th></tr>
                </thead>
                <tbody>
                  {(schedule.points || []).map((pt, i) => (
                    <tr key={i}>
                      <td>{pt.point}</td>
                      <td>{pt.device_instance}<div className="muted">{pt.object_identifier}</div></td>
                      <td>{pt.second_value != null ? `${pt.first_value} → ${pt.second_value}` : String(pt.first_value)}</td>
                      <td>{pt.expected_behavior || pt.mode || '—'}<div className="muted">{pt.note || ''}</div></td>
                      <td className={`endpoint-status ${statusClass(pt.status)}`}>{pt.status || 'unknown'}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
              <h3>Live sensor reads</h3>
              <table className="endpoint-table">
                <thead>
                  <tr><th>Point</th><th>Device/Object</th><th>Value</th><th>Status</th></tr>
                </thead>
                <tbody>
                  {(sweep.sensor_reads || []).map((sr, i) => (
                    <tr key={i}>
                      <td>{sr.point}<div className="muted">{sr.property}</div></td>
                      <td>{sr.device_instance}<div className="muted">{sr.object_identifier}</div></td>
                      <td>{String(sr.value)}</td>
                      <td className={`endpoint-status ${statusClass(sr.status)}`}>{sr.status}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
              <h3>Sweep action plan</h3>
              <ul className="plain-list">{(sweep.action_plan || []).map((item, i) => <li key={i}>{item}</li>)}</ul>
              <h3>Endpoint checks</h3>
              <table className="endpoint-table">
                <thead>
                  <tr><th>Endpoint</th><th>Status</th><th>Detail</th></tr>
                </thead>
                <tbody>
                  {(sweep.endpoints || []).map((ep, i) => (
                    <tr key={i}>
                      <td><div>{ep.name}</div><div className="muted">{ep.url}</div></td>
                      <td className={`endpoint-status ${statusClass(ep.status)}`}>{ep.status}</td>
                      <td>{ep.detail}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
              <ul className="plain-list">{(sweep.findings || []).map((item, i) => <li key={i}>{item}</li>)}</ul>
            </>
          );
        },
        chart: () => (
          <>
            <div className="muted">{data?.timeseries?.notes || '7-day activity trend'}</div>
            <Chart timeseries={data?.timeseries || {}} />
          </>
        ),
        github: () => (
          <div className="gh-block">
            <p><strong>Issue:</strong> <a href={data?.github?.issue?.url} target="_blank">{data?.github?.issue?.title || '—'}</a></p>
            <p><strong>PR:</strong> <a href={data?.github?.pr_watch?.url} target="_blank">{data?.github?.pr_watch?.title || '—'}</a></p>
            <p className="muted">Branch: {data?.github?.pr_watch?.branch || '—'}</p>
          </div>
        ),
        timeline: () => (
          <div>{(data?.timeline || []).map((item, i) => <div className="timeline-item" key={i}><div className="timeline-time">{item.time}</div><div className="timeline-title">{item.title}</div><div className="timeline-details">{item.details}</div></div>)}</div>
        ),
        commits: () => (
          <div>{(data?.recent_commits || []).map((c, i) => <div className="commit" key={i}><div><span className="commit-sha">{c.sha}</span> — {c.message}</div><div className="muted">{c.time}</div></div>)}</div>
        ),
        logs: () => (<div className="logbox">{(data?.recent_logs || []).join('\n\n')}</div>),
        findings: () => (<ul className="plain-list">{(data?.key_findings || []).map((item, i) => <li key={i}>{item}</li>)}</ul>),
        next: () => (<ul className="plain-list">{(data?.next_steps || []).map((item, i) => <li key={i}>{item}</li>)}</ul>)
      };

      return (
        <div className="app">
          <div className="header">
            <h1 className="title">Open-FDD Operator Dashboard</h1>
            <p className="subtitle">Local fixed-layout dashboard for the 20-minute intelligent operator sweep. Pulls the temporary local summary first, then falls back to the checked-in snapshot.</p>
            <div className="toolbar">
              <button className="btn" onClick={() => location.reload()}>Refresh data</button>
              <span className="status-pill"><span className="dot"></span>Local dashboard mode</span>
            </div>
          </div>
          {error && <div className="error">Error: {error}</div>}
          {!data && !error && <div className="status-pill"><span className="dot"></span>Loading progress snapshot…</div>}
          {data && <div className="grid">{CARD_LAYOUT.map(card => <Card key={card.id} card={card}>{renderers[card.id] ? renderers[card.id]() : <div className="muted">Unknown card.</div>}</Card>)}</div>}
          <div className="footer">Served locally from <code>open-fdd/openclaw/dashboard/</code>.</div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>

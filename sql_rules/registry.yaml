  - rule_id: OAT-METEO
    sql_file: oat_meteo_fault.sql
    pandas_function: oat_vs_meteo
    description: Equipment OAT vs weather-staged wx OAT
    required_roles: [oa_t]
    output_columns: [equipment_id, fault_hours, fault_pct]
    priority: P0
    parity_status: proven_building_100
    dashboard_wired: true
    delete_python_candidate: false
    confirm_seconds: 900
    parameters:
      oat_err:
        label: OAT vs meteo tolerance
        default: 5.0
        min: 1.0
        max: 15.0
        step: 0.5
        unit: degF
        frontend_control: slider
        sql_placeholder: OAT_ERR
      confirm_seconds:
        label: Confirm time
        default: 900
        min: 0
        max: 3600
        step: 300
        unit: sec
        frontend_control: slider
        sql_placeholder: CONFIRM_SECONDS

  - rule_id: FC13-SAT-HIGH
    sql_file: sat_high_fault.sql
    pandas_function: fc13
    description: SAT above setpoint at full cooling
    required_roles: [sat, sat_sp, clg_valve_pct, oa_damper_pct]
    output_columns: [equipment_id, fault_hours]
    priority: P0
    parity_status: proven_building_100
    dashboard_wired: true
    delete_python_candidate: false
    confirm_seconds: 600
    parameters:
      sat_err:
        label: SAT high error band
        default: 1.0
        min: 0.25
        max: 5.0
        step: 0.25
        unit: degF
        frontend_control: slider
        sql_placeholder: SAT_ERR
      clg_valve_min:
        label: Cooling valve open threshold
        default: 0.01
        min: 0.0
        max: 0.5
        step: 0.01
        unit: frac
        frontend_control: slider
        sql_placeholder: CLG_VALVE_MIN
      oa_damper_econ_low:
        label: OA damper economizer low
        default: 0.05
        min: 0.0
        max: 0.5
        step: 0.01
        unit: frac
        frontend_control: slider
        sql_placeholder: OA_DAMPER_ECON_LOW
      oa_damper_econ_high:
        label: OA damper economizer high
        default: 0.9
        min: 0.5
        max: 1.0
        step: 0.01
        unit: frac
        frontend_control: slider
        sql_placeholder: OA_DAMPER_ECON_HIGH
      confirm_seconds:
        label: Confirm time
        default: 600
        min: 0
        max: 3600
        step: 300
        unit: sec
        frontend_control: slider
        sql_placeholder: CONFIRM_SECONDS


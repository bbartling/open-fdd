# SQL rule registry — source of truth for DataFusion deterministic rules.
# Python oracle mapping: see fdd_app/export_pandas_oracle.py SQL_TO_COOKBOOK

rules:
  - rule_id: FAN-RUNTIME-HOURS
    sql_file: fan_runtime_hours.sql
    pandas_function: null
    description: Fan running hours where fan_cmd > 5% (normalized 0-1)
    required_roles: [fan_cmd]
    output_columns: [equipment_id, fan_runtime_hours, total_hours]
    priority: P0
    parity_status: proven_building_100
    dashboard_wired: false
    delete_python_candidate: false
    confirm_seconds: 0

  - rule_id: VAV-1
    sql_file: vav1_comfort_fault.sql
    pandas_function: vav1
    description: Zone comfort band violation hours with confirm window
    required_roles: [zone_t]
    output_columns: [equipment_id, fault_hours, fault_pct]
    priority: P0
    parity_status: proven_building_100
    dashboard_wired: true
    delete_python_candidate: false
    confirm_seconds: 900
    parameters:
      zone_t_lo:
        label: Zone comfort low
        default: 68.0
        min: 60.0
        max: 72.0
        step: 0.5
        unit: degF
        frontend_control: slider
        sql_placeholder: ZONE_T_LO
      zone_t_hi:
        label: Zone comfort high
        default: 76.0
        min: 72.0
        max: 85.0
        step: 0.5
        unit: degF
        frontend_control: slider
        sql_placeholder: ZONE_T_HI
      confirm_seconds:
        label: Confirm time
        default: 900
        min: 0
        max: 3600
        step: 300
        unit: sec
        frontend_control: slider
        sql_placeholder: CONFIRM_SECONDS

  - rule_id: AVG-ZONE-TEMP
    sql_file: avg_zone_temp.sql
    pandas_function: null
    description: Average zone temperature per equipment
    required_roles: [zone_t]
    output_columns: [equipment_id, avg_zone_temp, min_zone_temp, max_zone_temp]
    priority: P0
    parity_status: proven_building_100
    dashboard_wired: false
    delete_python_candidate: false
    confirm_seconds: 0
    parameters:
      zone_t_lo:
        label: Zone comfort low (reference)
        default: 68.0
        min: 60.0
        max: 72.0
        step: 0.5
        unit: degF
        frontend_control: slider
        sql_placeholder: ZONE_T_LO
      zone_t_hi:
        label: Zone comfort high (reference)
        default: 76.0
        min: 72.0
        max: 85.0
        step: 0.5
        unit: degF
        frontend_control: slider
        sql_placeholder: ZONE_T_HI

  - rule_id: ZONE-COMFORT-PCT
    sql_file: zone_comfort_pct.sql
    pandas_function: null
    description: Percent of samples in comfort band
    required_roles: [zone_t]
    output_columns: [equipment_id, comfort_pct]
    priority: P0
    parity_status: proven_building_100
    dashboard_wired: false
    delete_python_candidate: false
    confirm_seconds: 0
    parameters:
      zone_t_lo:
        label: Zone comfort low
        default: 68.0
        min: 60.0
        max: 72.0
        step: 0.5
        unit: degF
        frontend_control: slider
        sql_placeholder: ZONE_T_LO
      zone_t_hi:
        label: Zone comfort high
        default: 76.0
        min: 72.0
        max: 85.0
        step: 0.5
        unit: degF
        frontend_control: slider
        sql_placeholder: ZONE_T_HI

  - rule_id: FAULT-ELAPSED-HOURS

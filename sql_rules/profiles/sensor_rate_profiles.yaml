# Open-FDD sensor rate profiles for SV-SLEW.
# Engineering screening defaults — site-tunable; not ASHRAE code limits.
# Consume haystack_roles when present on the historian pivot.
#
# See docs/rules/cookbook/sensor-rate-profiles.md

schema_version: 1
rule_id: SV-SLEW
notes: >
  No universal Δ/h limit. Select steady vs transient thresholds from operating
  state (OFF_OR_STABLE / STARTUP_TRANSIENT / RUNNING_STEADY). Persist violations;
  allow immediate extreme short-window faults.

defaults:
  max_gap_factor: 3.0
  minimum_persistence_minutes: 10
  minimum_data_coverage: 0.80
  fan_transition_window_minutes: 20

profiles:
  - profile_id: zone_air_temperature
    quantity: temperature
    location: zone
    canonical_unit: degF
    haystack_roles: [zone_t]
    steady_warning_per_hour: 4.0
    steady_fault_per_hour: 6.0
    transient_warning_per_hour: 8.0
    transient_fault_per_hour: 8.0
    extreme_interval_change: 15.0
    extreme_interval_minutes: 5
    persistence_minutes: 15
    transition_window_minutes: 30

  - profile_id: return_air_temperature
    quantity: temperature
    location: return
    canonical_unit: degF
    haystack_roles: [rat]
    steady_warning_per_hour: 6.0
    steady_fault_per_hour: 6.0
    transient_warning_per_hour: 12.0
    transient_fault_per_hour: 12.0
    extreme_interval_change: 20.0
    extreme_interval_minutes: 5
    persistence_minutes: 10
    transition_window_minutes: 20

  - profile_id: outside_air_temperature
    quantity: temperature
    location: outside
    canonical_unit: degF
    haystack_roles: [oa_t]
    steady_warning_per_hour: 12.0
    steady_fault_per_hour: 12.0
    transient_warning_per_hour: 20.0
    transient_fault_per_hour: 20.0
    extreme_interval_change: 36.0
    extreme_interval_minutes: 5
    persistence_minutes: 10
    transition_window_minutes: 15

  - profile_id: mixed_air_temperature
    quantity: temperature
    location: mixed
    canonical_unit: degF
    haystack_roles: [mat]
    steady_warning_per_hour: 12.0
    steady_fault_per_hour: 12.0
    transient_warning_per_hour: 30.0
    transient_fault_per_hour: 30.0
    extreme_interval_change: 30.0
    extreme_interval_minutes: 5
    persistence_minutes: 10
    transition_window_minutes: 15

  - profile_id: supply_air_temperature
    quantity: temperature
    location: supply
    canonical_unit: degF
    haystack_roles: [sat]
    steady_warning_per_hour: 10.0
    steady_fault_per_hour: 10.0
    transient_warning_per_hour: 35.0
    transient_fault_per_hour: 35.0
    extreme_interval_change: 40.0
    extreme_interval_minutes: 5
    persistence_minutes: 10
    transition_window_minutes: 20

  - profile_id: chw_supply_temperature
    quantity: temperature
    location: chilled_water_supply
    canonical_unit: degF
    haystack_roles: [chw_supply_t]
    steady_warning_per_hour: 6.0
    steady_fault_per_hour: 6.0
    transient_warning_per_hour: 15.0
    transient_fault_per_hour: 15.0
    extreme_interval_change: 20.0
    extreme_interval_minutes: 5
    persistence_minutes: 10
    transition_window_minutes: 30

  - profile_id: chw_return_temperature
    quantity: temperature
    location: chilled_water_return
    canonical_unit: degF
    haystack_roles: [chw_return_t]
    steady_warning_per_hour: 8.0
    steady_fault_per_hour: 8.0
    transient_warning_per_hour: 15.0
    transient_fault_per_hour: 15.0
    extreme_interval_change: 20.0
    extreme_interval_minutes: 5
    persistence_minutes: 10
    transition_window_minutes: 30

  - profile_id: hw_supply_temperature
    quantity: temperature
    location: hot_water_supply
    canonical_unit: degF
    haystack_roles: [hw_supply_t]
    steady_warning_per_hour: 15.0
    steady_fault_per_hour: 15.0
    transient_warning_per_hour: 50.0
    transient_fault_per_hour: 50.0
    extreme_interval_change: 40.0
    extreme_interval_minutes: 5
    persistence_minutes: 10
    transition_window_minutes: 30

  - profile_id: hw_return_temperature
    quantity: temperature
    location: hot_water_return
    canonical_unit: degF
    haystack_roles: [hw_return_t]
    steady_warning_per_hour: 12.0
    steady_fault_per_hour: 12.0
    transient_warning_per_hour: 30.0
    transient_fault_per_hour: 30.0
    extreme_interval_change: 30.0
    extreme_interval_minutes: 5
    persistence_minutes: 10
    transition_window_minutes: 30

  - profile_id: outside_air_relative_humidity
    quantity: relative_humidity
    location: outside
    canonical_unit: percent_points
    haystack_roles: [oa_h]
    steady_warning_per_hour: 25.0
    steady_fault_per_hour: 25.0
    transient_warning_per_hour: 40.0
    transient_fault_per_hour: 40.0
    extreme_interval_change: 40.0
    extreme_interval_minutes: 5
    persistence_minutes: 10
    transition_window_minutes: 20

  - profile_id: zone_relative_humidity
    quantity: relative_humidity
    location: zone

    haystack_roles: [zone_h]
    steady_warning_per_hour: 10.0
    steady_fault_per_hour: 10.0
    transient_warning_per_hour: 15.0
    transient_fault_per_hour: 15.0
    extreme_interval_change: 40.0
    extreme_interval_minutes: 5
    persistence_minutes: 15
    transition_window_minutes: 20
    sql_ready: false

  - profile_id: duct_static_pressure
    quantity: pressure
    location: duct_static
    canonical_unit: in_wc
    haystack_roles: [duct_static]
    steady_warning_per_hour: 0.75
    steady_fault_per_hour: 0.75
    transient_warning_per_hour: 3.0
    transient_fault_per_hour: 3.0

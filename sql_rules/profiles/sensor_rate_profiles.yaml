    extreme_interval_minutes: 5
    persistence_minutes: 10
    transition_window_minutes: 20

  - profile_id: building_static_pressure
    quantity: pressure
    location: building
    canonical_unit: in_wc
    haystack_roles: [building_static]
    steady_warning_per_hour: 0.10
    steady_fault_per_hour: 0.10
    transient_warning_per_hour: 0.30
    transient_fault_per_hour: 0.30
    extreme_interval_change: 0.50
    extreme_interval_minutes: 5
    persistence_minutes: 10
    transition_window_minutes: 20
    sql_ready: false

  - profile_id: zone_co2
    quantity: co2
    location: zone
    canonical_unit: ppm
    haystack_roles: [zone_co2]
    steady_warning_per_hour: 500.0
    steady_fault_per_hour: 1200.0
    transient_warning_per_hour: 1200.0
    transient_fault_per_hour: 2500.0
    extreme_interval_change: 3000.0
    extreme_interval_minutes: 5
    persistence_minutes: 15
    transition_window_minutes: 30
    noise_deadband: 100.0
    sql_ready: false

  - profile_id: vav_airflow
    quantity: airflow
    location: vav
    canonical_unit: fraction_of_design_per_hour
    haystack_roles: [vav_flow]
    steady_warning_per_hour: 1.0
    steady_fault_per_hour: 1.0
    transient_warning_per_hour: 4.0
    transient_fault_per_hour: 4.0
    normalize_by: design_flow
    persistence_minutes: 10
    transition_window_minutes: 15
    sql_ready: false

  - profile_id: valve_position
    quantity: actuator
    location: valve
    canonical_unit: percent_per_hour
    haystack_roles: [clg_valve, htg_valve]
    steady_warning_per_hour: 100.0
    steady_fault_per_hour: 100.0
    transient_warning_per_hour: 600.0
    transient_fault_per_hour: 600.0
    persistence_minutes: 10
    transition_window_minutes: 10
    sql_ready: false
    note: Prefer PID-HUNT-1 for hunting / total variation.

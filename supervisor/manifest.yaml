# Open-FDD Supervisor addon manifest (HA Supervisor analogue).
# Source of truth for image names and compose profiles.
# Version pins for registry pulls live in docker/images.yaml.

version: 1
project: openfdd-edge

data:
  workspace: /var/openfdd/workspace
  secrets: /etc/openfdd

host:
  caddy:
    enabled: true
    port: 80
    upstream: "127.0.0.1:8765"
  ollama:
    enabled: optional
    port: 11434

apps:
  bridge:
    title: Open-FDD Bridge
    image: openfdd-bridge
    build_target: bridge
    role: core
    includes_spa: true
    ports:
      - host: "127.0.0.1"
        container: 8765
    health: "http://127.0.0.1:8765/health"
    env:
      OPENFDD_BACNET_COMMISSION_URL: "http://commission:8767"
      OFDD_MCP_REST_BASE: "http://mcp-rag:8090"

  commission:
    title: BACnet Commission Agent
    image: openfdd-commission
    build_target: commission
    role: bacnet
    internal_port: 8767
    note: "Includes BACnet poll loop (RPM → samples.csv)"

  mcp-rag:
    title: MCP RAG Sidecar
    image: openfdd-mcp-rag
    build_target: mcp-rag
    role: ai
    internal_port: 8090
    optional: false

  ollama:
    title: Ollama (compose)
    image: ollama/ollama
    role: ai
    profile: ai
    optional: true
    external: true

deferred:
  dashboard:
    title: Open-FDD Dashboard (static nginx)
    image: openfdd-dashboard
    reason: "SPA stays in bridge core until independent UI releases justify split"
    note: "See docs/architecture/containers.md — bridge image includes static SPA"

legacy_systemd:
  - openfdd-bridge
  - openfdd-mcp-rag
  - openfdd-bacnet-commission

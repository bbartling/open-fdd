# Reference edge stack — keep in sync with docker/compose.edge.yml
# Host workspace path (production): /var/openfdd/workspace

name: openfdd-edge

services:
  bridge:
    image: openfdd-bridge:local
    ports:
      - "127.0.0.1:8765:8765"
    volumes:
      - /var/openfdd/workspace:/var/openfdd/workspace
    environment:
      OPENFDD_BACNET_COMMISSION_URL: http://commission:8767
      OFDD_MCP_REST_BASE: http://mcp-rag:8090
      OFDD_OLLAMA_ENABLED: "0"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - commission
      - mcp-rag
    restart: unless-stopped

  commission:
    image: openfdd-commission:local
    network_mode: host
    volumes:
      - /var/openfdd/workspace:/var/openfdd/workspace
    restart: unless-stopped

  mcp-rag:
    image: openfdd-mcp-rag:local
    volumes:
      - /var/openfdd/workspace:/var/openfdd/workspace
    restart: unless-stopped

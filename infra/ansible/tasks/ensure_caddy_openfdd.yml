---
# Ensure Caddy reverse-proxies Open-FDD bridge (not the Debian default welcome site).

- name: Read installed Caddyfile
  ansible.builtin.slurp:
    src: /etc/caddy/Caddyfile
  register: caddyfile_slurp
  become: true
  when: caddy_enabled | default(true) | bool

- name: Assert Caddyfile reverse-proxies bridge
  ansible.builtin.assert:
    that:
      - "'reverse_proxy' in (caddyfile_slurp.content | b64decode)"
      - ("127.0.0.1:" + (openfdd_bridge_port | string)) in (caddyfile_slurp.content | b64decode)
    fail_msg: >-
      /etc/caddy/Caddyfile missing reverse_proxy to 127.0.0.1:{{ openfdd_bridge_port }} —
      re-run deploy or install templates/Caddyfile.j2
  when: caddy_enabled | default(true) | bool

- name: Validate Caddy configuration
  ansible.builtin.command:
    argv:
      - caddy
      - validate
      - --config
      - /etc/caddy/Caddyfile
  become: true
  changed_when: false
  when: caddy_enabled | default(true) | bool

- name: Reload Caddy with Open-FDD config
  ansible.builtin.command:
    argv:
      - caddy
      - reload
      - --config
      - /etc/caddy/Caddyfile
      - --force
  become: true
  changed_when: true
  when: caddy_enabled | default(true) | bool

- name: Probe Caddy entry on loopback (dashboard HTML)
  ansible.builtin.uri:
    url: "{{ 'https://127.0.0.1/' if (caddy_mode | default('http') == 'tls') else 'http://127.0.0.1/' }}"
    validate_certs: false
    return_content: true
  register: caddy_entry_probe
  failed_when: false
  when: caddy_enabled | default(true) | bool

- name: Decide if Caddy serves Open-FDD React shell
  ansible.builtin.set_fact:
    caddy_serves_openfdd: >-
      {{
        (caddy_entry_probe.status | default(0) == 200)
        and ('Open-FDD Operator' in (caddy_entry_probe.content | default('')))
        and ('Your web server is working' not in (caddy_entry_probe.content | default('')))
      }}
  when: caddy_enabled | default(true) | bool

- name: Restart Caddy when default welcome page still served
  ansible.builtin.systemd:
    name: caddy
    state: restarted
    daemon_reload: true
  become: true
  when:
    - caddy_enabled | default(true) | bool
    - not (caddy_serves_openfdd | default(false) | bool)

- name: Pause for Caddy after restart
  ansible.builtin.pause:
    seconds: 3
  when:
    - caddy_enabled | default(true) | bool
    - not (caddy_serves_openfdd | default(false) | bool)

- name: Re-probe Caddy entry after restart
  ansible.builtin.uri:
    url: "{{ 'https://127.0.0.1/' if (caddy_mode | default('http') == 'tls') else 'http://127.0.0.1/' }}"
    validate_certs: false
    return_content: true
  register: caddy_entry_probe_final
  failed_when: false
  when:
    - caddy_enabled | default(true) | bool
    - not (caddy_serves_openfdd | default(false) | bool)

- name: Fail if Caddy still not serving Open-FDD dashboard
  ansible.builtin.fail:
    msg: >-
      Caddy on {{ inventory_hostname }} is not serving the Open-FDD React app.
      Expected HTML title "Open-FDD Operator"; got default Caddy welcome page or error.
      Check: systemctl status caddy; journalctl -u caddy; cat /etc/caddy/Caddyfile
  when:
    - caddy_enabled | default(true) | bool
    - not (caddy_serves_openfdd | default(false) | bool)
    - >-
      (caddy_entry_probe_final is not defined)
      or (caddy_entry_probe_final.status | default(0) != 200)
      or ('Open-FDD Operator' not in (caddy_entry_probe_final.content | default('')))
      or ('Your web server is working' in (caddy_entry_probe_final.content | default('')))

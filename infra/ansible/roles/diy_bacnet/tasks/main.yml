---
- name: Checkout diy-bacnet-server repo
  ansible.builtin.git:
    repo: "{{ diy_bacnet_repo_url }}"
    dest: "{{ diy_bacnet_root }}"
    version: "{{ diy_bacnet_repo_version }}"
    force: true
  become_user: "{{ openfdd_user }}"

- name: Create diy-bacnet venv
  ansible.builtin.command: python3 -m venv .venv
  args:
    chdir: "{{ diy_bacnet_root }}"
    creates: "{{ diy_bacnet_root }}/.venv/bin/python"
  become_user: "{{ openfdd_user }}"

- name: Install diy-bacnet-server package
  ansible.builtin.command: >
    {{ diy_bacnet_root }}/.venv/bin/pip install -e .
  args:
    chdir: "{{ diy_bacnet_root }}"
  become_user: "{{ openfdd_user }}"

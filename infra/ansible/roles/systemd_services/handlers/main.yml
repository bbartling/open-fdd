---
- name: Reload systemd daemon (bench units)
  ansible.builtin.systemd:
    daemon_reload: true
  listen: bench_systemd_unit_files_updated

- name: Restart bench services (after daemon reload or env change)
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: restarted
  loop:
    - diy-bacnet-server
    - openfdd-gateway
    - openfdd-mcp-rag
    - openfdd-ui-vite
    - easyaso-supervisor
  ignore_errors: true
  listen: bench_systemd_unit_files_updated

- name: Restart bench services after env file change
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: restarted
  loop:
    - diy-bacnet-server
    - openfdd-gateway
    - openfdd-mcp-rag
    - openfdd-ui-vite
    - easyaso-supervisor
  ignore_errors: true

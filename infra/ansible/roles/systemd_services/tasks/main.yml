---
- name: Install systemd unit files
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "/etc/systemd/system/{{ item.dest }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - { src: "openfdd-gateway.service.j2", dest: "openfdd-gateway.service" }
    - { src: "openfdd-mcp-rag.service.j2", dest: "openfdd-mcp-rag.service" }
    - { src: "openfdd-ui-vite.service.j2", dest: "openfdd-ui-vite.service" }
    - { src: "easyaso-supervisor.service.j2", dest: "easyaso-supervisor.service" }
    - { src: "diy-bacnet-server.service.j2", dest: "diy-bacnet-server.service" }
  notify: Daemon reload

- name: Enable/start bench services
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - diy-bacnet-server
    - openfdd-gateway
    - openfdd-mcp-rag
    - openfdd-ui-vite
    - easyaso-supervisor

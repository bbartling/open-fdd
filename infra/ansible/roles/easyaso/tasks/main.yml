---
- name: Checkout easy-aso repo
  ansible.builtin.git:
    repo: "{{ easyaso_repo_url }}"
    dest: "{{ easyaso_root }}"
    version: "{{ easyaso_repo_version }}"
    force: true
  become_user: "{{ openfdd_user }}"

- name: Create easy-aso venv
  ansible.builtin.command: python3 -m venv .venv
  args:
    chdir: "{{ easyaso_root }}"
    creates: "{{ easyaso_root }}/.venv/bin/python"
  become_user: "{{ openfdd_user }}"

- name: Install easy-aso with platform extras
  ansible.builtin.command: >
    {{ easyaso_root }}/.venv/bin/pip install -e ".[platform]"
  args:
    chdir: "{{ easyaso_root }}"
  become_user: "{{ openfdd_user }}"

- name: Ensure easy-aso state dir exists
  ansible.builtin.file:
    path: "{{ easyaso_state_dir }}"
    state: directory
    owner: "{{ openfdd_user }}"
    group: "{{ openfdd_group }}"
    mode: "0750"

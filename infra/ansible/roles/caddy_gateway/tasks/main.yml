---
- name: Write bench env file
  ansible.builtin.template:
    src: bench.env.j2
    dest: "{{ bench_env_path }}"
    owner: root
    group: root
    mode: "0600"

- name: Select Caddy template source
  ansible.builtin.set_fact:
    caddy_template_src: >-
      {{
        'Caddyfile.simple.j2' if caddy_variant == 'simple'
        else ('Caddyfile.tls-internal.j2' if caddy_variant == 'tls-internal' else 'Caddyfile.cidr.j2')
      }}

- name: Install Caddyfile
  ansible.builtin.template:
    src: "{{ caddy_template_src }}"
    dest: /etc/caddy/Caddyfile
    owner: root
    group: root
    mode: "0644"
  notify: Restart caddy

- name: Ensure caddy systemd override dir exists
  ansible.builtin.file:
    path: /etc/systemd/system/caddy.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Install caddy env override
  ansible.builtin.template:
    src: caddy-override.conf.j2
    dest: /etc/systemd/system/caddy.service.d/openfdd-auth.conf
    owner: root
    group: root
    mode: "0644"
  notify:
    - Daemon reload
    - Restart caddy

- name: Enable/start caddy
  ansible.builtin.systemd:
    name: caddy
    enabled: true
    state: started


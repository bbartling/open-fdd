---
- name: Checkout open-fdd repo
  ansible.builtin.git:
    repo: "{{ openfdd_repo_url }}"
    dest: "{{ openfdd_root }}"
    version: "{{ openfdd_repo_version }}"
    force: true
  become_user: "{{ openfdd_user }}"

- name: Create open-fdd venv
  ansible.builtin.command: python3 -m venv .venv
  args:
    chdir: "{{ openfdd_root }}"
    creates: "{{ openfdd_root }}/.venv/bin/python"
  become_user: "{{ openfdd_user }}"

- name: Upgrade pip setuptools wheel in open-fdd venv
  ansible.builtin.pip:
    name:
      - pip
      - setuptools
      - wheel
    state: latest
    virtualenv: "{{ openfdd_root }}/.venv"
  become_user: "{{ openfdd_user }}"

- name: Install open-fdd editable package with extras
  ansible.builtin.pip:
    chdir: "{{ openfdd_root }}"
    name: ".[desktop,optimization]"
    editable: true
    virtualenv: "{{ openfdd_root }}/.venv"
  become_user: "{{ openfdd_user }}"

- name: Install UI npm dependencies (lockfile-aligned)
  ansible.builtin.command: npm ci
  args:
    chdir: "{{ openfdd_root }}/apps/desktop-ui"
  become_user: "{{ openfdd_user }}"

# Idempotent: delete stack/mcp-rag/index/rag_index.json on the host to force a rebuild after doc changes.
- name: Build MCP RAG index
  ansible.builtin.command: >
    {{ openfdd_root }}/.venv/bin/python scripts/build_mcp_rag_index.py --output stack/mcp-rag/index/rag_index.json
  args:
    chdir: "{{ openfdd_root }}"
    creates: "{{ openfdd_root }}/stack/mcp-rag/index/rag_index.json"
  become_user: "{{ openfdd_user }}"

---
# Docker-based edge deploy — app stack in Compose; host Caddy + FDD/retention timers only.
#
# GHCR (default after Actions publish):
#   OPENFDD_IMAGE_TAG=2026.06.04-edge ./deploy.sh docker --limit acme_vm_bbartling
#
# Legacy tar load (lab / air-gap):
#   OPENFDD_DOCKER_PULL_FROM_GHCR=0 OPENFDD_IMAGE_TAG=2026.06.04-edge ./scripts/docker_build.sh --save
#   OPENFDD_DOCKER_PULL_FROM_GHCR=0 ./deploy.sh docker --limit acme_vm_bbartling
#
# Tags: docker, preflight, config, data, commission, maintain, verify
#
# Container-first deploy: GHCR images are application source of truth.
# Ansible orchestrates compose pull/up, host Caddy/timers, and health checks only.
# Optional (deprecated): -e openfdd_push_site_pack=true -e openfdd_push_bacnet_config=true
# Image-only refresh (default): openfdd_docker_sync_workspace_data=false openfdd_push_site_pack=false

- name: Deploy Open-FDD edge stack (Docker Compose)
  hosts: pi_bcn
  gather_facts: true

  vars:
    openfdd_docker_stack: true
    openfdd_docker_tar_local: "{{ playbook_dir }}/../../docker/dist/openfdd-images-{{ openfdd_docker_image_tag | default('local') }}.tar.gz"
    openfdd_docker_tar_remote: "{{ openfdd_remote_dir }}/docker/openfdd-images-{{ openfdd_docker_image_tag | default('local') }}.tar.gz"

  tasks:
    - name: Check Docker CLI on edge
      tags: [docker, preflight]
      ansible.builtin.command: docker --version
      register: docker_cli_check
      changed_when: false
      failed_when: false

    - name: Install Docker engine and compose plugin
      tags: [docker, preflight]
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose-plugin
        state: present
        update_cache: true
        cache_valid_time: 3600
      become: true
      when: docker_cli_check.rc != 0

    - name: Add ansible user to docker group
      tags: [docker, preflight]
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true
      become: true

    - name: Ensure Open-FDD docker layout on edge
      tags: [docker, preflight]
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ openfdd_remote_dir }}/docker"
        - "{{ openfdd_remote_dir }}/docker/volumes/ollama"
        - "{{ openfdd_remote_dir }}/workspace/bacnet/commissioning"
        - "{{ openfdd_remote_dir }}/workspace/bacnet/polls"

    - name: Stat image bundle on control machine (tar deploy path)
      tags: [docker]
      ansible.builtin.stat:
        path: "{{ openfdd_docker_tar_local }}"
      delegate_to: localhost
      become: false
      register: local_docker_tar
      when: not (openfdd_docker_pull_from_ghcr | default(false) | bool)

    - name: Fail when image bundle missing (run scripts/docker_build.sh --save)
      tags: [docker]
      ansible.builtin.fail:
        msg: >-
          Missing {{ openfdd_docker_tar_local }} on control machine.
          Run: OPENFDD_IMAGE_TAG={{ openfdd_docker_image_tag | default('local') }} ./scripts/docker_build.sh --save
          Or use GHCR: OPENFDD_IMAGE_TAG=your-tag ./deploy.sh docker --limit <host>
      when:
        - not (openfdd_docker_pull_from_ghcr | default(false) | bool)
        - not local_docker_tar.stat.exists | default(false)

    - name: Copy image bundle to edge
      tags: [docker]
      ansible.builtin.copy:
        src: "{{ openfdd_docker_tar_local }}"
        dest: "{{ openfdd_docker_tar_remote }}"
        mode: "0644"
      when: not (openfdd_docker_pull_from_ghcr | default(false) | bool)

    - name: Load Docker images on edge from tar
      tags: [docker]
      ansible.builtin.command:
        argv:
          - bash
          - -c
          - gunzip -c "{{ openfdd_docker_tar_remote }}" | docker load
      register: docker_load
      changed_when: "'Loaded image' in docker_load.stdout"
      when: not (openfdd_docker_pull_from_ghcr | default(false) | bool)

    - name: Stat workspace auth.env.local on control machine
      tags: [config]
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../../workspace/auth.env.local"
      delegate_to: localhost
      become: false
      register: control_auth_env

    - name: Sync auth.env.local to edge
      tags: [config]
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../workspace/auth.env.local"
        dest: "{{ openfdd_remote_dir }}/workspace/auth.env.local"
        mode: "0600"
      when:
        - deploy_sync_auth | default(true) | bool
        - control_auth_env.stat.exists | default(false)

    - name: Stat workspace json_api.env.local on control machine
      tags: [config]
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../../workspace/json_api.env.local"
      delegate_to: localhost
      become: false
      register: control_json_api_env

    - name: Sync json_api.env.local to edge (OpenWeather / REST API keys)
      tags: [config]
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../workspace/json_api.env.local"
        dest: "{{ openfdd_remote_dir }}/workspace/json_api.env.local"
        mode: "0600"
      when:
        - deploy_sync_json_api_env | default(true) | bool
        - control_json_api_env.stat.exists | default(false)

    - name: Ensure optional workspace env stubs exist
      tags: [config]
      ansible.builtin.copy:
        dest: "{{ openfdd_remote_dir }}/workspace/{{ item.name }}"
        content: "{{ item.content }}\n"
        mode: "0644"
        force: false
      loop:
        - { name: "mcp.env.local", content: "OFDD_MCP_ENABLED=1" }
        - name: "ollama.env.local"
          content: |
            # Host Ollama (not compose) — bridge reaches host via host.docker.internal
            OFDD_OLLAMA_BASE_URL=http://host.docker.internal:11434
            OFDD_OLLAMA_MODEL=qwen3:4b
        - { name: "data.env.local", content: "# feather env" }

    - name: Build workspace data sync archive (skip live historian + unreadable model.json)
      tags: [data]
      when: openfdd_docker_sync_workspace_data | default(true) | bool
      ansible.builtin.shell:
        cmd: |
          set -eu
          out="{{ playbook_dir }}/.tmp/data-sync-{{ site_id | default('edge') }}.tar.gz"
          rm -f "$out"
          tar -czf "$out" \
            -C "{{ playbook_dir }}/../../workspace/data" \
            --exclude='./model.json' \
            --exclude='./rules_store.json' \
            --exclude='./data_model.ttl' \
            --exclude='./feather_store' \
            .
        executable: /bin/bash
      delegate_to: localhost
      become: false
      run_once: true
      changed_when: true

    - name: Ensure workspace data dir writable on edge
      tags: [data]
      when: openfdd_docker_sync_workspace_data | default(true) | bool
      ansible.builtin.file:
        path: "{{ openfdd_remote_dir }}/workspace/data"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"
        recurse: true
      become: true

    - name: Sync workspace data tree on edge
      tags: [data]
      when: openfdd_docker_sync_workspace_data | default(true) | bool
      ansible.builtin.unarchive:
        src: "{{ playbook_dir }}/.tmp/data-sync-{{ site_id | default('edge') }}.tar.gz"
        dest: "{{ openfdd_remote_dir }}/workspace/data/"

    - name: Ensure workspace tree owned by deploy user (Docker may write as root)
      tags: [data, commission, config, docker]
      ansible.builtin.file:
        path: "{{ openfdd_remote_dir }}/workspace"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"
        recurse: true
      become: true

    - name: Remove root-owned model.json on edge so deploy can replace it
      tags: [data]
      become: true
      ansible.builtin.file:
        path: "{{ openfdd_remote_dir }}/workspace/data/model.json"
        state: absent
      when: openfdd_push_site_pack | default(false) | bool

    - name: Push site BRICK model.json
      tags: [data]
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../workspace/data/{{ edge_model_json | default('model.json') }}"
        dest: "{{ openfdd_remote_dir }}/workspace/data/model.json"
        mode: "0644"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
      when: openfdd_push_site_pack | default(false) | bool

    - name: Regenerate GL36 FDD rules_store on control machine
      tags: [data]
      ansible.builtin.command:
        argv:
          - python3
          - scripts/setup_gl36_fdd.py
          - --site-id
          - "{{ site_id }}"
          - --building-id
          - "{{ building_id }}"
          - --ahu-equipment-id
          - "{{ gl36_ahu_equipment_id | default(site_id + '-vm-' + building_id + '-rtu-01') }}"
          - --fan-point-id
          - "{{ gl36_fan_point_id | default('1100-analog-output-1') }}"
        chdir: "{{ playbook_dir }}/../.."
      delegate_to: localhost
      become: false
      register: gl36_rules_gen
      changed_when: true
      when:
        - openfdd_push_site_pack | default(false) | bool
        - regenerate_gl36_rules_on_deploy | default(false) | bool

    - name: Resolve site rules_store source on control machine
      tags: [data]
      ansible.builtin.set_fact:
        site_rules_store_src: >-
          {{
            (playbook_dir + '/../../workspace/data/rules_store.json')
            if (regenerate_gl36_rules_on_deploy | default(false) | bool)
            else (edge_backup_dir + '/' + site_id + '/' + building_id + '/rules_store.json')
          }}

    - name: Stat site rules_store on control machine
      tags: [data]
      ansible.builtin.stat:
        path: "{{ site_rules_store_src }}"
      delegate_to: localhost
      become: false
      register: local_site_rules

    - name: Push site rules_store.json (no cross-site rules from dev workspace)
      tags: [data]
      ansible.builtin.copy:
        src: "{{ site_rules_store_src }}"
        dest: "{{ openfdd_remote_dir }}/workspace/data/rules_store.json"
        mode: "0644"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
      when:
        - openfdd_push_site_pack | default(false) | bool
        - local_site_rules.stat.exists | default(false)

    - name: Stat commissioned points.csv on control machine
      tags: [commission, data]
      ansible.builtin.stat:
        path: "{{ edge_backup_dir }}/{{ site_id }}/{{ building_id }}/points.csv"
      delegate_to: localhost
      become: false
      register: local_commission_csv

    - name: Push commissioned points.csv to edge
      tags: [commission, data]
      ansible.builtin.copy:
        src: "{{ edge_backup_dir }}/{{ site_id }}/{{ building_id }}/points.csv"
        dest: "{{ points_csv_path }}"
        mode: "0644"
      when:
        - openfdd_push_site_pack | default(false) | bool
        - local_commission_csv.stat.exists | default(false)

    - name: Stat points_discovered.csv on control machine
      tags: [commission, data]
      ansible.builtin.stat:
        path: "{{ edge_backup_dir }}/{{ site_id }}/{{ building_id }}/points_discovered.csv"
      delegate_to: localhost
      become: false
      register: local_discovered_csv

    - name: Push points_discovered.csv to edge (device tree inventory)
      tags: [commission, data]
      ansible.builtin.copy:
        src: "{{ edge_backup_dir }}/{{ site_id }}/{{ building_id }}/points_discovered.csv"
        dest: "{{ openfdd_remote_dir }}/workspace/bacnet/commissioning/points_discovered.csv"
        mode: "0644"
      when:
        - openfdd_push_bacnet_config | default(false) | bool
        - local_discovered_csv.stat.exists | default(false)

    - name: Stat device_poll_profiles.csv on control machine
      tags: [commission, config]
      ansible.builtin.stat:
        path: "{{ edge_backup_dir }}/{{ site_id }}/{{ building_id }}/device_poll_profiles.csv"
      delegate_to: localhost
      become: false
      register: local_device_poll_profiles

    - name: Push device_poll_profiles.csv (metric→imperial for Trane VAVs)
      tags: [commission, config]
      ansible.builtin.copy:
        src: "{{ edge_backup_dir }}/{{ site_id }}/{{ building_id }}/device_poll_profiles.csv"
        dest: "{{ openfdd_remote_dir }}/workspace/bacnet/commissioning/device_poll_profiles.csv"
        mode: "0644"
      when:
        - openfdd_push_bacnet_config | default(false) | bool
        - local_device_poll_profiles.stat.exists | default(false)

    - name: Install BACnet commission.env
      tags: [commission, config]
      ansible.builtin.template:
        src: templates/commission.env.j2
        dest: "{{ openfdd_remote_dir }}/workspace/bacnet/commissioning/commission.env"
        mode: "0644"
      when: openfdd_push_bacnet_config | default(false) | bool

    - name: Ensure /etc/openfdd exists on edge
      tags: [config]
      ansible.builtin.file:
        path: /etc/openfdd
        state: directory
        mode: "0755"
      become: true

    - name: Install bridge secret env file
      tags: [config]
      ansible.builtin.template:
        src: templates/bridge.secret.env.j2
        dest: /etc/openfdd/bridge.secret.env
        mode: "0600"
      become: true

    - name: Render Docker Compose file on edge
      tags: [docker]
      ansible.builtin.template:
        src: templates/docker-compose.edge.yml.j2
        dest: "{{ openfdd_remote_dir }}/docker-compose.yml"
        mode: "0644"

    - name: Log in to GHCR on edge (private packages)
      tags: [docker]
      ansible.builtin.shell:
        cmd: >-
          set -euo pipefail;
          echo "$TOKEN" | docker login {{ openfdd_docker_registry | default('ghcr.io') }}
          -u "$USER" --password-stdin
      environment:
        TOKEN: "{{ openfdd_ghcr_token }}"
        USER: "{{ openfdd_ghcr_username | default(openfdd_docker_registry_org | default('bbartling')) }}"
      no_log: true
      changed_when: false
      when:
        - openfdd_docker_pull_from_ghcr | default(false) | bool
        - openfdd_ghcr_token | default('') | length > 0

    - name: Pull Open-FDD images from GHCR
      tags: [docker]
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - -f
          - "{{ openfdd_remote_dir }}/docker-compose.yml"
          - pull
      register: compose_pull
      changed_when: >-
        (compose_pull.stdout ~ compose_pull.stderr) is search(
          '(Pulling|Downloading|Extracting|Pulled|Downloaded|Already|up to date)',
          ignorecase=True
        )
      when: openfdd_docker_pull_from_ghcr | default(false) | bool

    - name: Stop legacy systemd Open-FDD app units (Docker replaces them)
      tags: [docker]
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: stopped
        enabled: false
      become: true
      failed_when: false
      loop:
        - openfdd-bridge
        - openfdd-mcp-rag
        - openfdd-bacnet-commission
      when: openfdd_docker_disable_systemd | default(true) | bool

    - name: Start Open-FDD stack with Docker Compose
      tags: [docker]
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - -f
          - "{{ openfdd_remote_dir }}/docker-compose.yml"
          - up
          - -d
          - --remove-orphans
      register: compose_up
      changed_when: >-
        (compose_up.stdout ~ compose_up.stderr) is search(
          '(Pulling|Building|Downloading|Extracting|Restarting|Created|Creating|Recreated|Started|Pulled|Downloaded|Done)',
          ignorecase=True
        )

    - name: Safe Docker disk maintenance after stack is up
      tags: [docker, maintain]
      ansible.builtin.include_tasks: tasks/docker_maintenance.yml
      when: openfdd_docker_prune_on_deploy | default(true) | bool

    - name: Install openfdd-fdd-loop systemd unit and timer (runs inside bridge container)
      tags: [docker, systemd]
      ansible.builtin.template:
        src: "templates/{{ item }}.j2"
        dest: "/etc/systemd/system/{{ item }}"
        mode: "0644"
      loop:
        - openfdd-fdd-loop.service
        - openfdd-fdd-loop.timer
      become: true
      when: install_fdd_loop_timer | default(true) | bool

    - name: Enable openfdd-fdd-loop timer on edge
      tags: [docker, systemd]
      ansible.builtin.systemd:
        name: openfdd-fdd-loop.timer
        enabled: "{{ enable_fdd_loop_timer | default(true) | bool }}"
        state: "{{ 'started' if (enable_fdd_loop_timer | default(true) | bool) else 'stopped' }}"
        daemon_reload: true
      become: true
      when: install_fdd_loop_timer | default(true) | bool

    - name: Install openfdd-building-agent systemd unit and timer
      tags: [docker, systemd]
      ansible.builtin.template:
        src: "templates/{{ item }}.j2"
        dest: "/etc/systemd/system/{{ item }}"
        mode: "0644"
      loop:
        - openfdd-building-agent.service
        - openfdd-building-agent.timer
      become: true
      when: install_building_agent_timer | default(false) | bool

    - name: Enable openfdd-building-agent timer on edge
      tags: [docker, systemd]
      ansible.builtin.systemd:
        name: openfdd-building-agent.timer
        enabled: "{{ enable_building_agent_timer | default(false) | bool }}"
        state: "{{ 'started' if (enable_building_agent_timer | default(false) | bool) else 'stopped' }}"
        daemon_reload: true
      become: true
      when: install_building_agent_timer | default(false) | bool

    - name: Run post-deploy insurance checks
      tags: [verify, check]
      ansible.builtin.include_tasks: tasks/post_deploy_check.yml
      when: run_deploy_verify | default(true) | bool

---
# Operational sync: latest Docker stack + maintenance + SPARQL/TTL + feather/log health.
#
#   ./scripts/docker_build.sh --save
#   export SSHPASS='...' && ./deploy.sh ops --limit acme_vm_bbartling
#
- ansible.builtin.import_playbook: deploy_docker.yml

- name: Open-FDD edge operational health
  hosts: pi_bcn
  gather_facts: false
  vars:
    openfdd_docker_stack: true
    openfdd_docker_tar_remote: "{{ openfdd_remote_dir }}/docker/openfdd-images-{{ openfdd_docker_image_tag | default('local') }}.tar.gz"
  tasks:
    - name: Run safe Docker maintenance
      ansible.builtin.import_tasks: tasks/docker_maintenance.yml
      tags: [maintain]

    - name: Ensure workspace tree owned by deploy user
      ansible.builtin.file:
        path: "{{ openfdd_remote_dir }}/workspace"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"
        recurse: true
      become: true
      tags: [data]

    - name: Slurp operator auth env from edge
      ansible.builtin.slurp:
        src: "{{ openfdd_remote_dir }}/workspace/auth.env.local"
      register: edge_auth_slurp

    - name: Parse operator credentials from edge auth.env.local
      ansible.builtin.shell:
        cmd: |
          set -a
          # shellcheck disable=SC1091
          source /dev/stdin
          printf 'user=%s\npass=%s\n' "${OFDD_INTEGRATOR_USER:-${OFDD_OPERATOR_USER:-}}" "${OFDD_INTEGRATOR_PASSWORD:-${OFDD_OPERATOR_PASSWORD:-}}"
        executable: /bin/bash
        stdin: "{{ edge_auth_slurp.content | b64decode }}"
      register: auth_creds_raw
      changed_when: false
      no_log: true

    - name: Set login facts
      ansible.builtin.set_fact:
        ops_login_user: "{{ ((auth_creds_raw.stdout_lines | select('match', '^user=') | list | first | default('user=')).split('=', 1))[1] | trim }}"
        ops_login_password: "{{ ((auth_creds_raw.stdout_lines | select('match', '^pass=') | list | first | default('pass=')).split('=', 1))[1] | trim }}"
      no_log: true
      when:
        - auth_creds_raw is defined
        - not (auth_creds_raw.skipped | default(false))

    - name: Loopback login for API probes
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ openfdd_bridge_port }}/api/auth/login"
        method: POST
        body_format: json
        body:
          username: "{{ ops_login_user }}"
          password: "{{ ops_login_password }}"
        status_code: 200
        return_content: true
      register: ops_auth
      no_log: true
      when:
        - ops_login_user | default('') | length > 0
        - ops_login_password | default('') | length > 0

    - name: Sync BRICK TTL from model.json
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ openfdd_bridge_port }}/api/model/sync-ttl"
        method: POST
        headers:
          Authorization: "Bearer {{ ops_auth.json.token }}"
        status_code: 200
      when:
        - ops_auth is defined
        - ops_auth.json.token | default('') | length > 0

    - name: Model tree SPARQL probe
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ openfdd_bridge_port }}/api/model/tree"
        headers:
          Authorization: "Bearer {{ ops_auth.json.token }}"
        status_code: 200
        return_content: true
      register: model_tree_probe
      failed_when: model_tree_probe.json.query_engine | default('') != 'sparql'
      when:
        - ops_auth is defined
        - ops_auth.json.token | default('') | length > 0

    - name: Feather store byte total on edge
      ansible.builtin.shell:
        cmd: |
          set -eu
          root="{{ openfdd_remote_dir }}/workspace/data/feather_store"
          if [[ ! -d "$root" ]]; then
            echo 0
            exit 0
          fi
          du -sb "$root" 2>/dev/null | awk '{print $1}'
        executable: /bin/bash
      register: feather_bytes
      changed_when: false

    - name: Bridge container log error scan (last 200 lines)
      ansible.builtin.shell:
        cmd: |
          set -eu
          cid="$(docker ps -q -f name=bridge | head -1)"
          if [[ -z "$cid" ]]; then
            echo "no-bridge-container"
            exit 0
          fi
          docker logs --tail 200 "$cid" 2>&1 | grep -Ei 'ERROR|Traceback|CRITICAL' | grep -v '404 Not Found' | tail -5 || true
        executable: /bin/bash
      register: bridge_log_errors
      changed_when: false
      when: openfdd_docker_stack | default(false) | bool

    - name: Fail when bridge logs show errors
      ansible.builtin.fail:
        msg: "Bridge log errors on {{ inventory_hostname }}: {{ bridge_log_errors.stdout }}"
      when:
        - openfdd_docker_stack | default(false) | bool
        - bridge_log_errors.stdout | default('') | trim | length > 0
        - bridge_log_errors.stdout != 'no-bridge-container'

    - name: Operational sync summary
      ansible.builtin.debug:
        msg: >-
          {{ inventory_hostname }} ops OK —
          model_points={{ model_tree_probe.json.points | length | default(0) }},
          query_engine={{ model_tree_probe.json.query_engine | default('n/a') }},
          feather_bytes={{ feather_bytes.stdout | trim }}

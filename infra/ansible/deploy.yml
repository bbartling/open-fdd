---
# Deploy Open-FDD edge stack (bridge + BACnet toolshed) to Linux gateways.
#
#   ./deploy.sh --limit bacnet_pi -v
#   ./deploy.sh --limit acme_vm_bbartling -e enable_bacnet_poll_driver=true

- name: Deploy Open-FDD edge stack
  hosts: pi_bcn
  gather_facts: true

  handlers:
    - name: Restart BACnet poll driver
      ansible.builtin.systemd:
        name: openfdd-bacnet-poll
        state: restarted
        daemon_reload: true
      become: true
      when: enable_bacnet_poll_driver | default(false) | bool

    - name: Restart Open-FDD bridge
      ansible.builtin.systemd:
        name: openfdd-bridge
        state: restarted
        daemon_reload: true
      become: true
      when: enable_openfdd_bridge | default(true) | bool

    - name: Restart BACnet commission agent
      ansible.builtin.systemd:
        name: openfdd-bacnet-commission
        state: restarted
        daemon_reload: true
      become: true
      when: enable_bacnet_commission_agent | default(true) | bool

    - name: Reload Caddy
      ansible.builtin.command:
        argv:
          - caddy
          - reload
          - --config
          - /etc/caddy/Caddyfile
          - --force
      become: true
      when: caddy_enabled | default(true) | bool

    - name: Restart Open-FDD MCP RAG
      ansible.builtin.systemd:
        name: openfdd-mcp-rag
        state: restarted
        daemon_reload: true
      become: true
      when: enable_mcp | default(true) | bool

  tasks:
    - name: Ensure application directory exists
      ansible.builtin.file:
        path: "{{ openfdd_remote_dir }}"
        state: directory
        mode: "0755"

    - name: Sync open_fdd package
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../open_fdd/"
        dest: "{{ openfdd_remote_dir }}/open_fdd/"
        mode: "0644"
      notify: Restart Open-FDD bridge

    - name: Sync bacnet_toolshed package
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../bacnet_toolshed/"
        dest: "{{ openfdd_remote_dir }}/bacnet_toolshed/"
        mode: "0644"
      notify:
        - Restart BACnet poll driver
        - Restart BACnet commission agent

    - name: Sync workspace bridge API
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../workspace/api/"
        dest: "{{ openfdd_remote_dir }}/workspace/api/"
        mode: "0644"
      notify: Restart Open-FDD bridge

    - name: Sync workspace data tree
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../workspace/data/"
        dest: "{{ openfdd_remote_dir }}/workspace/data/"
        mode: "0644"

    - name: Sync built dashboard static files
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../workspace/api/static/app/"
        dest: "{{ openfdd_remote_dir }}/workspace/api/static/app/"
        mode: "0644"
      notify: Restart Open-FDD bridge

    - name: Stat workspace auth.env.local on control machine
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../../workspace/auth.env.local"
      delegate_to: localhost
      become: false
      register: control_auth_env

    - name: Sync auth.env.local to edge (operator login)
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../workspace/auth.env.local"
        dest: "{{ openfdd_remote_dir }}/workspace/auth.env.local"
        mode: "0600"
      when:
        - deploy_sync_auth | default(true) | bool
        - control_auth_env.stat.exists | default(false)
      notify: Restart Open-FDD bridge

    - name: Copy pyproject.toml and README
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../{{ item }}"
        dest: "{{ openfdd_remote_dir }}/{{ item }}"
        mode: "0644"
      loop:
        - pyproject.toml
        - README.md

    - name: Ensure BACnet workspace layout
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ openfdd_remote_dir }}/workspace/bacnet/commissioning"
        - "{{ openfdd_remote_dir }}/workspace/bacnet/polls"

    - name: Stat commissioned points.csv on control machine
      ansible.builtin.stat:
        path: "{{ edge_backup_dir }}/{{ site_id }}/{{ building_id }}/points.csv"
      delegate_to: localhost
      become: false
      register: local_commission_csv

    - name: Push commissioned points.csv to edge
      ansible.builtin.copy:
        src: "{{ edge_backup_dir }}/{{ site_id }}/{{ building_id }}/points.csv"
        dest: "{{ points_csv_path }}"
        mode: "0644"
      when: local_commission_csv.stat.exists | default(false)
      notify: Restart BACnet poll driver

    - name: Install BACnet commission.env
      ansible.builtin.template:
        src: templates/commission.env.j2
        dest: "{{ openfdd_remote_dir }}/workspace/bacnet/commissioning/commission.env"
        mode: "0644"
      notify: Restart BACnet commission agent

    - name: Install base Python packages (Debian / Raspberry Pi OS)
      ansible.builtin.apt:
        name:
          - python3
          - python3-venv
          - python3-pip
        state: present
        update_cache: true
        cache_valid_time: 3600
      become: true

    - name: Create virtual environment
      ansible.builtin.command:
        argv:
          - python3
          - -m
          - venv
          - "{{ openfdd_remote_dir }}/.venv"
        creates: "{{ openfdd_remote_dir }}/.venv/bin/python"

    - name: Select Open-FDD pip extras for target architecture
      ansible.builtin.set_fact:
        openfdd_pip_extras: "{{ 'engine' if ansible_architecture in ['armv7l', 'armv6l'] else 'dev,engine' }}"
        openfdd_bridge_requirements: >-
          {{ openfdd_remote_dir }}/workspace/api/{{
            'requirements-edge-armv7.txt'
            if ansible_architecture in ['armv7l', 'armv6l']
            else 'requirements.txt'
          }}

    - name: Install Open-FDD editable package
      ansible.builtin.command:
        argv:
          - "{{ openfdd_remote_dir }}/.venv/bin/pip"
          - install
          - "-e"
          - "{{ openfdd_remote_dir }}[{{ openfdd_pip_extras }}]"
      changed_when: true

    - name: Install bridge and BACnet requirements
      ansible.builtin.command:
        argv:
          - "{{ openfdd_remote_dir }}/.venv/bin/pip"
          - install
          - "--no-cache-dir"
          - "-r"
          - "{{ openfdd_bridge_requirements }}"
          - "-r"
          - "{{ openfdd_remote_dir }}/bacnet_toolshed/requirements.txt"
      changed_when: true

    - name: Install bridge secret env file
      ansible.builtin.template:
        src: templates/bridge.secret.env.j2
        dest: /etc/openfdd/bridge.secret.env
        mode: "0600"
        owner: root
        group: root
      become: true
      when:
        - install_openfdd_bridge | default(true) | bool
        - (commission_agent_token | default('') | length > 0) or (ofdd_auth_secret | default('') | length > 0)
      notify: Restart Open-FDD bridge

    - name: Install openfdd-bridge systemd unit
      ansible.builtin.template:
        src: templates/openfdd-bridge.service.j2
        dest: /etc/systemd/system/openfdd-bridge.service
        mode: "0644"
      become: true
      when: install_openfdd_bridge | default(true) | bool
      notify: Restart Open-FDD bridge

    - name: Install openfdd-bacnet-poll systemd unit
      ansible.builtin.template:
        src: templates/openfdd-bacnet-poll.service.j2
        dest: /etc/systemd/system/openfdd-bacnet-poll.service
        mode: "0644"
      become: true
      when: install_bacnet_poll_unit | default(true) | bool
      notify: Restart BACnet poll driver

    - name: Install openfdd-bacnet-commission systemd unit
      ansible.builtin.template:
        src: templates/openfdd-bacnet-commission.service.j2
        dest: /etc/systemd/system/openfdd-bacnet-commission.service
        mode: "0644"
      become: true
      when: install_bacnet_commission_unit | default(true) | bool

    - name: Install openfdd-fdd-loop systemd unit and timer
      ansible.builtin.template:
        src: "templates/{{ item }}.j2"
        dest: "/etc/systemd/system/{{ item }}"
        mode: "0644"
      loop:
        - openfdd-fdd-loop.service
        - openfdd-fdd-loop.timer
      become: true
      when: install_fdd_loop_timer | default(true) | bool

    - name: Install openfdd-feather-retention systemd unit and timer
      ansible.builtin.template:
        src: "templates/{{ item }}.j2"
        dest: "/etc/systemd/system/{{ item }}"
        mode: "0644"
      loop:
        - openfdd-feather-retention.service
        - openfdd-feather-retention.timer
      become: true
      when: install_feather_retention_timer | default(true) | bool

    - name: Enable and start openfdd-bridge
      ansible.builtin.systemd:
        name: openfdd-bridge
        enabled: "{{ enable_openfdd_bridge | default(true) | bool }}"
        state: "{{ 'started' if (enable_openfdd_bridge | default(true) | bool) else 'stopped' }}"
        daemon_reload: true
      become: true
      when: install_openfdd_bridge | default(true) | bool

    - name: Enable and start openfdd-bacnet-commission
      ansible.builtin.systemd:
        name: openfdd-bacnet-commission
        enabled: "{{ enable_bacnet_commission_agent | default(true) | bool }}"
        state: "{{ 'started' if (enable_bacnet_commission_agent | default(true) | bool) else 'stopped' }}"
        daemon_reload: true
      become: true
      when: install_bacnet_commission_unit | default(true) | bool

    - name: Enable and start openfdd-bacnet-poll
      ansible.builtin.systemd:
        name: openfdd-bacnet-poll
        enabled: "{{ enable_bacnet_poll_driver | default(false) | bool }}"
        state: "{{ 'started' if (enable_bacnet_poll_driver | default(false) | bool) else 'stopped' }}"
        daemon_reload: true
      become: true
      when: install_bacnet_poll_unit | default(true) | bool

    - name: Enable and start openfdd-fdd-loop timer
      ansible.builtin.systemd:
        name: openfdd-fdd-loop.timer
        enabled: "{{ enable_fdd_loop_timer | default(true) | bool }}"
        state: "{{ 'started' if (enable_fdd_loop_timer | default(true) | bool) else 'stopped' }}"
        daemon_reload: true
      become: true
      when: install_fdd_loop_timer | default(true) | bool

    - name: Enable and start openfdd-feather-retention timer
      ansible.builtin.systemd:
        name: openfdd-feather-retention.timer
        enabled: "{{ enable_feather_retention_timer | default(true) | bool }}"
        state: "{{ 'started' if (enable_feather_retention_timer | default(true) | bool) else 'stopped' }}"
        daemon_reload: true
      become: true
      when: install_feather_retention_timer | default(true) | bool

    - name: Install Caddy (LAN entry :80 / :443)
      ansible.builtin.apt:
        name: caddy
        state: present
        update_cache: true
        cache_valid_time: 3600
      become: true
      when: caddy_enabled | default(true) | bool

    - name: Ensure Open-FDD Caddy cert directory
      ansible.builtin.file:
        path: /etc/openfdd/caddy
        state: directory
        mode: "0750"
        owner: root
        group: caddy
      become: true
      when:
        - caddy_enabled | default(true) | bool
        - caddy_mode | default('http') == 'tls'

    - name: Generate self-signed TLS cert for Caddy
      ansible.builtin.command:
        argv:
          - openssl
          - req
          - -x509
          - -newkey
          - rsa:4096
          - -keyout
          - /etc/openfdd/caddy/key.pem
          - -out
          - /etc/openfdd/caddy/cert.pem
          - -days
          - "365"
          - -nodes
          - -subj
          - "/CN={{ caddy_tls_cn | default('openfdd.local') }}"
      args:
        creates: /etc/openfdd/caddy/cert.pem
      become: true
      when:
        - caddy_enabled | default(true) | bool
        - caddy_mode | default('http') == 'tls'

    - name: Install Caddyfile for Open-FDD
      ansible.builtin.template:
        src: templates/Caddyfile.j2
        dest: /etc/caddy/Caddyfile
        mode: "0644"
      become: true
      notify: Reload Caddy
      when: caddy_enabled | default(true) | bool

    - name: Enable and start Caddy
      ansible.builtin.systemd:
        name: caddy
        enabled: true
        state: started
        daemon_reload: true
      become: true
      when: caddy_enabled | default(true) | bool

    - name: Ensure Caddy reverse-proxies Open-FDD (not default welcome site)
      ansible.builtin.include_tasks: tasks/ensure_caddy_openfdd.yml
      when: caddy_enabled | default(true) | bool

    - name: Enable MCP RAG sidecar for operator AI / doc search
      ansible.builtin.include_tasks: tasks/mcp_sidecar.yml
      when: enable_mcp | default(true) | bool

    - name: Apply service restarts before insurance checks
      ansible.builtin.meta: flush_handlers

    - name: Run post-deploy insurance checks
      ansible.builtin.include_tasks: tasks/post_deploy_check.yml
      when: run_deploy_verify | default(true) | bool

    - name: Optional bench operational verify after deploy
      ansible.builtin.command:
        argv:
          - "{{ playbook_dir }}/scripts/bench_operational_verify.sh"
          - --host
          - "{{ ansible_host }}"
          - --skip-wait
      delegate_to: localhost
      become: false
      when: run_bench_operational_verify | default(false) | bool

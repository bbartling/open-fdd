---
# Full bench operational verification (discover → model → poll → wait → data check).
#   ansible-playbook -i inventory.yml bench_operational_verify.yml --limit bacnet_pi
#   RUN_WAIT_MINUTES=0 ansible-playbook ...  # skip 10m wait
# Bench model/rules: import via HTTPS API (commissioning-import), not Ansible file sync.

- name: Bench operational verification
  hosts: pi_bcn
  gather_facts: false

  tasks:
    - name: Run bench operational verify script from control machine
      ansible.builtin.command:
        argv:
          - "{{ playbook_dir }}/scripts/bench_operational_verify.sh"
          - --host
          - "{{ ansible_host }}"
          - --wait-minutes
          - "{{ bench_verify_wait_minutes | default(10) | string }}"
      delegate_to: localhost
      become: false
      environment:
        RUN_WAIT_MINUTES: "{{ bench_verify_wait_minutes | default(10) | string }}"
      when: not (bench_verify_skip_wait | default(false) | bool)

    - name: Run bench operational verify script (no wait)
      ansible.builtin.command:
        argv:
          - "{{ playbook_dir }}/scripts/bench_operational_verify.sh"
          - --host
          - "{{ ansible_host }}"
          - --skip-wait
      delegate_to: localhost
      become: false
      when: bench_verify_skip_wait | default(false) | bool

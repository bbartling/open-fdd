---
# Sync bench model + FDD rules and restart BACnet commission after code fixes.
#   ansible-playbook -i inventory.yml bench_edge_data_sync.yml --limit bacnet_pi

- name: Sync bench workspace data and BACnet stack fix to edge
  hosts: pi_bcn
  gather_facts: false

  tasks:
    - name: Sync bacnet_toolshed (BACnet stack argv fix)
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../bacnet_toolshed/"
        dest: "{{ openfdd_remote_dir }}/bacnet_toolshed/"
        mode: "0644"
      notify: Restart BACnet commission agent

    - name: Sync workspace data (model, rules, rules_py)
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../workspace/data/"
        dest: "{{ openfdd_remote_dir }}/workspace/data/"
        mode: "0644"

    - name: Push commissioned bench points.csv
      ansible.builtin.copy:
        src: "{{ edge_backup_dir }}/{{ site_id }}/{{ building_id }}/points.csv"
        dest: "{{ points_csv_path }}"
        mode: "0644"
      notify: Restart BACnet commission agent

  handlers:
    - name: Restart BACnet commission agent
      ansible.builtin.systemd:
        name: openfdd-bacnet-commission
        state: restarted
        daemon_reload: true
      become: true

---
# Fix Caddy serving default welcome page instead of Open-FDD React app.
#   ansible-playbook -i inventory.yml fix_caddy_openfdd.yml --limit bacnet_pi

- name: Fix Caddy Open-FDD entry
  hosts: pi_bcn
  gather_facts: false

  tasks:
    - name: Install Caddyfile for Open-FDD
      ansible.builtin.template:
        src: templates/Caddyfile.j2
        dest: /etc/caddy/Caddyfile
        mode: "0644"
      become: true
      when: caddy_enabled | default(true) | bool

    - name: Ensure Caddy reverse-proxies Open-FDD
      ansible.builtin.include_tasks: tasks/ensure_caddy_openfdd.yml
      when: caddy_enabled | default(true) | bool

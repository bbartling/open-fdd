---
# Defaults for all Open-FDD BACnet edge hosts (Pi or x86 VM).
# Per-building overrides: host_vars/<inventory_name>.yml

openfdd_remote_dir: "/home/{{ ansible_user }}/open-fdd"

site_id: demo
building_id: edge

# BACnet/IP bind — override in host_vars (OT NIC vs SSH IP)
bacnet_bind_address: "{{ ansible_host }}/24:47808"
bacnet_instance_id: 599999
bacnet_device_name: OpenFddEdge

# Poll driver (local CSV → bridge ingest → FDD)
install_bacnet_poll_unit: true
enable_bacnet_poll_driver: false
bacnet_poll_interval: 60
bacnet_route_aware: false
bacnet_network: 1
bacnet_router_ip: ""
bacnet_discover_timeout: 20

# Discover Who-Is range defaults (override per host)
bacnet_discover_low: 1
bacnet_discover_high: 4194303

points_csv_path: "{{ openfdd_remote_dir }}/workspace/bacnet/commissioning/points.csv"
polls_csv_path: "{{ openfdd_remote_dir }}/workspace/bacnet/polls/samples.csv"

# Commission HTTP agent (discover jobs from bridge / operator)
install_bacnet_commission_unit: true
enable_bacnet_commission_agent: true
bacnet_commission_bind: "127.0.0.1"
bacnet_commission_port: 8767
commission_agent_token: ""

# Set in private host_vars for OT LAN; unset = auth off (dev only)
# ofdd_auth_secret: ""
# ofdd_web_user: operator
# ofdd_web_password: ""

# Copy workspace/auth.env.local from control machine when present (operator login on edge)
deploy_sync_auth: true

# Auto-ingest poll CSV into feather after each poll cycle (optional timer)
enable_poll_ingest_timer: false

# Scheduled FDD batch run (saved Rule Lab rules across the BRICK model -> check-engine light)
install_fdd_loop_timer: true
enable_fdd_loop_timer: true
fdd_loop_interval_hours: 3

# Feather store retention/compaction (drop rows older than N days, enforce GiB cap daily)
install_feather_retention_timer: true
enable_feather_retention_timer: true
feather_retention_days: 90
feather_max_gib: 5
feather_trim_chunk_hours: 24

# Bridge bind: loopback when Caddy is the LAN entry (default). Caddy serves :80 or :443.
# Override openfdd_bridge_host to 0.0.0.0 only when caddy_enabled: false.
openfdd_bridge_host: "127.0.0.1"
openfdd_bridge_port: 8765

# Caddy reverse proxy — default URL with no port (http://<host>/ check-engine dashboard)
caddy_enabled: true
caddy_mode: http
caddy_tls_cn: "openfdd.local"

# Repo backup on control machine (gitignored local/)
edge_backup_dir: "{{ playbook_dir }}/../../edge_backup/local"

run_deploy_verify: true
post_check_lan: true
post_check_auth_login: true
post_check_fix_caddy: true
post_check_require_mcp: true
post_check_require_ollama: false

# Docker Compose deploy (./deploy.sh docker) — see docs/edge_deploy_docker.md
openfdd_docker_image_tag: "local"
openfdd_docker_disable_systemd: true
openfdd_docker_ollama: true
openfdd_docker_bridge_secret: true
openfdd_docker_sync_workspace_data: true
ollama_docker_image_tag: "latest"

# Docker disk maintenance (deploy_docker.yml + ./deploy.sh maintain)
openfdd_docker_prune_on_deploy: true
openfdd_docker_prune_unused_images: true
openfdd_docker_remove_image_tar: true
openfdd_docker_prune_build_cache: false

# Local Ollama AI (operator chat) — see infra/ansible/ollama_bootstrap.yml
enable_mcp: true
mcp_listen_port: 8090
enable_ollama: false
ollama_ram_tier: "8gb"       # 8gb | 16gb | 32gb | 64gb
ollama_gpu_mode: "cpu"        # cpu | auto | gpu
ollama_ai_backend: "auto"     # auto | ollama | codex
ollama_install_if_missing: true
ollama_base_url: "http://127.0.0.1:11434"
ollama_version: "0.24.0"
ollama_checksum_sha256:
  amd64: "15c5f8d66ba06e0d3b4719df8868612dbd66e14e82760929bb3552e1657cdcdb"
  arm64: "6e9a3ce5f64e93312902e39c420ec336255f078a368ca25e99b339d08a6dfa4b"
# qwen3 models per RAM tier (size tags like qwen3:1.7b support thinking when toggled in the UI).
# On a 4GB Pi, set ollama_model_for_tier.8gb to qwen3:0.6b.
ollama_model_for_tier:
  8gb: "qwen3:1.7b"
  16gb: "qwen3:4b"
  32gb: "qwen3:8b"
  64gb: "qwen3:14b"

# Rust Open-FDD edge stack — pull from GHCR, bind-mount workspace/ for site state.
#
# Profiles:
#   desktop-json-csv — bridge only (set OPENFDD_*_ENABLED=0 in .env for JSON/CSV mode)
#   full-edge        — bridge + BACnet/Modbus commission + Haystack gateway
#   caddy-http       — Caddy LAN ingress on port 80 (use with desktop-json-csv or full-edge)
#   caddy-tls        — Caddy TLS on 443 with self-signed certs (run openfdd-edge tls generate first)
#
# Desktop (Windows Docker Desktop friendly):
#   OPENFDD_COMPOSE_ROOT=$PWD docker compose -f docker/compose.edge.rust.yml --profile desktop-json-csv up -d
#   See docs/desktop/windows_docker_desktop.md
#
# Full edge:
#   OPENFDD_COMPOSE_ROOT=$PWD docker compose -f docker/compose.edge.rust.yml --profile full-edge up -d
#
# NEVER: docker compose down -v
# NEVER: delete workspace/

name: openfdd-rust-edge

services:
  openfdd-bridge:
    profiles: ["full-edge", "desktop-json-csv"]
    image: ghcr.io/bbartling/openfdd-edge-rust:${OPENFDD_IMAGE_TAG:-latest}
    pull_policy: always
    container_name: openfdd-bridge
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ${OPENFDD_COMPOSE_ROOT:?}/workspace:/var/openfdd/workspace
    environment:
      SERVICE_MODE: bridge
      PORT: "8080"
      FRONTEND_DIR: /app/frontend
      OPENFDD_WORKSPACE: /var/openfdd/workspace
      OPENFDD_BACNET_ENABLED: ${OPENFDD_BACNET_ENABLED:-1}
      OPENFDD_MODBUS_ENABLED: ${OPENFDD_MODBUS_ENABLED:-1}
      OPENFDD_HAYSTACK_ENABLED: ${OPENFDD_HAYSTACK_ENABLED:-1}
      OPENFDD_JSON_API_ENABLED: ${OPENFDD_JSON_API_ENABLED:-1}
      OPENFDD_IMPORT_ENABLED: ${OPENFDD_IMPORT_ENABLED:-1}
      OPENFDD_EXPORT_ENABLED: ${OPENFDD_EXPORT_ENABLED:-1}
    # Auth is read at runtime from OPENFDD_WORKSPACE/auth.env.local (do not use env_file —
    # Docker Compose mangles bcrypt `$` in hash values).
    env_file:
      - path: ${OPENFDD_COMPOSE_ROOT:?}/workspace/data.env.local
        required: false
      - path: ${OPENFDD_COMPOSE_ROOT:?}/workspace/bacnet/commissioning/commission.env
        required: false
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  openfdd-commission:
    profiles: ["full-edge"]
    image: ghcr.io/bbartling/openfdd-edge-rust:${OPENFDD_IMAGE_TAG:-latest}
    pull_policy: always
    container_name: openfdd-commission
    network_mode: host
    volumes:
      - ${OPENFDD_COMPOSE_ROOT:?}/workspace:/var/openfdd/workspace
    environment:
      SERVICE_MODE: commission
      PORT: "9091"
      OPENFDD_WORKSPACE: /var/openfdd/workspace
      OPENFDD_BACNET_MODE: ${OPENFDD_BACNET_MODE:-live}
      OPENFDD_BACNET_ENABLED: ${OPENFDD_BACNET_ENABLED:-1}
      OPENFDD_MODBUS_ENABLED: ${OPENFDD_MODBUS_ENABLED:-1}
    env_file:
      - path: ${OPENFDD_COMPOSE_ROOT:?}/workspace/data.env.local
        required: false
      - path: ${OPENFDD_COMPOSE_ROOT:?}/workspace/bacnet/commissioning/commission.env
        required: false
    restart: unless-stopped

  openfdd-caddy-http:
    profiles: ["caddy-http"]
    image: caddy:2-alpine
    container_name: openfdd-caddy
    ports:
      - "${OPENFDD_CADDY_HTTP_PORT:-80}:80"
    volumes:
      - ${OPENFDD_COMPOSE_ROOT:?}/docker/caddy/Caddyfile.http:/etc/caddy/Caddyfile:ro
    environment:
      OPENFDD_CADDY_ENABLED: "1"
      OPENFDD_CADDY_MODE: http
    depends_on:
      openfdd-bridge:
        condition: service_healthy
    restart: unless-stopped

  openfdd-caddy-tls:
    profiles: ["caddy-tls"]
    image: caddy:2-alpine
    container_name: openfdd-caddy
    ports:
      - "${OPENFDD_CADDY_HTTP_PORT:-80}:80"
      - "${OPENFDD_CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ${OPENFDD_COMPOSE_ROOT:?}/docker/caddy/Caddyfile.tls:/etc/caddy/Caddyfile:ro
      - ${OPENFDD_COMPOSE_ROOT:?}/${OPENFDD_CADDY_CERT_DIR:-workspace/deploy/caddy/certs}:/certs:ro
    environment:
      OPENFDD_CADDY_ENABLED: "1"
      OPENFDD_CADDY_MODE: tls
      OPENFDD_CADDY_HOSTNAME: ${OPENFDD_CADDY_HOSTNAME:-openfdd.local}
      OPENFDD_CADDY_TLS_CN: ${OPENFDD_CADDY_TLS_CN:-openfdd.local}
    depends_on:
      openfdd-bridge:
        condition: service_healthy
    restart: unless-stopped

  openfdd-haystack-gateway:
    profiles: ["full-edge"]
    image: ghcr.io/bbartling/openfdd-edge-rust:${OPENFDD_IMAGE_TAG:-latest}
    pull_policy: always
    container_name: openfdd-haystack-gateway
    expose:
      - "9092"
    volumes:
      - ${OPENFDD_COMPOSE_ROOT:?}/workspace:/var/openfdd/workspace
    environment:
      SERVICE_MODE: haystack-gateway
      PORT: "9092"
      OPENFDD_WORKSPACE: /var/openfdd/workspace
      OPENFDD_HAYSTACK_ENABLED: ${OPENFDD_HAYSTACK_ENABLED:-1}
    restart: unless-stopped

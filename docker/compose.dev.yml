# Local dev stack on bensserver — bind-mounts workspace/ (state + config).
# Caddy + Ollama stay on host by default (see docs/edge_deploy_docker.md).
#
#   ./scripts/docker_build.sh
#   docker compose -f docker/compose.dev.yml up -d
#   docker compose -f docker/compose.dev.yml --profile bacnet up -d
#   docker compose -f docker/compose.dev.yml --profile ai up -d

name: openfdd-dev

services:
  bridge:
    image: openfdd-bridge:${OPENFDD_IMAGE_TAG:-local}
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: bridge
    ports:
      - "127.0.0.1:8765:8765"
    volumes:
      - ../workspace:/var/openfdd/workspace
      - ../workspace/api:/app/workspace/api:ro
    environment:
      OFDD_ALLOW_LAN_INTERNAL_INGEST: "1"
      OPENFDD_BACNET_COMMISSION_URL: http://commission:8767
      OFDD_MCP_REST_BASE: http://mcp-rag:8090
      # Prefer in-compose Ollama (--profile ai); fall back to host Ollama via host-gateway.
      OFDD_OLLAMA_BASE_URL: http://ollama:11434
      OFDD_OLLAMA_FALLBACK_URLS: http://host.docker.internal:11434,http://127.0.0.1:11434
      # Dev bench: smallest local model — override in workspace/ollama.env.local if needed.
      OFDD_OLLAMA_MODEL: tinyllama
      OFDD_OLLAMA_GPU_MODE: cpu
      OFDD_OLLAMA_NUM_GPU: "0"
    env_file:
      - path: ../workspace/auth.env.local
        required: false
      - path: ../workspace/mcp.env.local
        required: false
      - path: ../workspace/ollama.env.local
        required: false
      - path: ../workspace/data.env.local
        required: false
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      commission:
        condition: service_started
      mcp-rag:
        condition: service_started
      ollama:
        condition: service_started
        required: false
    restart: unless-stopped

  commission:
    image: openfdd-commission:${OPENFDD_IMAGE_TAG:-local}
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: commission
    volumes:
      - ../workspace:/var/openfdd/workspace
      - ../workspace/api:/app/workspace/api:ro
    environment:
      OPENFDD_WORKSPACE_DIR: /var/openfdd/workspace
      OPENFDD_REPO_ROOT: /app
      # Bridge service name on default compose network (bench overlay uses 127.0.0.1 via compose.bench.yml).
      OPENFDD_BRIDGE_INGEST_URL: http://bridge:8765/internal/bacnet/ingest-samples
    expose:
      - "8767"
    restart: unless-stopped

  mcp-rag:
    image: openfdd-mcp-rag:${OPENFDD_IMAGE_TAG:-local}
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: mcp-rag
    volumes:
      - ../workspace:/var/openfdd/workspace
      - ../workspace/api:/app/workspace/api:ro
    expose:
      - "8090"
    restart: unless-stopped

  bacnet-poll:
    profiles: ["bacnet"]
    image: openfdd-bacnet-poll:${OPENFDD_IMAGE_TAG:-local}
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: bacnet-poll
    network_mode: host
    volumes:
      - ../workspace:/var/openfdd/workspace
      - ../workspace/api:/app/workspace/api:ro
    environment:
      OPENFDD_WORKSPACE_DIR: /var/openfdd/workspace
      OPENFDD_REPO_ROOT: /app
    restart: unless-stopped

  ollama:
    profiles: ["ai"]
    image: ollama/ollama:latest
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - openfdd-ollama:/root/.ollama
    restart: unless-stopped

volumes:
  openfdd-ollama:

# Published Open-FDD container images (addons).
# Build: ./scripts/docker_build.sh
# Publish: ./scripts/docker_publish.sh

registry: ghcr.io
org: bbartling
default_tag: local

images:
  - name: openfdd-bridge
    build_target: bridge
    description: FastAPI operator bridge + React SPA + historian ingest
  - name: openfdd-commission
    build_target: commission
    description: BACnet commission agent (discover, read, write, poll loop)
  - name: openfdd-mcp-rag
    build_target: mcp-rag
    description: MCP document search sidecar
  - name: openfdd-cloud-exporter
    build_target: cloud-exporter
    description: Generic Open-FDD API polling and cloud POST exporter sidecar

external:
  - name: ollama/ollama
    description: Optional LLM runtime (host systemd or compose profile ai)
